row\"><div class=\"label\">麦</div><div class=\"content\">本义：麦类。生肖：草食生肖通用。例字：麦、麸、面（麵）</div></div>\n\n<h2>二、肉食字根类（肉食生肖喜）</h2>\n\n<div class=\"radical-row\"><div class=\"label\">心 / 忄</div><div class=\"content\">本义：心脏（古\"肉\"字之一）。生肖：虎、蛇、狗喜。例字：志、念、忠、怡、恒、恩、悦、悟、情、惠、慕、慧、忆、怀</div></div>\n<div class=\"radical-row\"><div class=\"label\">月（肉）</div><div class=\"content\">本义：肉。生肖：肉食生肖喜（须辨\"月\"为肉旁还是月旁）。例字：肌、肋、肖、肠、肤、肺、胜、能、脉、脱、腾</div></div>\n\n<h2>三、安居字根类（小生肖喜）</h2>\n\n<div class=\"radical-row\"><div class=\"label\">宀（宝盖头）</div><div class=\"content\">本义：屋宇。生肖：鼠、兔、蛇、狗、猪喜。例字：安、宇、宏、宁、宗、宜、宣、宥、家、宸、富、容、宙、宝</div></div>\n<div class=\"radical-row\"><div class=\"label\">广（半屋顶）</div><div class=\"content\">本义：依山而建之屋。生肖：牛、羊、狗、猪喜。例字：庭、庞、庚、序、府、康、庸、庶</div></div>\n<div class=\"radical-row\"><div class=\"label\">穴</div><div class=\"content\">本义：洞穴。生肖：鼠、兔、蛇喜。例字：穴、究、空、突、穹、窈、窕</div></div>\n<div class=\"radical-row\"><div class=\"label\">口（小口）</div><div class=\"content\">本义：口、洞、门。生肖：鼠、兔、狗、猪喜（鸡喜小口）。例字：可、合、和、品、咏、咸、君</div></div>\n\n<h2>四、得位字根类</h2>\n\n<div class=\"radical-row\"><div class=\"label\">王 / 玉</div><div class=\"content\">本义：王、美玉。生肖：鼠、虎、龙、马、猴、鸡喜（牛、兔、羊、狗、猪忌）。例字：玲、珍、珊、琦、琪、琳、琴、瑜、瑞、瑶、瑾、璇、璞、玺</div></div>\n<div class=\"radical-row\"><div class=\"label\">大 / 君</div><div class=\"content\">本义：大、君主。生肖：大型生肖喜（虎、龙、马）；小型生肖忌（兔、羊、猪）</div></div>\n<div class=\"radical-row\"><div class=\"label\">小 / 少 / 士 / 臣</div><div class=\"content\">本义：小、辅佐。生肖：小型生肖喜（兔、羊、猪、狗）。例字：士、臣、亚、佐、佑、仁、仕、彦、佳</div></div>\n\n<h2>五、彩衣字根类（得势）</h2>\n\n<div class=\"radical-row\"><div class=\"label\">衣 / 衤</div><div class=\"content\">本义：衣服。生肖：鼠、虎、兔、龙、蛇、马、猴、鸡喜（牛、羊、猪忌或慎用）。例字：衫、袖、裴、襟、裙、表、被</div></div>\n<div class=\"radical-row\"><div class=\"label\">糸 / 纟</div><div class=\"content\">本义：丝线。例字：素、缘、绮、绅、绫、纶、绾、绵</div></div>\n<div class=\"radical-row\"><div class=\"label\">巾</div><div class=\"content\">本义：佩巾。例字：帆、帜、帝、帛、希、师、布</div></div>\n<div class=\"radical-row\"><div class=\"label\">彡</div><div class=\"content\">本义：羽饰、彩纹。例字：彤、彦、彬、彰、彪、形、彭</div></div>\n<div class=\"radical-row\"><div class=\"label\">示 / 礻</div><div class=\"content\">本义：祭祀（神性）。例字：祯、祥、祎、祺、福、祐、社、祖</div></div>\n<div class=\"radical-row\"><div class=\"label\">羽</div><div class=\"content\">本义：羽毛。生肖：鸡、龙喜。例字：翊、翠、翎、翔、翰、翱、翘</div></div>\n\n<h2>六、生肖直接字根</h2>\n\n<div class=\"radical-row\"><div class=\"label\">鼠根</div><div class=\"content\">子、孑、孔、孜、存、孝、孟、孙、学、宇、字、季</div></div>\n<div class=\"radical-row\"><div class=\"label\">牛根</div><div class=\"content\">丑、纽、扭、生、特、牟、牢、牲</div></div>\n<div class=\"radical-row\"><div class=\"label\">虎根</div><div class=\"content\">寅、虎、虓、彪、虞、虑、虚、虹</div></div>\n<div class=\"radical-row\"><div class=\"label\">兔根</div><div class=\"content\">卯、迎、印、聊、柳、留、貌</div></div>\n<div class=\"radical-row\"><div class=\"label\">龙根</div><div class=\"content\">辰、龙、龚、宠、农、振、晨、唇、辱、辙</div></div>\n<div class=\"radical-row\"><div class=\"label\">蛇根</div><div class=\"content\">巳、廴、辶、弓、几、虫、邑、之、廷、延、建、迁、运</div></div>\n<div class=\"radical-row\"><div class=\"label\">马根</div><div class=\"content\">午、马、骏、骐、骞、腾、驰、驾、驿</div></div>\n<div class=\"radical-row\"><div class=\"label\">羊根</div><div class=\"content\">未、羊、義、群、羚、翔、善、美</div></div>\n<div class=\"radical-row\"><div class=\"label\">猴根</div><div class=\"content\">申、伸、绅、神、坤、袁、猿、侯</div></div>\n<div class=\"radical-row\"><div class=\"label\">鸡根</div><div class=\"content\">酉、鸿、鸣、鹏、鸾、鹤、配、酬、醒</div></div>\n<div class=\"radical-row\"><div class=\"label\">狗根</div><div class=\"content\">戌、犭、犬、戎、伏、狄、狼、献、状、然</div></div>\n<div class=\"radical-row\"><div class=\"label\">猪根</div><div class=\"content\">亥、豕、家、毅、豪、象、豫、豹</div></div>\n\n<!-- 附录二 -->"}, {"id": "v附录-c附2", "kind": "chapter", "volNum": "附录", "volTitle": "速 查 工 具", "volSubtitle": "字根速查 · 生肖宜忌 · 禁字汇总 · 常见问答", "volQuote": "「学之以理，用之以查；<br>书页方寸之间，藏千万字之宜忌。」", "chapNum": "附 录 二", "chapTitle": "十二生肖宜忌字总表", "content": "<table>\n  <thead>\n    <tr><th>生肖</th><th>三合三会六合</th><th>五大宜用类</th><th>五大忌用类</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>子鼠</strong></td>\n      <td>三合：申辰<br>三会：亥丑<br>六合：丑</td>\n      <td>艹禾米豆<br>宀口穴<br>王玉<br>衣彡糸<br>夕月夜</td>\n      <td>日阳光<br>午马灬<br>未羊<br>火字<br>人亻</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>丑牛</strong></td>\n      <td>三合：巳酉<br>三会：亥子<br>六合：子</td>\n      <td>艹禾米<br>田宀广<br>士臣亚<br>口大口<br>水</td>\n      <td>彩衣类<br>王玉君<br>未羊<br>戌犬<br>心忄月</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>寅虎</strong></td>\n      <td>三合：午戌<br>三会：卯辰<br>六合：亥</td>\n      <td>心忄月<br>山林木<br>王大君<br>衣彡糸<br>水</td>\n      <td>平原田<br>口囗笼<br>申猴<br>巳蛇<br>人亻</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>卯兔</strong></td>\n      <td>三合：亥未<br>三会：寅辰<br>六合：戌</td>\n      <td>艹禾米<br>口宀穴<br>士臣<br>衣彡糸<br>夕月</td>\n      <td>山岩峰<br>王大君<br>酉鸡<br>辰龙<br>日阳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>辰龙</strong></td>\n      <td>三合：申子<br>三会：寅卯<br>六合：酉</td>\n      <td>水氵<br>云辰宸<br>王大日<br>衣彡<br>抬头字</td>\n      <td>人亻<br>弓几虫<br>戌犬<br>卯兔<br>田川</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>巳蛇</strong></td>\n      <td>三合：酉丑<br>三会：午未<br>六合：申</td>\n      <td>心忄月<br>口宀木<br>士臣<br>彩衣<br>火灬</td>\n      <td>水氵<br>亥猪<br>寅虎<br>王大<br>人亻</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>午马</strong></td>\n      <td>三合：寅戌<br>三会：巳未<br>六合：未</td>\n      <td>艹禾米<br>山林<br>王大<br>衣彡糸<br>火灬</td>\n      <td>水氵<br>子鼠<br>丑牛<br>两口字<br>田农</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>未羊</strong></td>\n      <td>三合：亥卯<br>三会：巳午<br>六合：午</td>\n      <td>艹禾米<br>口宀广<br>士臣<br>衣彡糸<br>跷脚字</td>\n      <td>犬犭戎<br>丑牛<br>子鼠<br>山岩<br>王大</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>申猴</strong></td>\n      <td>三合：子辰<br>三会：酉戌<br>六合：巳</td>\n      <td>艹禾水<br>木林山<br>王大<br>衣彡糸<br>跷脚字</td>\n      <td>田农耕<br>金钅<br>寅虎<br>亥猪<br>火灬</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>酉鸡</strong></td>\n      <td>三合：巳丑<br>三会：申戌<br>六合：辰</td>\n      <td>艹禾小口<br>宀广<br>王日冠<br>羽彩衣<br>立章</td>\n      <td>大口字<br>卯兔<br>戌犬<br>心忄月<br>山岩</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>戌狗</strong></td>\n      <td>三合：寅午<br>三会：申酉<br>六合：卯</td>\n      <td>心忄月<br>口宀广<br>士臣<br>衣彡糸<br>三口考试</td>\n      <td>水氵<br>辰龙<br>酉鸡<br>丑未<br>日阳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>亥猪</strong></td>\n      <td>三合：卯未<br>三会：子丑<br>六合：寅</td>\n      <td>艹禾米<br>水宀口<br>士臣<br>跷脚字<br>夜行字</td>\n      <td><strong>土田</strong><br>巳蛇<br>申猴<br>山岩<br>刀刂</td>\n    </tr>\n  </tbody>\n</table>\n\n<!-- 附录三 -->"}, {"id": "v附录-c附3", "kind": "chapter", "volNum": "附录", "volTitle": "速 查 工 具", "volSubtitle": "字根速查 · 生肖宜忌 · 禁字汇总 · 常见问答", "volQuote": "「学之以理，用之以查；<br>书页方寸之间，藏千万字之宜忌。」", "chapNum": "附 录 三", "chapTitle": "起名禁忌字汇总", "content": "<h2>一、通用禁字（多数生肖共忌）</h2>\n\n<div class=\"radical-row\"><div class=\"label\">孤独类</div><div class=\"content\">婵、素、燕、莲、霞、梦、露、雪、寒、霏</div></div>\n<div class=\"radical-row\"><div class=\"label\">虚浮类</div><div class=\"content\">梦、影、幻、云、烟、虚、空、泡</div></div>\n<div class=\"radical-row\"><div class=\"label\">劳碌类</div><div class=\"content\">国、正、凤、彦、娟、琼、芬、利、丽、莉</div></div>\n<div class=\"radical-row\"><div class=\"label\">季节类</div><div class=\"content\">春、夏、秋、冬、梅、兰、竹、菊（仅短暂得意）</div></div>\n<div class=\"radical-row\"><div class=\"label\">刑克类</div><div class=\"content\">军、光、刀、冰、品（看生肖）、晶、磊、笑、艳、池</div></div>\n\n<h2>二、女性专用禁忌</h2>\n\n<div class=\"radical-row\"><div class=\"label\">刚强夺权</div><div class=\"content\">忠、义、顺、强、君、王、武、雄、刚、霸</div></div>\n<div class=\"radical-row\"><div class=\"label\">虚幻不稳</div><div class=\"content\">梦、露、霞、雪、影、幻、云、烟</div></div>\n<div class=\"radical-row\"><div class=\"label\">外貌美艳</div><div class=\"content\">淑、姿、娇、艳、媚、妍、丽、靓</div></div>\n\n<h2>三、替身字</h2>\n\n<div class=\"radical-row\"><div class=\"label\">三大替身</div><div class=\"content\">其、予、吾</div></div>\n<div class=\"radical-row\"><div class=\"label\">含其字</div><div class=\"content\">祺、骐、棋、琪、淇、琦</div></div>\n<div class=\"radical-row\"><div class=\"label\">含予字</div><div class=\"content\">豫、抒、舒、序、纾</div></div>\n<div class=\"radical-row\"><div class=\"label\">含吾字</div><div class=\"content\">梧、悟、晤、语、敔</div></div>\n\n<h2>四、降格字（辰龙专忌）</h2>\n\n<div class=\"radical-row\"><div class=\"label\">含人字</div><div class=\"content\">伟、仁、化、仕、何、任、傅、伯、仲、仁</div></div>\n<div class=\"radical-row\"><div class=\"label\">含弓字</div><div class=\"content\">弓、张、强、弦、弯、弥、引</div></div>\n<div class=\"radical-row\"><div class=\"label\">含虫字</div><div class=\"content\">虫、蜂、蝶、蝉、蜜、虹、虾</div></div>\n<div class=\"radical-row\"><div class=\"label\">含几字</div><div class=\"content\">几、凡、凤、凯、凳、凭</div></div>\n\n<h2>五、字形不利</h2>\n\n<div class=\"radical-row\"><div class=\"label\">下盘不稳</div><div class=\"content\">文、义、友、交、亥</div></div>\n<div class=\"radical-row\"><div class=\"label\">气散字形</div><div class=\"content\">美、英、青、静、彤、艳</div></div>\n<div class=\"radical-row\"><div class=\"label\">头重脚轻</div><div class=\"content\">蘩、馨、馥、霭</div></div>\n<div class=\"radical-row\"><div class=\"label\">空心散形</div><div class=\"content\">回、田（看生肖）、囚、围、囫</div></div>\n\n<!-- 附录四 -->"}, {"id": "v附录-c附4", "kind": "chapter", "volNum": "附录", "volTitle": "速 查 工 具", "volSubtitle": "字根速查 · 生肖宜忌 · 禁字汇总 · 常见问答", "volQuote": "「学之以理，用之以查；<br>书页方寸之间，藏千万字之宜忌。」", "chapNum": "附 录 四", "chapTitle": "常见问答", "content": "<h2>问一：双胞胎可以同名同姓吗？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>双胞胎须有不同之名一名二，不可同名。建议两兄弟（姐妹）名字之间，可有\"音律呼应\"或\"字义对应\"，但具体字根不可雷同。同时须避免同总笔画、同人格数——以免命运过于趋同。</p>\n</div>\n\n<h2>问二：可以与直系长辈同字吗？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>不建议。中华传统避讳直系长辈之名讳。原因有二：一是文化传承之尊重；二是能量上，孩子使用长辈之字，有\"夺长辈之气\"之嫌。若家族字辈传统强烈，可以\"字辈+新字\"组合，但应避免与具体长辈完全同名。</p>\n</div>\n\n<h2>问三：英文名重要吗？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>英文名属\"使用名\"，对国际交流有用，但不影响中文姓名之能量根本。建议英文名与中文名有谐音关联（如\"文森\"对应\"Wilson\"），让两个名字之能量协调。英文名亦要避免负面词义之谐音。</p>\n</div>\n\n<h2>问四：电脑生成的名字可信吗？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>纯电脑生成之名字，多数仅按81数吉凶或简单五行匹配，缺乏生肖喜忌、字根细节、家族文化之深度考量。可作初筛，不可终选。最终命名，须由懂姓名学之专业者结合生辰、家族、个人偏好综合判断。</p>\n</div>\n\n<h2>问五：生辰八字与姓名学谁优先？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>生辰八字是先天命局，姓名学是后天调整。两者不冲突，互为补充。八字定方向（缺什么、多什么），姓名学定字根（用什么字补）。专业起名，应\"先看八字、再选生肖、后定字根\"。</p>\n</div>\n\n<h2>问六：姓不利生肖怎么办？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>姓不可改，但可通过名一名二之搭配化解。例如：兔宝宝姓\"王\"（兔忌称王），可用\"芮（艹得食）\"+ \"宇（宀得地）\"补救——名字补强生肖喜用，化解姓氏之先天压力。每一姓之化解策略，须个案分析。</p>\n</div>\n\n<h2>问七：可以多个生肖喜字堆砌吗？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>不建议。能量过满则溢，反成压力。建议三字之中，2-3字为生肖喜用即够；其余字应注重音、形、义之美。<strong>\"少而精\"胜于\"多而堆\"。</strong></p>\n</div>\n\n<h2>问八：改名后多久见效？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>改名之效力，视使用频率而定。若家人朋友每日呼唤新名，约3-6个月可初见心境之变；6-12个月可见外在事件之转；2-3年方可见整体运势之调。改名不是一夕奇迹，是长期之能量重塑。</p>\n</div>\n\n<h2>问九：本书的理论是否适用海外华人？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>完全适用。生肖姓名学之根本，在于汉字之能量与生肖之契合，与地理位置无关。无论是马来西亚、新加坡、北美、欧洲之华人，只要使用中文名字，本书之理论皆适用。同时，建议海外华人之英文名亦考虑能量协调。</p>\n</div>\n\n<h2>问十：本书与作者其他系统如何衔接？</h2>\n\n<div class=\"callout\">\n  <p><strong>答：</strong>本书属\"生肖姓名学\"，是华夏传统命名学之主流。作者亦深研\"八白姓名学（张科勉老师神乎奇际系统）\"——以五格剖象+笔画星座为框架。两套系统可互参：</p>\n  <p>　• 生肖姓名学——专注字根能量与生肖契合</p>\n  <p>　• 八白姓名学——专注笔画星座与人生剧本</p>\n  <p>　• 数字易学命盘——以生辰数字看一生格局</p>\n  <p>三系合参，方为完整命名分析。详情请咨询作者。</p>\n</div>\n\n<!-- 后记 -->"}, {"id": "v附录-c后记", "kind": "chapter", "volNum": "附录", "volTitle": "速 查 工 具", "volSubtitle": "字根速查 · 生肖宜忌 · 禁字汇总 · 常见问答", "volQuote": "「学之以理，用之以查；<br>书页方寸之间，藏千万字之宜忌。」", "chapNum": "后  记", "chapTitle": "名启天命，字定乾坤", "content": "<p>这本书，从最初一份《起名五得与用字宜忌宝典》之原稿，到如今九卷加四附录之完整体系，历时数月、字数倍增。其间所积，皆是多年研习与实务咨询之心得。能够将零散之笔记、私下之心法、客户案例之总结，凝成一本系统化之姓名学典籍，是我多年的心愿，今日终得圆满。</p>\n\n<p>姓名学不是迷信，而是一门\"能量配对\"之学问。在中华文化里，名字是天地之间最早一次为生命定下的能量印记——父母怀抱之时，最早一次对孩子说出之爱与期望。读懂姓名学，便是读懂这份爱、这份期望、这份天地之厚意。</p>\n\n<p>本书有意识地保持了平衡——既不过度神秘化，亦不一味去玄学化；既尊重传统，亦不回避现代理性之审视。我相信，这是这门学问在新时代应有之样貌：扎根传统，面向未来。</p>\n\n<p>愿每一位翻阅本书之读者，能从中获得真知；愿每一位准备为孩子命名之父母，能由此而稳重落笔；愿每一位欲改名调运之朋友，能从此而见路前进。</p>\n\n<p>姓名是钥匙，开启自己之命运之锁；<br>姓名是桥梁，连接传统与现代；<br>姓名是种子，育成一生之果实。</p>\n\n<p>感谢张科勉老师之指引，感谢每一位曾接受我咨询之客户，感谢家人之支持。是为后记。</p>\n\n<div class=\"signature\" style=\"text-align: right; margin-top: 14mm; font-size: 12pt; color: #4a5568; line-height: 2; letter-spacing: 0.05em;\">\n  <strong style=\"color: #1a3661; font-size: 13pt;\">黄文森（Wilson Ooi）</strong><br>\n  谨识于马来西亚<br>\n  丙午年 · 立春后\n</div>\n\n<div style=\"text-align: center; margin: 40mm 0 20mm 0; color: #c9a961; font-size: 18pt; letter-spacing: 0.5em;\">❖ 　 全 　 卷 　 终 　 ❖</div>"}]};

/* ---------- Storage adapter (artifact + GitHub Pages) ---------- */
const Storage = {
  async get(k) {
    try {
      if (typeof window !== 'undefined' && window.storage && window.storage.get) {
        const r = await window.storage.get(k);
        return r ? r.value : null;
      }
    } catch (e) {}
    try { return localStorage.getItem(k); } catch (e) { return null; }
  },
  async set(k, v) {
    try {
      if (typeof window !== 'undefined' && window.storage && window.storage.set) {
        await window.storage.set(k, v);
        return;
      }
    } catch (e) {}
    try { localStorage.setItem(k, v); } catch (e) {}
  }
};

const STATE = {
  currentId: null,
  read: new Set(),

  fontsize: 'M'
};

/* ---------- Build sidebar TOC ---------- */
function buildTOC() {
  const tocEl = document.getElementById('toc');
  let html = '';
  BOOK.toc.forEach((vol, idx) => {
    const isCollapsed = STATE.volumesCollapsed.has(vol.volNum);
    html += `<div class="vol-block ${isCollapsed?'collapsed':''}" data-vol="${vol.volNum}">`;
    html += `<div class="vol-head" onclick="toggleVolume('${vol.volNum}')">`;
    html += `  <div class="vol-num-badge">${vol.volNum === '序' ? 'PREFACE' : vol.volNum === '附录' ? 'APPENDIX' : 'VOL ' + (idx)}</div>`;
    html += `  <div class="vol-name">${vol.volNum === '序' ? '自 序' : (vol.volNum === '附录' ? '附 录' : '第 ' + vol.volNum + ' 卷') + (vol.volTitle ? ' · ' + vol.volTitle : '')}</div>`;
    if (vol.volSubtitle) html += `<div class="vol-sub">${vol.volSubtitle}</div>`;
    html += '</div>';
    html += '<div class="vol-chapters">';
    vol.chapters.forEach(ch => {
      const isRead = STATE.read.has(ch.id);
      const isActive = STATE.currentId === ch.id;
      html += `<button class="chap-link ${isActive?'active':''} ${isRead?'read':''}" data-id="${ch.id}" onclick="loadChapter('${ch.id}')">`;
      html += `  <span class="chap-check"></span>`;
      html += `  <span class="chap-title-text">`;
      if (ch.num) html += `<span class="chap-num-small">${ch.num}</span>`;
      html += `${ch.title}`;
      html += `  </span>`;
      html += `</button>`;
    });
    html += '</div></div>';
  });
  tocEl.innerHTML = html;
  updateProgress();
}

function toggleVolume(volNum) {
  if (STATE.volumesCollapsed.has(volNum)) {
    STATE.volumesCollapsed.delete(volNum);
  } else {
    STATE.volumesCollapsed.add(volNum);
  }
  saveState();
  buildTOC();
}
window.toggleVolume = toggleVolume;

function updateProgress() {
  // exclude preface and appendix from progress (they're optional)
  const total = BOOK.units.filter(u => u.kind === 'chapter').length;
  const readChapters = [...STATE.read].filter(id => {
    const unit = BOOK.units.find(u => u.id === id);
    return unit && unit.kind === 'chapter';
  });
  const pct = total > 0 ? Math.round(readChapters.length / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `已读 ${readChapters.length} / ${total} 章 · ${pct}%`;
  // home stats
  const statV = document.getElementById('stat-volumes');
  const statC = document.getElementById('stat-chapters');
  if (statV) statV.textContent = '9';
  if (statC) statC.textContent = total;
}

/* ---------- Load and render chapter ---------- */
function loadChapter(id) {
  const unit = BOOK.units.find(u => u.id === id);
  if (!unit) return;
  STATE.currentId = id;
  saveState();

  const idx = BOOK.units.findIndex(u => u.id === id);
  const prev = idx > 0 ? BOOK.units[idx - 1] : null;
  const next = idx < BOOK.units.length - 1 ? BOOK.units[idx + 1] : null;

  let html = '';

  // If this is the first chapter of a volume, show volume cover
  const tocVol = BOOK.toc.find(v => v.chapters.some(c => c.id === id));
  const isFirstInVol = tocVol && tocVol.chapters[0].id === id;
  const showVolCover = isFirstInVol && unit.kind === 'chapter' && tocVol.volNum !== '序';
  if (showVolCover) {
    html += `<div class="vol-cover">`;
    html += `<div class="v-num">第 ${tocVol.volNum} 卷</div>`;
    html += `<div class="v-title">${tocVol.volTitle}</div>`;
    html += `<div class="v-sub">${tocVol.volSubtitle || ''}</div>`;
    if (unit.volQuote) html += `<div class="v-quote">${unit.volQuote}</div>`;
    html += `</div>`;
  }

  // chapter header
  html += `<div class="chap-header">`;
  if (unit.kind === 'chapter' && tocVol) {
    html += `<div class="chap-vol-tag"><span class="vol-num-pill">第 ${tocVol.volNum} 卷</span> ${tocVol.volTitle}</div>`;
  } else if (unit.kind === 'preface') {
    html += `<div class="chap-vol-tag"><span class="vol-num-pill">序</span> 自序</div>`;
  }
  if (unit.chapNum) html += `<div class="chap-num-display">${unit.chapNum}</div>`;
  html += `<h1 class="chap-title-display">${unit.chapTitle}</h1>`;
  html += `</div>`;

  // body
  html += unit.content;

  // mark-read button
  const isRead = STATE.read.has(id);
  html += `<button class="chap-mark-read ${isRead?'is-read':''}" onclick="toggleRead('${id}')">${isRead ? '已 读' : '标 记 为 已 读'}</button>`;

  // nav buttons
  html += `<div class="chap-nav">`;
  if (prev) {
    html += `<button class="chap-nav-btn prev" onclick="loadChapter('${prev.id}')">`;
    html += `<div class="chap-nav-label">← 上一章</div>`;
    html += `<div class="chap-nav-title">${prev.chapTitle}</div>`;
    html += `</button>`;
  } else {
    html += `<button class="chap-nav-btn prev" disabled><div class="chap-nav-label">已是首篇</div><div class="chap-nav-title">—</div></button>`;
  }
  if (next) {
    html += `<button class="chap-nav-btn next" onclick="loadChapter('${next.id}')">`;
    html += `<div class="chap-nav-label">下一章 →</div>`;
    html += `<div class="chap-nav-title">${next.chapTitle}</div>`;
    html += `</button>`;
  } else {
    html += `<button class="chap-nav-btn next" disabled><div class="chap-nav-label">已是末篇</div><div class="chap-nav-title">—</div></button>`;
  }
  html += `</div>`;

  document.getElementById('reading-inner').innerHTML = html;
  document.getElementById('current-title').textContent = unit.chapTitle;
  document.getElementById('reading').scrollTop = 0;
  // update active in toc
  document.querySelectorAll('.chap-link').forEach(b => b.classList.remove('active'));
  const active = document.querySelector(`.chap-link[data-id="${id}"]`);
  if (active) {
    active.classList.add('active');
    // expand its volume if collapsed
    const volBlock = active.closest('.vol-block');
    if (volBlock && volBlock.classList.contains('collapsed')) {
      const v = volBlock.dataset.vol;
      STATE.volumesCollapsed.delete(v);
      buildTOC();
      // reapply active state
      document.querySelectorAll('.chap-link').forEach(b => b.classList.remove('active'));
      const a2 = document.querySelector(`.chap-link[data-id="${id}"]`);
      if (a2) a2.classList.add('active');
    }
    // scroll into view in sidebar
    setTimeout(() => active.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 100);
  }
  // close sidebar on mobile
  if (window.innerWidth <= 900) closeSidebar();
}
window.loadChapter = loadChapter;

function toggleRead(id) {
  if (STATE.read.has(id)) STATE.read.delete(id);
  else STATE.read.add(id);
  saveState();
  buildTOC();
  // re-render to update button state
  const btn = document.querySelector('.chap-mark-read');
  if (btn) {
    btn.classList.toggle('is-read', STATE.read.has(id));
    btn.textContent = STATE.read.has(id) ? '已 读' : '标 记 为 已 读';
  }
}
window.toggleRead = toggleRead;

/* ---------- State persistence ---------- */
async function saveState() {
  await Storage.set('wilson_book_read', JSON.stringify([...STATE.read]));
  await Storage.set('wilson_book_collapsed', JSON.stringify([...STATE.volumesCollapsed]));
  await Storage.set('wilson_book_current', STATE.currentId || '');
  await Storage.set('wilson_book_fontsize', STATE.fontsize);
}

async function loadState() {
  try {
    const r = await Storage.get('wilson_book_read');
    if (r) STATE.read = new Set(JSON.parse(r));
  } catch (e) {}
  try {
    const c = await Storage.get('wilson_book_collapsed');
    if (c) STATE.volumesCollapsed = new Set(JSON.parse(c));
    else {
      // by default collapse appendix
      STATE.volumesCollapsed = new Set(['附录']);
    }
  } catch (e) {
    STATE.volumesCollapsed = new Set(['附录']);
  }
  try {
    const cur = await Storage.get('wilson_book_current');
    if (cur) STATE.currentId = cur;
  } catch (e) {}
  try {
    const fs = await Storage.get('wilson_book_fontsize');
    if (fs) {
      STATE.fontsize = fs;
      document.body.dataset.fontsize = fs;
      document.querySelectorAll('.settings-options[data-group="fontsize"] button').forEach(b => {
        b.classList.toggle('on', b.dataset.fontsize === fs);
      });
    }
  } catch (e) {}
}

/* ---------- Sidebar mobile toggle ---------- */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
document.getElementById('menu-btn').addEventListener('click', openSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

/* ---------- Settings menu ---------- */
const settingsMenu = document.getElementById('settings-menu');
document.getElementById('settings-btn').addEventListener('click', e => {
  e.stopPropagation();
  settingsMenu.classList.toggle('show');
});
document.addEventListener('click', e => {
  if (!settingsMenu.contains(e.target) && e.target.id !== 'settings-btn') {
    settingsMenu.classList.remove('show');
  }
});
// font size buttons
document.querySelectorAll('.settings-options button[data-fontsize]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.settings-options button[data-fontsize]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.body.dataset.fontsize = btn.dataset.fontsize;
    STATE.fontsize = btn.dataset.fontsize;
    saveState();
  });
});
document.getElementById('reset-progress').addEventListener('click', async () => {
  if (confirm('重置全部阅读进度？此操作不可撤销。')) {
    STATE.read.clear();
    await saveState();
    buildTOC();
    settingsMenu.classList.remove('show');
  }
});
document.getElementById('print-chapter').addEventListener('click', () => {
  window.print();
  settingsMenu.classList.remove('show');
});

/* ---------- Search modal ---------- */
const searchModal = document.getElementById('search-modal');
const searchInput = document.getElementById('search-input');

function openSearch() {
  searchModal.classList.add('show');
  setTimeout(() => searchInput.focus(), 100);
}
function closeSearch() {
  searchModal.classList.remove('show');
  searchInput.value = '';
  document.getElementById('search-results').innerHTML = '<div class="search-empty">输入关键词，搜索全书内容</div>';
}
document.getElementById('search-btn').addEventListener('click', openSearch);
document.getElementById('modal-close').addEventListener('click', closeSearch);
searchModal.addEventListener('click', e => { if (e.target === searchModal) closeSearch(); });

document.addEventListener('keydown', e => {
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    openSearch();
  }
  if (e.key === 'Escape' && searchModal.classList.contains('show')) {
    closeSearch();
  }
  // arrow keys for next/prev
  if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName) && !searchModal.classList.contains('show')) {
    if (!STATE.currentId) return;
    const idx = BOOK.units.findIndex(u => u.id === STATE.currentId);
    if (e.key === 'ArrowLeft' && idx > 0) loadChapter(BOOK.units[idx - 1].id);
    if (e.key === 'ArrowRight' && idx < BOOK.units.length - 1) loadChapter(BOOK.units[idx + 1].id);
  }
});

let searchTimer = null;
searchInput.addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(e.target.value), 150);
});

function stripHTML(s) {
  return s.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ');
}
function escHTML(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function doSearch(q) {
  q = q.trim();
  const resultsEl = document.getElementById('search-results');
  if (!q) {
    resultsEl.innerHTML = '<div class="search-empty">输入关键词，搜索全书内容</div>';
    return;
  }
  if (q.length === 1 && /[\u4e00-\u9fa5]/.test(q)) {
    // single chinese char — search anywhere
  }
  const results = [];
  const qLower = q.toLowerCase();
  BOOK.units.forEach(unit => {
    const titleHit = unit.chapTitle.toLowerCase().includes(qLower);
    const cleanContent = stripHTML(unit.content);
    const idx = cleanContent.toLowerCase().indexOf(qLower);
    if (titleHit || idx >= 0) {
      let snippet = '';
      if (idx >= 0) {
        const start = Math.max(0, idx - 40);
        const end = Math.min(cleanContent.length, idx + q.length + 80);
        snippet = (start > 0 ? '…' : '') + cleanContent.slice(start, end) + (end < cleanContent.length ? '…' : '');
      } else {
        snippet = cleanContent.slice(0, 120) + '…';
      }
      // highlight
      const pattern = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      const highlighted = escHTML(snippet).replace(pattern, m => `<mark>${m}</mark>`);
      const titleHighlighted = escHTML(unit.chapTitle).replace(pattern, m => `<mark>${m}</mark>`);
      const tocVol = BOOK.toc.find(v => v.chapters.some(c => c.id === unit.id));
      const volLabel = tocVol ? (tocVol.volNum === '序' ? '自序' : tocVol.volNum === '附录' ? '附录' : `第 ${tocVol.volNum} 卷 · ${tocVol.volTitle}`) : '';
      results.push({
        id: unit.id,
        titleHTML: titleHighlighted,
        volLabel: volLabel,
        snippet: highlighted,
        score: titleHit ? 100 : (idx >= 0 ? 50 - Math.min(50, idx / 50) : 0)
      });
    }
  });
  results.sort((a, b) => b.score - a.score);
  if (results.length === 0) {
    resultsEl.innerHTML = `<div class="search-empty">未找到「${escHTML(q)}」相关内容</div>`;
    return;
  }
  resultsEl.innerHTML = results.slice(0, 30).map(r => `
    <button class="search-result" onclick="loadChapter('${r.id}'); document.getElementById('search-modal').classList.remove('show'); document.getElementById('search-input').value='';">
      <div class="search-result-vol">${r.volLabel}</div>
      <div class="search-result-title">${r.titleHTML}</div>
      <div class="search-result-snippet">${r.snippet}</div>
    </button>
  `).join('');
}

/* ---------- Start button ---------- */
document.getElementById('start-btn').addEventListener('click', () => {
  // Find first unread chapter
  let target = STATE.currentId;
  if (!target) {
    const firstUnread = BOOK.units.find(u => u.kind === 'chapter' && !STATE.read.has(u.id));
    target = firstUnread ? firstUnread.id : BOOK.units[0].id;
  }
  loadChapter(target);
});

/* ---------- Init ---------- */
(async () => {
  await loadState();
  buildTOC();
  // if user had a previously-open chapter, load it; otherwise show home cover
  if (STATE.currentId) {
    const exists = BOOK.units.find(u => u.id === STATE.currentId);
    if (exists) loadChapter(STATE.currentId);
  }
})();
</script>
