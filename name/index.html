<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生肖姓名学 · 五得正解 | 黄文森 Wilson Ooi</title>
<meta name="description" content="《生肖姓名学 · 五得正解》在线学习版 — 九卷三十六章完整书籍，姓名学之渊源、方法、字根、生肖、实战与智慧 by 黄文森 Wilson Ooi">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     生肖姓名学 · 五得正解 · 在线学习版
     翰林书院 navy/gold luxury aesthetic
     ============================================================ */
  :root {
    --ink-deep: #0a1628;
    --ink: #142847;
    --ink-mid: #1a3661;
    --ink-soft: #2d4a7c;
    --ink-pale: #4a6285;
    --gold: #c9a961;
    --gold-bright: #d4b876;
    --gold-pale: #f4e4bc;
    --gold-dim: #8b7355;
    --cream: #fdf9ed;
    --cream-warm: #f8f4e3;
    --paper: #fdfbf3;
    --paper-warm: #f5f0e0;
    --bone: #fafaf5;
    --line: #d4c4a0;
    --line-soft: #e7dfc6;
    --line-paper: #ebe4d0;
    --slate-1: #1c2532;
    --slate-2: #2d3748;
    --slate-3: #4a5568;
    --slate-4: #718096;
    --slate-5: #8b7355;
    --rose: #b91c1c;
    --rose-bg: #fef2f2;
    --jade: #047857;
    --jade-bg: #f0fdf4;
    --serif: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
    --display: 'Cormorant Garamond', 'Noto Serif SC', serif;
    --sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --sidebar-w: 320px;
    --topbar-h: 60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  body {
    font-family: var(--serif);
    color: var(--slate-1);
    background: var(--paper-warm);
    overflow-x: hidden;
    font-size: 16px;
    line-height: 2.0;
  }

  /* ============================================================
     LAYOUT
     ============================================================ */
  .app {
    display: grid;
    grid-template-rows: var(--topbar-h) 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ============================================================
     TOP BAR
     ============================================================ */
  .topbar {
    background: linear-gradient(135deg, var(--ink-deep), var(--ink-mid));
    color: var(--gold-pale);
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid var(--gold);
    position: relative;
    z-index: 50;
    box-shadow: 0 2px 16px rgba(10, 22, 40, 0.18);
  }
  .topbar::before, .topbar::after {
    content: '';
    position: absolute;
    top: 8px;
    width: 14px;
    height: 14px;
    border: 1px solid var(--gold);
    opacity: 0.6;
  }
  .topbar::before { left: 8px; border-right: none; border-bottom: none; }
  .topbar::after { right: 8px; border-left: none; border-bottom: none; }

  .menu-btn {
    background: none;
    border: 1px solid rgba(201, 169, 97, 0.4);
    color: var(--gold);
    width: 36px;
    height: 36px;
    border-radius: 2px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-right: 14px;
    transition: all 0.2s;
  }
  .menu-btn:hover { background: rgba(201, 169, 97, 0.15); }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
    min-width: 0;
  }
  .brand-glyph {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.15em;
    line-height: 1;
    border-right: 1px solid rgba(201, 169, 97, 0.35);
    padding-right: 16px;
    white-space: nowrap;
  }
  .brand-meta {
    flex: 1;
    min-width: 0;
  }
  .brand-title {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--gold-bright);
    font-weight: 600;
    letter-spacing: 0.08em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .brand-author {
    font-family: var(--display);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-top: 2px;
  }

  .top-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .top-btn {
    background: none;
    border: 1px solid rgba(201, 169, 97, 0.4);
    color: var(--gold);
    padding: 7px 14px;
    border-radius: 2px;
    cursor: pointer;
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: 0.12em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .top-btn:hover {
    background: rgba(201, 169, 97, 0.15);
    color: var(--gold-pale);
  }
  .top-btn.icon-only {
    width: 36px;
    height: 36px;
    padding: 0;
    justify-content: center;
  }
  .top-btn .label {
    display: inline;
  }
  @media (max-width: 720px) {
    .top-btn .label { display: none; }
    .top-btn { width: 36px; height: 36px; padding: 0; justify-content: center; }
    .brand-author { display: none; }
    .brand-glyph { font-size: 18px; padding-right: 12px; }
    .brand-title { font-size: 12px; }
  }

  /* ============================================================
     MAIN AREA
     ============================================================ */
  .main {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    overflow: hidden;
  }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  .sidebar {
    background: linear-gradient(180deg, var(--cream) 0%, var(--paper) 100%);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 16px 0 80px;
    position: relative;
  }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  .sidebar-header {
    padding: 0 20px 14px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 10px;
  }
  .sidebar-title {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-mid);
    font-weight: 700;
    letter-spacing: 0.3em;
    padding-left: 0.3em;
    text-align: center;
    margin-bottom: 8px;
  }
  .sidebar-progress {
    background: var(--line-soft);
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    margin: 8px 0 4px;
  }
  .sidebar-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-bright));
    transition: width 0.5s;
    width: 0%;
  }
  .sidebar-progress-text {
    text-align: center;
    font-size: 11px;
    color: var(--slate-5);
    letter-spacing: 0.12em;
  }

  .vol-block { padding: 0; }
  .vol-head {
    padding: 12px 20px 8px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    border-bottom: 1px dashed transparent;
  }
  .vol-head:hover { background: rgba(201, 169, 97, 0.06); }
  .vol-num-badge {
    display: inline-block;
    font-family: var(--display);
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-bottom: 2px;
    font-weight: 700;
  }
  .vol-name {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-mid);
    font-weight: 700;
    letter-spacing: 0.18em;
    line-height: 1.4;
  }
  .vol-name::before {
    content: '▾ ';
    color: var(--gold);
    transition: transform 0.2s;
    display: inline-block;
    font-size: 10px;
  }
  .vol-block.collapsed .vol-name::before { content: '▸ '; }
  .vol-sub {
    font-size: 11px;
    color: var(--slate-5);
    letter-spacing: 0.05em;
    margin-top: 3px;
    padding-left: 14px;
    line-height: 1.5;
  }
  .vol-chapters {
    padding: 4px 0 12px;
    transition: max-height 0.3s ease-out;
    overflow: hidden;
  }
  .vol-block.collapsed .vol-chapters {
    max-height: 0;
    padding: 0;
  }
  .chap-link {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 22px 7px 32px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--slate-2);
    font-size: 13px;
    line-height: 1.6;
    position: relative;
    text-align: left;
    background: none;
    border: none;
    width: 100%;
    font-family: var(--serif);
  }
  .chap-link:hover {
    background: rgba(201, 169, 97, 0.08);
    color: var(--ink-mid);
  }
  .chap-link.active {
    background: linear-gradient(90deg, rgba(201, 169, 97, 0.15), transparent);
    color: var(--ink-mid);
    font-weight: 600;
  }
  .chap-link.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 7px;
    bottom: 7px;
    width: 3px;
    background: var(--gold);
    border-radius: 0 2px 2px 0;
  }
  .chap-link .chap-check {
    width: 14px;
    height: 14px;
    border: 1px solid var(--line);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
    background: white;
    transition: all 0.2s;
    position: relative;
  }
  .chap-link.read .chap-check {
    background: var(--gold);
    border-color: var(--gold);
  }
  .chap-link.read .chap-check::after {
    content: '✓';
    color: white;
    font-size: 9px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    line-height: 1;
  }
  .chap-link .chap-title-text {
    flex: 1;
    word-break: break-word;
  }
  .chap-link .chap-num-small {
    font-size: 10px;
    color: var(--slate-5);
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 1px;
    font-family: var(--display);
  }
  .chap-link.bookmarked .chap-title-text::after {
    content: ' ★';
    color: var(--gold);
    font-size: 10px;
  }

  /* ============================================================
     READING AREA
     ============================================================ */
  .reading {
    overflow-y: auto;
    background: var(--paper-warm);
    position: relative;
  }
  .reading::-webkit-scrollbar { width: 10px; }
  .reading::-webkit-scrollbar-track { background: transparent; }
  .reading::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  .reading::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  .reading-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 50px 60px 120px;
    font-size: 17px;
    line-height: 2.05;
    color: var(--slate-1);
    transition: font-size 0.2s;
  }
  body[data-fontsize="L"] .reading-inner { font-size: 19px; line-height: 2.15; }
  body[data-fontsize="XL"] .reading-inner { font-size: 21px; line-height: 2.25; }
  body[data-fontsize="S"] .reading-inner { font-size: 15px; line-height: 1.95; }

  /* CONTENT TYPOGRAPHY (mirrors the print book) */
  .reading-inner h1 {
    font-family: var(--serif);
    font-size: 32px;
    color: var(--ink-mid);
    letter-spacing: 0.13em;
    font-weight: 700;
    line-height: 1.4;
    margin: 0 0 8px;
  }
  .reading-inner h2 {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink-mid);
    letter-spacing: 0.1em;
    margin: 36px 0 14px;
    padding-left: 14px;
    border-left: 4px solid var(--gold);
    font-weight: 700;
    line-height: 1.5;
  }
  .reading-inner h3 {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink-soft);
    margin: 24px 0 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .reading-inner h3::before {
    content: '◆ ';
    color: var(--gold);
  }
  .reading-inner h4 {
    font-size: 16px;
    color: var(--slate-2);
    margin: 16px 0 8px;
    font-weight: 700;
  }
  .reading-inner p {
    margin: 14px 0;
    text-indent: 2em;
    text-align: justify;
  }
  .reading-inner p.no-indent { text-indent: 0; }
  .reading-inner ul, .reading-inner ol {
    margin: 14px 0;
    padding-left: 28px;
  }
  .reading-inner li {
    margin: 6px 0;
    line-height: 1.95;
  }
  .reading-inner strong { color: var(--ink-mid); font-weight: 700; }
  .reading-inner em {
    color: var(--gold-dim);
    font-style: normal;
    font-weight: 600;
  }

  /* Tables */
  .reading-inner table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 14px;
    line-height: 1.7;
    box-shadow: 0 4px 12px rgba(26, 54, 97, 0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .reading-inner thead {
    background: linear-gradient(135deg, var(--ink-mid), var(--ink-soft));
    color: var(--gold-pale);
  }
  .reading-inner th {
    padding: 10px 12px;
    text-align: center;
    font-weight: 700;
    letter-spacing: 0.06em;
    font-size: 14px;
  }
  .reading-inner td {
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--line-soft);
    background: white;
    vertical-align: top;
  }
  .reading-inner tbody tr:nth-child(even) td { background: var(--paper); }
  .reading-inner td.center { text-align: center; }

  /* Callouts (mirrors book.html) */
  .reading-inner .callout {
    margin: 22px 0;
    padding: 16px 22px;
    border-left: 5px solid var(--gold);
    background: var(--cream);
    border-radius: 0 3px 3px 0;
  }
  .reading-inner .callout-title {
    font-weight: 700;
    color: var(--ink-mid);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
    font-size: 15px;
  }
  .reading-inner .callout p { text-indent: 0; margin: 6px 0; }
  .reading-inner .callout p:last-child { margin-bottom: 0; }

  .reading-inner .warning {
    margin: 22px 0;
    padding: 16px 22px;
    border-left: 5px solid var(--rose);
    background: var(--rose-bg);
    border-radius: 0 3px 3px 0;
  }
  .reading-inner .warning p { text-indent: 0; margin: 6px 0; }
  .reading-inner .warning strong:first-child::before { content: '⚠ '; }

  .reading-inner .tip {
    margin: 22px 0;
    padding: 16px 22px;
    border-left: 5px solid var(--jade);
    background: var(--jade-bg);
    border-radius: 0 3px 3px 0;
  }
  .reading-inner .tip p { text-indent: 0; margin: 6px 0; }
  .reading-inner .tip strong:first-child::before { content: '✦ '; }

  .reading-inner .heart {
    margin: 30px 0;
    padding: 26px 32px;
    background:
      radial-gradient(circle at 0% 0%, rgba(201, 169, 97, 0.12) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(201, 169, 97, 0.12) 0%, transparent 50%),
      linear-gradient(135deg, var(--cream-warm), var(--cream));
    border: 1.5px solid var(--gold);
    border-radius: 4px;
    text-align: center;
    position: relative;
  }
  .reading-inner .heart::before {
    content: '❖';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--cream);
    color: var(--gold);
    padding: 0 8px;
    font-size: 16px;
  }
  .reading-inner .heart-title {
    font-weight: 700;
    color: var(--ink-mid);
    font-size: 17px;
    margin-bottom: 10px;
    letter-spacing: 0.22em;
    padding-left: 0.22em;
  }
  .reading-inner .heart p {
    text-indent: 0;
    margin: 0;
    font-style: italic;
    color: var(--slate-3);
    line-height: 2.1;
  }

  .reading-inner .example {
    margin: 22px 0;
    padding: 18px 22px;
    border: 1.5px dashed var(--gold-dim);
    background: var(--bone);
    border-radius: 3px;
  }
  .reading-inner .example-title {
    font-weight: 700;
    color: var(--gold-dim);
    margin-bottom: 8px;
    letter-spacing: 0.06em;
    font-size: 14px;
  }
  .reading-inner .example-title::before { content: '【实例】'; }
  .reading-inner .example p { text-indent: 0; margin: 6px 0; }

  .reading-inner blockquote {
    margin: 22px 12px;
    padding: 14px 22px;
    border-left: 4px solid var(--gold);
    font-size: 15px;
    color: var(--slate-3);
    font-style: italic;
    line-height: 2.0;
    background: var(--paper);
    border-radius: 0 3px 3px 0;
  }
  .reading-inner blockquote p { text-indent: 0; margin: 4px 0; }

  .reading-inner .lead {
    font-size: 17px;
    color: var(--slate-2);
    text-indent: 0;
    border-left: 5px solid var(--gold);
    padding: 14px 22px;
    background: var(--cream);
    margin: 18px 0 24px;
    line-height: 2.0;
    border-radius: 0 3px 3px 0;
  }

  /* Zodiac chapter header */
  .reading-inner .zodiac-header {
    background: linear-gradient(135deg, var(--ink-mid), var(--ink-soft));
    color: var(--gold-pale);
    padding: 24px 28px;
    margin: 0 0 20px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .reading-inner .zodiac-header::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 5mm;
    background: var(--gold);
  }
  .reading-inner .zodiac-header .zodiac-title {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 0.3em;
    padding-left: 0.3em;
    margin: 0;
    color: var(--gold-pale);
  }
  .reading-inner .zodiac-header .zodiac-subtitle {
    font-size: 13px;
    color: var(--gold-bright);
    letter-spacing: 0.35em;
    padding-left: 0.35em;
    margin-top: 6px;
  }
  .reading-inner .zodiac-attr {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 12px 0;
  }
  .reading-inner .attr-tag {
    background: var(--cream);
    border: 1px solid var(--gold);
    padding: 4px 10px;
    font-size: 12px;
    color: var(--ink-mid);
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .reading-inner .attr-tag strong { color: var(--gold-dim); margin-right: 4px; }

  .reading-inner .radical-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin: 8px 0;
    padding: 8px 14px;
    background: var(--bone);
    border-left: 3px solid var(--gold);
    border-radius: 0 2px 2px 0;
    font-size: 14px;
    line-height: 1.85;
  }
  .reading-inner .radical-row .label {
    flex: 0 0 110px;
    color: var(--gold-dim);
    font-weight: 700;
  }
  .reading-inner .radical-row .content { flex: 1; }
  .reading-inner .radical-row strong { color: var(--ink-mid); }

  .reading-inner .term {
    display: inline-block;
    background: #fef3c7;
    color: var(--gold-dim);
    padding: 1px 6px;
    border-radius: 2px;
    font-weight: 600;
    margin: 0 2px;
    font-size: 0.94em;
  }

  .reading-inner .divider {
    text-align: center;
    margin: 32px 0;
    color: var(--gold);
    letter-spacing: 0.5em;
    opacity: 0.7;
  }

  .reading-inner .signature {
    text-align: right;
    margin-top: 40px;
    color: var(--slate-3);
    line-height: 2;
    letter-spacing: 0.05em;
  }
  .reading-inner .signature strong {
    color: var(--ink-mid);
    font-size: 17px;
  }

  .reading-inner hr {
    margin: 32px 0;
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    position: relative;
  }
  .reading-inner hr::after {
    content: '❖';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--paper-warm);
    color: var(--gold);
    padding: 0 6px;
    font-size: 12px;
  }

  /* ============================================================
     CHAPTER HEADER (above content)
     ============================================================ */
  .chap-header {
    margin: 0 0 32px;
    padding-bottom: 22px;
    border-bottom: 2px solid var(--gold);
    position: relative;
  }
  .chap-header::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 80px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }
  .chap-vol-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    padding-left: 0.3em;
    margin-bottom: 14px;
    text-transform: uppercase;
    font-family: var(--display);
    font-weight: 600;
  }
  .chap-vol-tag .vol-num-pill {
    background: var(--gold);
    color: var(--ink-deep);

", "num": "第 二 章", "title": "单姓单名之结构：以张山为例"}, {"id": "v五-c3", "num": "第 三 章", "title": "单姓复名之结构：最常见的标准格局"}, {"id": "v五-c4", "num": "第 四 章", "title": "复姓之结构：欧阳、司马、上官等"}, {"id": "v五-c5", "num": "第 五 章", "title": "阴阳调和：名字内部之能量平衡"}]}, {"volNum": "六", "volTitle": "忌 之 严 守", "volSubtitle": "三大凶运 · 通用禁字 · 女性专忌", "chapters": [{"id": "v六-c1", "num": "第 一 章", "title": "三大凶运字详解：劳碌、受制、降格"}, {"id": "v六-c2", "num": "第 二 章", "title": "通用禁用字大全：传统姓名学集萃"}, {"id": "v六-c3", "num": "第 三 章", "title": "女性专用禁忌：刚柔有别，宜柔不宜刚"}, {"id": "v六-c4", "num": "第 四 章", "title": "字形不利：易招破败之结构"}]}, {"volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "chapters": [{"id": "v七-c1", "num": "第 一 章", "title": "子 鼠：夜行机灵，五谷得位"}, {"id": "v七-c2", "num": "第 二 章", "title": "丑 牛：勤恳踏实，门栏五谷"}, {"id": "v七-c3", "num": "第 三 章", "title": "寅 虎：山林之王，称霸气场"}, {"id": "v七-c4", "num": "第 四 章", "title": "卯 兔：温和谨慎，洞穴五谷"}, {"id": "v七-c5", "num": "第 五 章", "title": "辰 龙：腾云之神，得位为本"}, {"id": "v七-c6", "num": "第 六 章", "title": "巳 蛇：灵动幽隐，彩衣升格"}, {"id": "v七-c7", "num": "第 七 章", "title": "午 马：奔腾驰骋，山林彩衣"}, {"id": "v七-c8", "num": "第 八 章", "title": "未 羊：温和柔顺，五谷有福"}, {"id": "v七-c9", "num": "第 九 章", "title": "申 猴：聪慧灵巧，木上称王"}, {"id": "v七-c10", "num": "第 十 章", "title": "酉 鸡：司晨啼旦，戴冠为荣"}, {"id": "v七-c11", "num": "第 十 一 章", "title": "戌 狗：忠义守家，三口考试"}, {"id": "v七-c12", "num": "第 十 二 章", "title": "亥 猪：丰盈憨厚，水边有福"}]}, {"volNum": "八", "volTitle": "用 之 实 战", "volSubtitle": "起名七步 · 综合判断 · 改名时机", "chapters": [{"id": "v八-c1", "num": "第 一 章", "title": "起名七步流程：从命到名的完整路径"}, {"id": "v八-c2", "num": "第 二 章", "title": "综合判断法：多维度交叉验证"}, {"id": "v八-c3", "num": "第 三 章", "title": "实例分析：从命盘到名字"}, {"id": "v八-c4", "num": "第 四 章", "title": "改名时机：何时改、如何改"}]}, {"volNum": "九", "volTitle": "智 之 辨 明", "volSubtitle": "理性认知 · 现代审视 · 实践智慧", "chapters": [{"id": "v九-c1", "num": "第 一 章", "title": "传统与现代之审视：姓名学的边界"}, {"id": "v九-c2", "num": "第 二 章", "title": "心理暗示与名字之力量"}, {"id": "v九-c3", "num": "第 三 章", "title": "起名实践：让传统智慧落地"}]}, {"volNum": "附录", "volTitle": "速 查 工 具", "volSubtitle": "字根速查 · 生肖宜忌 · 禁字汇总 · 常见问答", "chapters": [{"id": "v附录-c附1", "num": "附 录 一", "title": "部首字根速查表"}, {"id": "v附录-c附2", "num": "附 录 二", "title": "十二生肖宜忌字总表"}, {"id": "v附录-c附3", "num": "附 录 三", "title": "起名禁忌字汇总"}, {"id": "v附录-c附4", "num": "附 录 四", "title": "常见问答"}, {"id": "v附录-c后记", "num": "后  记", "title": "名启天命，字定乾坤"}]}], "units": [{"id": "preface", "kind": "preface", "volNum": "序", "volTitle": "自序", "chapNum": "", "chapTitle": "名是一把钥匙", "content": "<h1>自　　序</h1>\n  <div class=\"preface-sub\">名 　 是 　 一 　 把 　 钥 　 匙</div>\n  <div class=\"ornament-line\"></div>\n\n  <p>姓名，不只是一个符号。在华夏文化里，名字是父母递交给孩子的第一份礼物，是天地之间最早一次为这个生命定下的能量印记。古人云：「赐子千金，不如教子一艺；教子一艺，不如赐子佳名。」一字之差，气场迥异；一名之妙，运程顿改。</p>\n\n  <p>我研习生肖姓名学多年，又深入八白姓名学、张科勉老师之神乎奇际系统，复以数字易学为体，三系互参，渐悟一个朴素的道理——姓名学并非占卜算命，而是一门关于「能量配对」的学问。生肖是先天的本命，是父母赐予的本质；名字是后天的助力，是人为可调的客体。本与客之间，相生则旺，相克则衰；契合则顺，悖逆则阻。这便是姓名学的根本心法。</p>\n\n  <p>市面之书，或失于浅薄，只列吉字凶字而无理；或失于神秘，玄之又玄令人却步。我编写此书，立意在「正解」二字——以正本清源之笔，将三合三会、五得五失、字根字义之理一一阐明；以现代之眼，回溯古人造字之智慧，让传统不再陌生，让玄学回归生活。</p>\n\n  <p>此书在原《起名五得与用字宜忌宝典》之上，作了大幅扩充与重构。增补了「地支藏干」之深层理论，详解了「字根识别法」与「字形阴阳论」，重写了十二生肖每一肖之天性、五得、字例、忌讳与实战要点，又加入「起名七步流程」与「综合判断法」之实操指南，并附以理性认知一卷，提醒读者：名字是助推器，绝非命运之主宰。</p>\n\n  <p>愿这本书成为每一位起名者、每一位为人父母者、每一位欲改运调名者手边的工具书。读者若能由此而识得自己生肖之喜忌，由名而通其命，由命而知其用，便不负我编著此书之初心。</p>\n\n  <p>是为序。</p>\n\n  <div class=\"signature\">\n    <strong>黄文森（Wilson Ooi）</strong><br>\n    谨识于马来西亚<br>\n    丙午年 · 立春后\n  </div>"}, {"id": "v一-c1", "kind": "chapter", "volNum": "一", "volTitle": "道 之 根 本", "volSubtitle": "姓名学的渊源与哲理", "volQuote": "「夫名以正体，字以表德。形以定名，名以定事，事以验名。」<br>—— 姓名学之根本心法", "chapNum": "第 一 章", "chapTitle": "姓名乃能量之符", "content": "<p class=\"lead\">在中华文化的语境里，姓名从来不只是一个称谓。它是一段被父母刻写、被天地承认、被一生反复呼唤的能量符号。每呼一次，便是一次微小的仪式；每写一次，便是一次潜在的诵念。古人造字、定名，自有深意。</p>\n\n<h2>一、名字的三重身份</h2>\n\n<p>姓名在中国传统文化中，承载着三重身份。其一为<strong>识别符号</strong>，使人有别于他人，是社会层面的功能；其二为<strong>家族印记</strong>，姓承血脉，名寓期许，是家族层面的延续；其三，也是姓名学最为关注的——它是一个<strong>能量符号</strong>，每一笔每一画，每一字每一音，皆与命主气场相互作用，潜移默化地影响其一生的走向。</p>\n\n<p>《说文解字》言：「名，自命也；从口从夕。夕者冥也，冥不相见，故以口自名。」古人最初造名，是为黑夜中互相辨识。然而当一个人的名字日复一日被呼唤、被书写、被回应，它便不再是一个单纯的符号，而成为一种持续不断的能量振动，与本命气场共振，相生则旺，相克则损。</p>\n\n<h2>二、姓名学的源起与流派</h2>\n\n<p>姓名学并非凭空而来，而是华夏先民对天地、生命、文字三者关系反复体察的结晶。其源头，可上溯至：</p>\n\n<ul>\n  <li><strong>《易经》</strong>——立阴阳、定五行、明吉凶；</li>\n  <li><strong>《说文解字》</strong>——观字形、析字源、知字义；</li>\n  <li><strong>干支历法</strong>——以天干地支纪年月日时，为生肖所本；</li>\n  <li><strong>春秋礼数</strong>——以名定身分，以字明德行。</li>\n</ul>\n\n<p>历经数千年演变，姓名学渐分流派。其荦荦大者有四：</p>\n\n<table>\n  <thead>\n    <tr><th>流　派</th><th>核心理论</th><th>主要依据</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>生肖姓名学</strong></td><td>以生肖为本命，以字根为客体，论本与客之生克喜忌</td><td>地支五行 · 三合六合 · 字根学</td></tr>\n    <tr><td class=\"center\"><strong>三才五格</strong></td><td>以姓名笔画立天人地外总五格，论笔画数之吉凶</td><td>笔画数理 · 三才配置</td></tr>\n    <tr><td class=\"center\"><strong>八字姓名学</strong></td><td>以八字喜用神为依据，调候补益</td><td>四柱命理 · 五行调候</td></tr>\n    <tr><td class=\"center\"><strong>音韵姓名学</strong></td><td>以字音五行配命主八字</td><td>音韵学 · 五音五行</td></tr>\n  </tbody>\n</table>\n\n<p>本书所论，主以<strong>生肖姓名学</strong>为体，旁参字根、字音、字形之理，自成一系。其特色在于：以「生肖」这一最为人所熟知的命理符号作为切入点，使读者能即学即用，无须深研八字，亦能为自己与至亲选出契合命格之佳名。</p>\n\n<h2>三、姓名作用之机理</h2>\n\n<p>姓名何以能影响命运？这并非玄学，而有其朴素的道理。约可归为三层：</p>\n\n<h3>一者，能量振动</h3>\n<p>每一个汉字皆有其独特的字形、字音、字义。形为视觉之能，音为听觉之能，义为意识之能。三者合一，便构成这个字独特的「能量频率」。一个人一生中，自己的名字将被反复呼唤数十万次，这种长期的能量振动，足以与本命气场产生共鸣或排斥。</p>\n\n<h3>二者，心理暗示</h3>\n<p>名字带何种字义，便对自我形成何种心理暗示。名「文」者，自幼被书卷气熏陶；名「勇」者，潜意识被勇敢驱使。心理学称之为「皮格马利翁效应」（Pygmalion Effect），即长期的暗示会塑造一个人的自我认知，进而塑造其行为模式。</p>\n\n<h3>三者，社会反馈</h3>\n<p>名字也影响他人对自己的第一印象。一个雅致的名字，让人愿意亲近；一个粗鄙的名字，让人敬而远之。一来一往，社会反馈不断累积，便逐渐影响一个人的人脉、机遇与命运走向。</p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">心法点拨</div>\n  <p>姓名学之所以「灵」，不在玄秘，而在三力合一——能量、心理、社会，三股力量同方向作用，便能在数十年间累积成可观的命运推力。好名字是助推器，坏名字是绊脚石；前者顺风，后者逆水。此为本学问之根本。</p>\n</div>\n\n<h2>四、命与名的关系：先天与后天</h2>\n\n<p>命，是先天，是与生俱来的天赋；名，是后天，是父母与社会赋予的工具。两者关系，可以下表概括：</p>\n\n<table>\n  <thead>\n    <tr><th>分　类</th><th>命（先天）</th><th>名（后天）</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>来源</strong></td><td>父母遗传 · 天地时空</td><td>父母赐予 · 自我择取</td></tr>\n    <tr><td class=\"center\"><strong>本质</strong></td><td>本质 · 不可改</td><td>外力 · 可调可改</td></tr>\n    <tr><td class=\"center\"><strong>作用</strong></td><td>定大局 · 主体</td><td>调走向 · 客体</td></tr>\n    <tr><td class=\"center\"><strong>占比</strong></td><td>命三分 · 先天</td><td>名七分 · 后天</td></tr>\n  </tbody>\n</table>\n\n<p>张科勉老师有云：「命占三分先天，名占七分后天。」此言虽似偏重于名，但其深意是——先天虽不可改，后天之力却可补强、可疏导、可调动；在大局已定之下，名字便是那「使船易行、令风顺帆」的关键之力。</p>\n\n<h2>五、本书要旨</h2>\n\n<p>本书核心理念，可凝练为十六字：</p>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">本 书 心 法</div>\n  <p>本主体性 · 客为助力 · 五得圆满 · 六亲调和</p>\n</div>\n\n<p>本——以生肖为本，定其天性；客——以字根为客，论其助克；五得——衣食、根基、地位、人缘、福德五者俱全，方为吉名；六亲——父母、兄弟、夫妻、子女、贵人、自身六重关系皆需顾及。此十六字，贯穿全书，读者宜默记于心。</p>\n\n<!-- 第二章 -->"}, {"id": "v一-c2", "kind": "chapter", "volNum": "一", "volTitle": "道 之 根 本", "volSubtitle": "姓名学的渊源与哲理", "volQuote": "「夫名以正体，字以表德。形以定名，名以定事，事以验名。」<br>—— 姓名学之根本心法", "chapNum": "第 二 章", "chapTitle": "阴阳五行总论", "content": "<p class=\"lead\">姓名学若失去阴阳五行，便如树之失根、水之失源。阴阳是宇宙的两极，五行是万物的纲领。通晓此二者，方能从纷繁字根中识别其能量属性，从而选出契合本命之佳字。</p>\n\n<h2>一、阴阳之道</h2>\n\n<p>《易传·系辞》曰：「一阴一阳之谓道。」阴阳是中国哲学的最高范畴，也是姓名学的第一原理。所谓阴阳，并非神秘玄学，而是对宇宙万物两极对立又统一之规律的概括。</p>\n\n<table>\n  <thead>\n    <tr><th>属　性</th><th>阳</th><th>阴</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>象征</strong></td><td>天 · 日 · 男 · 火 · 动</td><td>地 · 月 · 女 · 水 · 静</td></tr>\n    <tr><td class=\"center\"><strong>气质</strong></td><td>刚 · 强 · 进 · 显 · 上</td><td>柔 · 弱 · 退 · 隐 · 下</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>上 · 外 · 左 · 前</td><td>下 · 内 · 右 · 后</td></tr>\n    <tr><td class=\"center\"><strong>姓名学应用</strong></td><td>笔画奇数 · 字形舒展 · 阳性字根</td><td>笔画偶数 · 字形内敛 · 阴性字根</td></tr>\n  </tbody>\n</table>\n\n<p>阴阳之妙，在于平衡。纯阳无阴则刚易折，纯阴无阳则柔易萎。一个好名字，须阴阳相济、刚柔得宜。男命可略偏阳，女命可略偏阴，但都不可偏废。</p>\n\n<div class=\"tip\">\n  <div class=\"tip-title\">字形阴阳判读</div>\n  <p>字形结构有三种基本形式，每种皆有阴阳之分：</p>\n  <p>一、<strong>左右结构</strong>（如「林、明、陈」）——左为阴，右为阳；</p>\n  <p>二、<strong>上下结构</strong>（如「家、安、宇」）——上为阳，下为阴；</p>\n  <p>三、<strong>内外结构</strong>（如「园、国、回」）——外为阳，内为阴。</p>\n  <p>取名时，可借此判断字之阴阳重心，再与本命阴阳调和。</p>\n</div>\n\n<h2>二、五行之理</h2>\n\n<p>五行——金、木、水、火、土，是中国古人对宇宙构成与运行规律的总结。一切事物，皆可以五行归类；一切关系，皆可以生克概括。</p>\n\n<h3>五行的基本属性</h3>\n\n<table>\n  <thead>\n    <tr><th>五行</th><th>象征</th><th>方位</th><th>季节</th><th>颜色</th><th>性格</th><th>身体</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>金</strong></td><td>刀 · 利</td><td>西</td><td>秋</td><td>白 · 银</td><td>刚毅 · 果决</td><td>肺 · 大肠 · 皮肤</td></tr>\n    <tr><td class=\"center\"><strong>木</strong></td><td>草 · 生</td><td>东</td><td>春</td><td>青 · 绿</td><td>仁慈 · 进取</td><td>肝 · 胆 · 筋骨</td></tr>\n    <tr><td class=\"center\"><strong>水</strong></td><td>流 · 智</td><td>北</td><td>冬</td><td>黑 · 蓝</td><td>聪敏 · 流变</td><td>肾 · 膀胱 · 耳</td></tr>\n    <tr><td class=\"center\"><strong>火</strong></td><td>炎 · 明</td><td>南</td><td>夏</td><td>红 · 紫</td><td>热烈 · 急躁</td><td>心 · 小肠 · 血脉</td></tr>\n    <tr><td class=\"center\"><strong>土</strong></td><td>厚 · 载</td><td>中</td><td>季夏 · 四立</td><td>黄 · 褐</td><td>沉稳 · 守信</td><td>脾 · 胃 · 肌肉</td></tr>\n  </tbody>\n</table>\n\n<h3>五行生克之序</h3>\n\n<p>五行之间，有生有克，循环不息。</p>\n\n<p><strong>相生（顺生）</strong>：金生水，水生木，木生火，火生土，土生金。</p>\n<p><strong>相克（逆克）</strong>：金克木，木克土，土克水，水克火，火克金。</p>\n<p><strong>反生为克</strong>：母过强反伤子（水多木漂、木多火塞）；</p>\n<p><strong>反克</strong>：子过盛反辱母（木多金缺、火多水竭）。</p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">生克之喻</div>\n  <p>相生如母子相承——金属遇热成水（液），水滋润树木，木燃成火，火灰化土，土中藏金；此为天地循环、生生不息之道。</p>\n  <p>相克如管制相节——斧（金）伐木，木根破土，土能堵水，水能灭火，火能熔金；此为五行制衡、不偏不废之理。</p>\n</div>\n\n<h3>五行在姓名学中的运用</h3>\n\n<p>姓名学中，每一个字根皆有其五行归属。判别一字之五行，主要依据三种方法：</p>\n\n<ul>\n  <li><strong>字形五行</strong>——观偏旁部首。如「氵」属水，「火」属火，「木」属木，「土」属土，「金」属金。此为最直接之法。</li>\n  <li><strong>字义五行</strong>——观字之含义。如「明」字带日有光，属火；「江」字含水奔流，属水。</li>\n  <li><strong>字音五行</strong>——观读音归属。喉音属土，舌音属火，齿音属金，唇音属水，牙音属木。此法较微，多为辅助。</li>\n</ul>\n\n<h2>三、五行调候原则</h2>\n\n<p>取名之时，五行调配宜遵下述原则：</p>\n\n<ol>\n  <li><strong>缺则补之</strong>——本命五行有缺，名字补之；如水弱者用「氵」、「淼」、「江」、「涵」等字。</li>\n  <li><strong>过则泄之</strong>——本命五行过旺，名字泄之；如金过旺者用水字泄之，水多则金气流动而不滞。</li>\n  <li><strong>逆则疏之</strong>——本命五行偏胜成克，名字以通关之物疏之；如火克金为伤，则用土字通关，火生土，土生金，使其转克为生。</li>\n  <li><strong>不可助克</strong>——本命已被某五行所克，名字不可再添克我之物；如金弱被火克，则名字断不可再用火字。</li>\n</ol>\n\n<div class=\"warning\">\n  <div class=\"warning-title\">学者切记</div>\n  <p>五行平衡不是「五行俱全」。许多人误以为名字中要齐备金木水火土五种元素，其实大谬。姓名学要的是<strong>「补缺扶弱、平和调候」</strong>，不是堆砌齐全。一个人本命水旺，再于名中用水字，便是助纣为虐。本书第三卷与第七卷各章，皆紧扣此理，请读者细参。</p>\n</div>\n\n<!-- 第三章 -->"}, {"id": "v一-c3", "kind": "chapter", "volNum": "一", "volTitle": "道 之 根 本", "volSubtitle": "姓名学的渊源与哲理", "volQuote": "「夫名以正体，字以表德。形以定名，名以定事，事以验名。」<br>—— 姓名学之根本心法", "chapNum": "第 三 章", "chapTitle": "天干地支基础", "content": "<p class=\"lead\">天干地支，简称干支，是华夏先民观察天体运行、记录时间循环之独创体系。它既是历法，也是哲学，更是命理与姓名学的根本框架。十二生肖，正是十二地支的形象化呈现。不通干支，便难明生肖之根本。</p>\n\n<h2>一、十天干</h2>\n\n<p>天干有十：<strong>甲、乙、丙、丁、戊、己、庚、辛、壬、癸</strong>。其阴阳五行配属如下：</p>\n\n<table>\n  <thead>\n    <tr><th>天干</th><th>阴阳</th><th>五行</th><th>象征</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>甲</strong></td><td class=\"center\">阳</td><td class=\"center\">木</td><td>参天大树 · 栋梁之材</td></tr>\n    <tr><td class=\"center\"><strong>乙</strong></td><td class=\"center\">阴</td><td class=\"center\">木</td><td>花草藤蔓 · 灵动柔韧</td></tr>\n    <tr><td class=\"center\"><strong>丙</strong></td><td class=\"center\">阳</td><td class=\"center\">火</td><td>太阳烈火 · 炽热光明</td></tr>\n    <tr><td class=\"center\"><strong>丁</strong></td><td class=\"center\">阴</td><td class=\"center\">火</td><td>烛灯炉火 · 内敛温暖</td></tr>\n    <tr><td class=\"center\"><strong>戊</strong></td><td class=\"center\">阳</td><td class=\"center\">土</td><td>高山旷野 · 厚重稳实</td></tr>\n    <tr><td class=\"center\"><strong>己</strong></td><td class=\"center\">阴</td><td class=\"center\">土</td><td>田园沃土 · 滋养包容</td></tr>\n    <tr><td class=\"center\"><strong>庚</strong></td><td class=\"center\">阳</td><td class=\"center\">金</td><td>刀剑斧钺 · 锋芒果决</td></tr>\n    <tr><td class=\"center\"><strong>辛</strong></td><td class=\"center\">阴</td><td class=\"center\">金</td><td>珠玉首饰 · 精致内秀</td></tr>\n    <tr><td class=\"center\"><strong>壬</strong></td><td class=\"center\">阳</td><td class=\"center\">水</td><td>江河大海 · 浩浩奔流</td></tr>\n    <tr><td class=\"center\"><strong>癸</strong></td><td class=\"center\">阴</td><td class=\"center\">水</td><td>露水细雨 · 静润无声</td></tr>\n  </tbody>\n</table>\n\n<h2>二、十二地支</h2>\n\n<p>地支有十二：<strong>子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥</strong>。其与生肖、五行、月份、时辰之配属，乃姓名学最为核心之表。</p>\n\n<table>\n  <thead>\n    <tr><th>地支</th><th>生肖</th><th>阴阳</th><th>五行</th><th>月份</th><th>时辰</th><th>方位</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>子</strong></td><td class=\"center\">鼠</td><td class=\"center\">阳</td><td class=\"center\">水</td><td class=\"center\">十一月</td><td class=\"center\">23–01</td><td class=\"center\">正北</td></tr>\n    <tr><td class=\"center\"><strong>丑</strong></td><td class=\"center\">牛</td><td class=\"center\">阴</td><td class=\"center\">土</td><td class=\"center\">十二月</td><td class=\"center\">01–03</td><td class=\"center\">东北</td></tr>\n    <tr><td class=\"center\"><strong>寅</strong></td><td class=\"center\">虎</td><td class=\"center\">阳</td><td class=\"center\">木</td><td class=\"center\">正月</td><td class=\"center\">03–05</td><td class=\"center\">东北</td></tr>\n    <tr><td class=\"center\"><strong>卯</strong></td><td class=\"center\">兔</td><td class=\"center\">阴</td><td class=\"center\">木</td><td class=\"center\">二月</td><td class=\"center\">05–07</td><td class=\"center\">正东</td></tr>\n    <tr><td class=\"center\"><strong>辰</strong></td><td class=\"center\">龙</td><td class=\"center\">阳</td><td class=\"center\">土</td><td class=\"center\">三月</td><td class=\"center\">07–09</td><td class=\"center\">东南</td></tr>\n    <tr><td class=\"center\"><strong>巳</strong></td><td class=\"center\">蛇</td><td class=\"center\">阴</td><td class=\"center\">火</td><td class=\"center\">四月</td><td class=\"center\">09–11</td><td class=\"center\">东南</td></tr>\n    <tr><td class=\"center\"><strong>午</strong></td><td class=\"center\">马</td><td class=\"center\">阳</td><td class=\"center\">火</td><td class=\"center\">五月</td><td class=\"center\">11–13</td><td class=\"center\">正南</td></tr>\n    <tr><td class=\"center\"><strong>未</strong></td><td class=\"center\">羊</td><td class=\"center\">阴</td><td class=\"center\">土</td><td class=\"center\">六月</td><td class=\"center\">13–15</td><td class=\"center\">西南</td></tr>\n    <tr><td class=\"center\"><strong>申</strong></td><td class=\"center\">猴</td><td class=\"center\">阳</td><td class=\"center\">金</td><td class=\"center\">七月</td><td class=\"center\">15–17</td><td class=\"center\">西南</td></tr>\n    <tr><td class=\"center\"><strong>酉</strong></td><td class=\"center\">鸡</td><td class=\"center\">阴</td><td class=\"center\">金</td><td class=\"center\">八月</td><td class=\"center\">17–19</td><td class=\"center\">正西</td></tr>\n    <tr><td class=\"center\"><strong>戌</strong></td><td class=\"center\">狗</td><td class=\"center\">阳</td><td class=\"center\">土</td><td class=\"center\">九月</td><td class=\"center\">19–21</td><td class=\"center\">西北</td></tr>\n    <tr><td class=\"center\"><strong>亥</strong></td><td class=\"center\">猪</td><td class=\"center\">阴</td><td class=\"center\">水</td><td class=\"center\">十月</td><td class=\"center\">21–23</td><td class=\"center\">西北</td></tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <div class=\"warning-title\">立春为生肖分界</div>\n  <p>许多人误以为生肖以农历正月初一为分界，此实为大谬。生肖之划分，<strong>以二十四节气之「立春」为准</strong>。立春之前，仍属上一年生肖；立春之后，方为新一年生肖。</p>\n  <p>例如某人生于公历2010年2月3日，看似为虎年，但当年立春为2月4日，故此人其实仍属牛。起名前必须查清节气，以免错配生肖。</p>\n</div>\n\n<h2>三、六十甲子简说</h2>\n\n<p>天干十、地支十二，两两相配，循环六十次而归元，即为「六十甲子」。一甲子为一周期，是中国古代纪年之根本。如「甲子年、乙丑年、丙寅年……」。每一甲子年，皆有其独特的纳音五行（金木水火土的细分），影响该年生人的命理底色。</p>\n\n<p>姓名学中，对甲子之运用以「年柱」为主，即出生年的天干地支组合，亦称「太岁」。年柱地支即为生肖，年柱天干则反映该年生人的根本五行倾向。本书侧重生肖（地支）之论，年柱天干仅作辅助参考。</p>\n\n<!-- 第四章 -->"}, {"id": "v一-c4", "kind": "chapter", "volNum": "一", "volTitle": "道 之 根 本", "volSubtitle": "姓名学的渊源与哲理", "volQuote": "「夫名以正体，字以表德。形以定名，名以定事，事以验名。」<br>—— 姓名学之根本心法", "chapNum": "第 四 章", "chapTitle": "十二生肖与五行本源", "content": "<p class=\"lead\">十二生肖不是简单的动物对应，而是十二种气场原型——每一肖皆有其独特的五行属性、季节方位、生活习性、性格倾向。识透生肖天性，是起名的第一步。</p>\n\n<h2>一、十二生肖五行归类</h2>\n\n<table>\n  <thead>\n    <tr><th>五行</th><th>对应生肖</th><th>方位</th><th>主导运势</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>水</strong></td><td>子鼠 · 亥猪 · 丑牛*</td><td class=\"center\">北方</td><td>智慧 · 财运 · 人脉 · 流动；水旺则聪慧通透、贵人缘佳</td></tr>\n    <tr><td class=\"center\"><strong>木</strong></td><td>寅虎 · 卯兔 · 辰龙*</td><td class=\"center\">东方</td><td>生机 · 事业 · 学业 · 成长；木旺则积极向上、事业顺遂</td></tr>\n    <tr><td class=\"center\"><strong>火</strong></td><td>巳蛇 · 午马 · 未羊*</td><td class=\"center\">南方</td><td>热情 · 名望 · 魄力 · 机遇；火旺则开朗果敢、声名远扬</td></tr>\n    <tr><td class=\"center\"><strong>金</strong></td><td>申猴 · 酉鸡 · 戌狗*</td><td class=\"center\">西方</td><td>果敢 · 财富 · 权威 · 坚毅；金旺则行事果断、聚财有方</td></tr>\n    <tr><td class=\"center\"><strong>土</strong></td><td>丑牛 · 辰龙 · 未羊 · 戌狗</td><td class=\"center\">中央 · 四隅</td><td>根基 · 家业 · 积蓄 · 稳重；土旺则安稳踏实、家业稳固</td></tr>\n  </tbody>\n</table>\n\n<p style=\"font-size: 9.5pt; color: #6b7280;\">注：标 * 者，为「四库土」类生肖，其本气虽属土，但又承担三会方位中之水、木、火、金气，故有重叠。</p>\n\n<h2>二、十二生肖天性总览</h2>\n\n<p>每一生肖，皆有其独特的「天性原型」。起名时不顺应天性，便如逆水行舟。下表为十二肖天性总纲：</p>\n\n<table>\n  <thead>\n    <tr><th>生肖</th><th>核心天性</th><th>喜境</th><th>忌境</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>子鼠</strong></td><td>机灵聪慧 · 夜行灵巧</td><td>洞穴 · 五谷 · 彩衣 · 称王</td><td>日光 · 山林 · 人多 · 相冲生肖</td></tr>\n    <tr><td class=\"center\"><strong>丑牛</strong></td><td>勤恳踏实 · 任劳任怨</td><td>洞栏 · 五谷 · 田园</td><td>彩衣 · 称王 · 山高 · 心字旁</td></tr>\n    <tr><td class=\"center\"><strong>寅虎</strong></td><td>勇猛权威 · 山林之王</td><td>山林 · 王位 · 大字 · 食肉</td><td>平原 · 受困 · 小字 · 翘脚</td></tr>\n    <tr><td class=\"center\"><strong>卯兔</strong></td><td>温顺谨慎 · 喜居洞穴</td><td>洞穴 · 草木 · 彩衣 · 三合</td><td>山林 · 称王 · 抬头 · 龙鸡马</td></tr>\n    <tr><td class=\"center\"><strong>辰龙</strong></td><td>至尊祥瑞 · 喜云水雨</td><td>日月云雨 · 称王 · 水气</td><td>洞穴 · 凡间 · 见人 · 见蛇</td></tr>\n    <tr><td class=\"center\"><strong>巳蛇</strong></td><td>聪慧内敛 · 喜藏喜缠</td><td>洞穴 · 木上 · 彩衣 · 食肉</td><td>日光 · 五谷 · 翘脚 · 见人</td></tr>\n    <tr><td class=\"center\"><strong>午马</strong></td><td>开朗俊朗 · 思路敏捷</td><td>五谷 · 草木 · 见人 · 大穴</td><td>水气 · 田字 · 双口 · 双人</td></tr>\n    <tr><td class=\"center\"><strong>未羊</strong></td><td>温和善良 · 知恩图报</td><td>洞穴 · 草木 · 五谷 · 翘脚</td><td>彩衣 · 称王 · 水气 · 心忄</td></tr>\n    <tr><td class=\"center\"><strong>申猴</strong></td><td>机灵善变 · 喜模仿</td><td>木林 · 见人 · 彩衣 · 三合</td><td>金气 · 田金 · 称王 · 阝字旁</td></tr>\n    <tr><td class=\"center\"><strong>酉鸡</strong></td><td>精明讲究 · 重外表</td><td>五谷 · 山头 · 戴冠 · 司晨</td><td>大字 · 多口 · 见双人 · 称王</td></tr>\n    <tr><td class=\"center\"><strong>戌狗</strong></td><td>忠诚正义 · 重归属感</td><td>家宅 · 主人 · 食肉 · 彩衣</td><td>日光 · 山字 · 田字 · 龙鸡</td></tr>\n    <tr><td class=\"center\"><strong>亥猪</strong></td><td>沉稳有福 · 喜安逸</td><td>洞穴 · 五谷 · 翘脚 · 金水</td><td>称王 · 彩衣 · 山字 · 见人</td></tr>\n  </tbody>\n</table>\n\n<p>本表为<strong>「天性总纲」</strong>，是十二卷之第七卷的精要预告。读者于此先得概要，再于详解卷中深参，方能融会贯通。</p>\n\n<!-- 第五章 -->"}, {"id": "v一-c5", "kind": "chapter", "volNum": "一", "volTitle": "道 之 根 本", "volSubtitle": "姓名学的渊源与哲理", "volQuote": "「夫名以正体，字以表德。形以定名，名以定事，事以验名。」<br>—— 姓名学之根本心法", "chapNum": "第 五 章", "chapTitle": "地支藏干详解", "content": "<p class=\"lead\">地支并非仅是地支，而是「藏干之器」——每一地支之中，皆藏有一至三个天干，称为「人元」或「支中藏干」。藏干理论是命理学最深之处，亦是姓名学高级判读的关键钥匙。明乎此，方能解释为何同属一肖之人，性格命运却各有不同。</p>\n\n<h2>一、地支藏干总表</h2>\n\n<table>\n  <thead>\n    <tr><th>地支</th><th>本气（主气）</th><th>中气</th><th>余气</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>子</strong></td><td class=\"center\">癸水（阴水）</td><td class=\"center\">—</td><td class=\"center\">—</td></tr>\n    <tr><td class=\"center\"><strong>丑</strong></td><td class=\"center\">己土（阴土）</td><td class=\"center\">癸水</td><td class=\"center\">辛金</td></tr>\n    <tr><td class=\"center\"><strong>寅</strong></td><td class=\"center\">甲木（阳木）</td><td class=\"center\">丙火</td><td class=\"center\">戊土</td></tr>\n    <tr><td class=\"center\"><strong>卯</strong></td><td class=\"center\">乙木（阴木）</td><td class=\"center\">—</td><td class=\"center\">—</td></tr>\n    <tr><td class=\"center\"><strong>辰</strong></td><td class=\"center\">戊土（阳土）</td><td class=\"center\">乙木</td><td class=\"center\">癸水</td></tr>\n    <tr><td class=\"center\"><strong>巳</strong></td><td class=\"center\">丙火（阳火）</td><td class=\"center\">戊土</td><td class=\"center\">庚金</td></tr>\n    <tr><td class=\"center\"><strong>午</strong></td><td class=\"center\">丁火（阴火）</td><td class=\"center\">己土</td><td class=\"center\">—</td></tr>\n    <tr><td class=\"center\"><strong>未</strong></td><td class=\"center\">己土（阴土）</td><td class=\"center\">丁火</td><td class=\"center\">乙木</td></tr>\n    <tr><td class=\"center\"><strong>申</strong></td><td class=\"center\">庚金（阳金）</td><td class=\"center\">壬水</td><td class=\"center\">戊土</td></tr>\n    <tr><td class=\"center\"><strong>酉</strong></td><td class=\"center\">辛金（阴金）</td><td class=\"center\">—</td><td class=\"center\">—</td></tr>\n    <tr><td class=\"center\"><strong>戌</strong></td><td class=\"center\">戊土（阳土）</td><td class=\"center\">辛金</td><td class=\"center\">丁火</td></tr>\n    <tr><td class=\"center\"><strong>亥</strong></td><td class=\"center\">壬水（阳水）</td><td class=\"center\">甲木</td><td class=\"center\">—</td></tr>\n  </tbody>\n</table>\n\n<h2>二、四正、四隅、四库——藏干的三种结构</h2>\n\n<p>藏干并非随意排布，而有其规律。十二地支可分三类：</p>\n\n<h3>一、四正（子午卯酉）—— 单藏一气</h3>\n<p>子（癸）、午（丁己）、卯（乙）、酉（辛），分居四正方位（北南东西），各为本气主导，本气最纯，影响最直接。子鼠、卯兔、酉鸡仅藏一气，故其个性明确、单纯、专一；午马虽藏丁与己，但火气仍为绝对主导。</p>\n\n<h3>二、四生（寅申巳亥）—— 三气长生之地</h3>\n<p>寅（甲丙戊）、申（庚壬戊）、巳（丙戊庚）、亥（壬甲），是「五行长生」之位，故藏三干。此四肖之人，天性多元、可塑性强，但也容易受多重力量牵引而摇摆。</p>\n\n<h3>三、四库（辰戌丑未）—— 三气混杂之库</h3>\n<p>辰（戊乙癸）、戌（戊辛丁）、丑（己癸辛）、未（己丁乙），是「五行墓库」之地，承接四时余气。土为本气，但内藏他行之精华，故四库生肖性格深沉、内涵丰富，但起名亦最为复杂——需照顾多重五行能量。</p>\n\n<h2>三、藏干在姓名学的运用</h2>\n\n<p>藏干理论看似深奥，实则给我们提供了一把「微调之钥」。其在姓名学中的运用，主要体现于三方面：</p>\n\n<h3>一、识别本命中潜藏的需求</h3>\n<p>例如戌狗本气为戊土，但藏辛金、丁火。若某戌狗命主财运不旺（财为辛金），则起名时可适度补金；若其性格冷漠（火气不足），则可补火字根。这便是<strong>「补藏干之弱」</strong>之法。</p>\n\n<h3>二、解释三合三会之深因</h3>\n<p>三合「申子辰」何以成水局？因申中藏壬水（长生）、子为癸水（旺地）、辰中藏癸水（墓库）——三者皆藏水，故气同相聚而成局。三合的力量，正源自藏干的共鸣。</p>\n\n<h3>三、辨别字根的隐性关系</h3>\n<p>看似无关的两个字根，可能因藏干而相通。例如「亥猪」中藏甲木，所以猪与木字根相生；「寅虎」中藏丙火，所以虎与火字根亦合。此为字根判读之深度技巧。</p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">藏干心法</div>\n  <p>初学者记本气即可——子水、丑土、寅木……不必为藏干所困。但欲精进者，务必将此表牢记于心。当你看到一个生肖时，能立时浮出其三层藏干之结构，你的判断力便已超越九成姓名学爱好者。</p>\n</div>\n\n<!-- 第六章 -->"}, {"id": "v一-c6", "kind": "chapter", "volNum": "一", "volTitle": "道 之 根 本", "volSubtitle": "姓名学的渊源与哲理", "volQuote": "「夫名以正体，字以表德。形以定名，名以定事，事以验名。」<br>—— 姓名学之根本心法", "chapNum": "第 六 章", "chapTitle": "主客理论：生肖与名字", "content": "<p class=\"lead\">这是本卷最核心的一章。生肖姓名学的全部判断，都建立在「主体与客体相互作用」这一基本框架之上。理解了主客之间的五种关系，便掌握了姓名学的钥匙。</p>\n\n<h2>一、何谓主体？何谓客体？</h2>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">主 客 之 定 义</div>\n  <p>生肖是主体——本命，先天，不可改；<br>名字是客体——后天，外力，可调整。</p>\n</div>\n\n<p>主体如人，客体如其衣食、住行、伴侣、事业。一个人天性已定，但所处环境、所交朋友、所居住所、所食饮食，皆可改换。后天选择与先天天性相合，便是「契合」；后天选择与先天天性相违，便是「冲克」。名字，正是这众多后天因素中最为关键的一项——因为它伴随终身、呼唤无数次。</p>\n\n<h2>二、主客五种关系全解</h2>\n\n<p>主体与客体之间，依五行生克之理，可衍生出五种基本关系。每一种关系，皆决定了名字对命主的不同影响：</p>\n\n<h3>一、客体生主体——助力 · 上吉</h3>\n<p>名字（客）所带之五行，生扶生肖（主）。如鼠（水）用金字根（金生水），虎（木）用水字根（水生木）。此为<strong>「贵人星」</strong>，主：</p>\n<ul>\n  <li>贵人旺、人缘佳；</li>\n  <li>赚钱轻松、进财容易；</li>\n  <li>行事顺利、心想事成；</li>\n  <li>夫妻相爱、家庭和谐。</li>\n</ul>\n\n<h3>二、客体克主体——受制 · 大凶</h3>\n<p>名字（客）所带之五行，克伤生肖（主）。如鼠（水）用土字根（土克水），蛇（火）用水字根（水克火）。此为<strong>「受制星」</strong>，主：</p>\n<ul>\n  <li>压抑受困、有志难伸；</li>\n  <li>名誉不好、口碑欠佳；</li>\n  <li>劳而无功、碌而无利；</li>\n  <li>易受朋友拖累、夫妻较凶悍。</li>\n</ul>\n\n<h3>三、主体生客体——消耗 · 小凶</h3>\n<p>生肖（主）所带之五行，生扶名字（客）。如蛇（火）用土字根（火生土），鸡（金）用水字根（金生水）。此为<strong>「耗泄星」</strong>，主：</p>\n<ul>\n  <li>消耗精力、入不敷出；</li>\n  <li>有名无利、为人作嫁；</li>\n  <li>赚钱辛苦、事倍功半；</li>\n  <li>付出多回报少，人情损耗大。</li>\n</ul>\n\n<h3>四、主体克客体——任性 · 偏凶</h3>\n<p>生肖（主）所带之五行，克制名字（客）。如鼠（水）用火字根（水克火），虎（木）用土字根（木克土）。此为<strong>「霸道星」</strong>，主：</p>\n<ul>\n  <li>任性固执、一意孤行；</li>\n  <li>霸道好权、好大喜功；</li>\n  <li>伤六亲、耗钱财、败家产；</li>\n  <li>夫妻较辛苦，自身亦累。</li>\n</ul>\n\n<h3>五、主客同气——平和 · 中吉</h3>\n<p>生肖（主）与名字（客）五行相同。如虎（木）用木字根，蛇（火）用火字根。此为<strong>「自助星」</strong>，主：</p>\n<ul>\n  <li>性格鲜明、立场坚定；</li>\n  <li>同道相助、朋友支持；</li>\n  <li>过旺则刚愎，过弱则无主见；</li>\n  <li>属中性，需视命主原局是否偏旺而定。</li>\n</ul>\n\n<h2>三、五种关系之总评</h2>\n\n<table>\n  <thead>\n    <tr><th>关　系</th><th>评　级</th><th>主要影响</th><th>取舍建议</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\">客体生主体</td><td class=\"center\">★★★★★ 上吉</td><td>贵人旺、进财顺</td><td class=\"center\">首选 · 优先用</td></tr>\n    <tr><td class=\"center\">主客同气</td><td class=\"center\">★★★ 中吉</td><td>性格强、稳得朋友</td><td class=\"center\">视情而定</td></tr>\n    <tr><td class=\"center\">主体生客体</td><td class=\"center\">★★ 小凶</td><td>耗泄、费力</td><td class=\"center\">少用 · 慎用</td></tr>\n    <tr><td class=\"center\">主体克客体</td><td class=\"center\">★ 偏凶</td><td>任性、败财</td><td class=\"center\">不用</td></tr>\n    <tr><td class=\"center\">客体克主体</td><td class=\"center\">凶 · 大忌</td><td>受制、压抑</td><td class=\"center\">绝对避免</td></tr>\n  </tbody>\n</table>\n\n<h2>四、关系判读三原则</h2>\n\n<p>主客关系判读时，须把握三大原则，方能不失偏颇：</p>\n\n<h3>一、生克要看「位置」</h3>\n<p>名字第一字（人格）与第二字（地格），所处位置不同，对命主的影响也有别。<strong>名一</strong>主中年事业感情，<strong>名二</strong>主晚年财富健康。同一个克我之字，放在名一与放在名二，影响的方向不同。例如水克火（蛇），若用「沛」字（含氵）于名一，则克其中年事业；若用于名二，则伤其晚年健康。</p>\n\n<h3>二、生克要看「字根强度」</h3>\n<p>同一字根，其表征强弱有别。「氵」（水之偏旁）与「淼」（三水成字）所表水之强度大不相同。判读时，三个氵的字根力量，约相当于一个明显的「水」字。</p>\n\n<h3>三、生克要看「字根数量」</h3>\n<p>名字中若同一五行字根连续出现两次以上，其力量倍增，须特别留意是否过旺。例如名字两字皆带氵，水气过盛，于火命之人为大忌；于水弱之人则可补，但仍须节制。</p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">主客理论 · 一图记心法</div>\n  <p>客生主——贵人扶；主生客——为人忙；同气——朋友多；主克客——任性败；客克主——一生苦。</p>\n</div>\n\n<p>本卷至此，姓名学的根本理论已立。读者若读至此处而觉头绪万千，亦不必焦急——后续卷章中，所有理论皆会以五得、字根、生肖三个角度反复印证。诵读越多遍，体会越深；体会越深，下笔起名便越是信手拈来、无所滞碍。</p>\n\n<!-- ========== 第二卷 ========== -->"}, {"id": "v二-c1", "kind": "chapter", "volNum": "二", "volTitle": "法 之 精 要", "volSubtitle": "地支吉凶关系全解", "volQuote": "「合则气聚，冲则气散；刑则内耗，害则暗箭。」<br>—— 地支关系总则", "chapNum": "第 一 章", "chapTitle": "地支六合 · 暗中贵人", "content": "<p class=\"lead\">地支六合，是十二地支两两相配、阴阳互补、气场相融的关系，是命理中最暗藏深机的一种格局。六合不显于外，却可成就一生贵人；不张于势，却能化解众多坎坷。在姓名学中，运用六合字根，是为命主请来一位「终身暗中扶持的恩人」。</p>\n\n<h2>一、六合的六对组合</h2>\n\n<table>\n  <thead>\n    <tr><th>六合对</th><th>生肖</th><th>五行融合</th><th>主导意涵</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>子 · 丑</strong></td><td class=\"center\">鼠 · 牛</td><td class=\"center\">水土相融</td><td>稳中求进 · 智慧落地</td></tr>\n    <tr><td class=\"center\"><strong>寅 · 亥</strong></td><td class=\"center\">虎 · 猪</td><td class=\"center\">木水相生</td><td>生机有源 · 福气助发</td></tr>\n    <tr><td class=\"center\"><strong>卯 · 戌</strong></td><td class=\"center\">兔 · 狗</td><td class=\"center\">木土相安</td><td>柔以制刚 · 忠贞相守</td></tr>\n    <tr><td class=\"center\"><strong>辰 · 酉</strong></td><td class=\"center\">龙 · 鸡</td><td class=\"center\">土金相生</td><td>权柄护财 · 实力相助</td></tr>\n    <tr><td class=\"center\"><strong>巳 · 申</strong></td><td class=\"center\">蛇 · 猴</td><td class=\"center\">火金相济</td><td>智勇相辅 · 化敌为友</td></tr>\n    <tr><td class=\"center\"><strong>午 · 未</strong></td><td class=\"center\">马 · 羊</td><td class=\"center\">火土相承</td><td>热情归位 · 名利双收</td></tr>\n  </tbody>\n</table>\n\n<h2>二、六合的姓名学应用</h2>\n\n<p>命主属某肖，则其六合之肖即为「最大暗助」。起名时若能巧妙嵌入六合生肖之字根，便如名字中藏了一位贵人——平时不显，关键时刻必然现身。例如：</p>\n\n<ul>\n  <li><strong>属龙者</strong>，六合于鸡。名字可用「翔、鸣、翊、翎、酋」等含鸡字根之字。</li>\n  <li><strong>属猪者</strong>，六合于虎。名字可用「演、彪、彬、卢」等含虎字根之字（但虎字本身体大，宜用偏旁形式）。</li>\n  <li><strong>属猴者</strong>，六合于蛇。名字可用「廷、建、迎、连、运」等带辶或廴之字（蛇之蜿蜒形）。</li>\n</ul>\n\n<div class=\"tip\">\n  <div class=\"tip-title\">六合用字之诀</div>\n  <p>六合字根用于<strong>名一</strong>，主中年得贵人提携，事业兴旺；<br>用于<strong>名二</strong>，主晚年得子孙之福，安康享老。</p>\n</div>\n\n<!-- 第二章 -->"}, {"id": "v二-c2", "kind": "chapter", "volNum": "二", "volTitle": "法 之 精 要", "volSubtitle": "地支吉凶关系全解", "volQuote": "「合则气聚，冲则气散；刑则内耗，害则暗箭。」<br>—— 地支关系总则", "chapNum": "第 二 章", "chapTitle": "地支三合 · 大贵人格", "content": "<p class=\"lead\">三合，乃是地支相隔四位、五行同源的格局，气场最为雄厚。其力量之大，足以使一生不顺者得以扶起，使一生顺者更上层楼。三合之贵人，是显现于外的、可见可感的、关键时刻能伸援手的「明助贵人」。</p>\n\n<h2>一、四大三合局</h2>\n\n<table>\n  <thead>\n    <tr><th>三合局</th><th>生肖组合</th><th>五行局</th><th>方位</th><th>力量倾向</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>申子辰</strong></td><td>猴 · 鼠 · 龙</td><td class=\"center\">水局</td><td class=\"center\">北方</td><td>智慧 · 财运 · 人脉</td></tr>\n    <tr><td class=\"center\"><strong>巳酉丑</strong></td><td>蛇 · 鸡 · 牛</td><td class=\"center\">金局</td><td class=\"center\">西方</td><td>权威 · 事业 · 财富</td></tr>\n    <tr><td class=\"center\"><strong>寅午戌</strong></td><td>虎 · 马 · 狗</td><td class=\"center\">火局</td><td class=\"center\">南方</td><td>名望 · 魄力 · 机遇</td></tr>\n    <tr><td class=\"center\"><strong>亥卯未</strong></td><td>猪 · 兔 · 羊</td><td class=\"center\">木局</td><td class=\"center\">东方</td><td>生机 · 学业 · 成长</td></tr>\n  </tbody>\n</table>\n\n<h2>二、三合的内在原理</h2>\n\n<p>三合之所以成立，皆因藏干之共鸣。以「申子辰」水局为例：</p>\n\n<ul>\n  <li><strong>申</strong>中藏壬水（水之长生）；</li>\n  <li><strong>子</strong>中藏癸水（水之帝旺）；</li>\n  <li><strong>辰</strong>中藏癸水（水之入墓）。</li>\n</ul>\n\n<p>三者藏水，依「长生—帝旺—墓库」之序排列，正是水之一生由生到旺到藏的完整循环。三气相聚，故成水局。其余三合同理。</p>\n\n<h2>三、三合在姓名学的运用</h2>\n\n<p>命主属某肖，则其三合中的「另两肖」之字根，皆可用于其名。例如属龙者，其三合为申、子、辰；除龙本身外，可用申（猴）、子（鼠）的字根。具体如下：</p>\n\n<table>\n  <thead>\n    <tr><th>命主生肖</th><th>三合字根（推荐）</th><th>取名常用字</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\">猴</td><td>子（鼠）· 辰（龙）：氵、水、子；龙、辰</td><td>沐 · 泽 · 涵 · 子 · 振 · 宸 · 农</td></tr>\n    <tr><td class=\"center\">鼠</td><td>申（猴）· 辰（龙）：申；龙、辰</td><td>绅 · 神 · 振 · 宸 · 农 · 浓</td></tr>\n    <tr><td class=\"center\">龙</td><td>申（猴）· 子（鼠）：申；氵、子</td><td>绅 · 神 · 沐 · 泽 · 涵 · 子 · 孝</td></tr>\n    <tr><td class=\"center\">蛇</td><td>酉（鸡）· 丑（牛）：鸟、酉；牛</td><td>翔 · 鸣 · 翊 · 醇 · 牧 · 物 · 牟</td></tr>\n    <tr><td class=\"center\">鸡</td><td>巳（蛇）· 丑（牛）：辶、廴、虫；牛</td><td>建 · 廷 · 迅 · 张 · 牧 · 物</td></tr>\n    <tr><td class=\"center\">牛</td><td>巳（蛇）· 酉（鸡）：辶、虫；鸟、羽</td><td>建 · 廷 · 翔 · 翎 · 鸣</td></tr>\n    <tr><td class=\"center\">虎</td><td>午（马）· 戌（狗）：马、午；犭、戌</td><td>骏 · 骐 · 许 · 然 · 成 · 戎</td></tr>\n    <tr><td class=\"center\">马</td><td>寅（虎）· 戌（狗）：虍、寅；犭、戌</td><td>彪 · 演 · 然 · 成 · 戎 · 武</td></tr>\n    <tr><td class=\"center\">狗</td><td>寅（虎）· 午（马）：虍、寅；马、午</td><td>彪 · 演 · 骏 · 骐 · 许 · 然</td></tr>\n    <tr><td class=\"center\">猪</td><td>卯（兔）· 未（羊）：卯、月；羊、未</td><td>卿 · 柳 · 月 · 朋 · 善 · 美 · 群</td></tr>\n    <tr><td class=\"center\">兔</td><td>亥（猪）· 未（羊）：亥、豕；羊、未</td><td>核 · 该 · 蒙 · 善 · 美 · 群</td></tr>\n    <tr><td class=\"center\">羊</td><td>亥（猪）· 卯（兔）：亥、豕；卯、月</td><td>核 · 蒙 · 卿 · 柳 · 月 · 朋</td></tr>\n  </tbody>\n</table>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">三合用字之诀</div>\n  <p>三合字根中，<strong>三合之首</strong>（申子辰之申、巳酉丑之巳、寅午戌之寅、亥卯未之亥）力量最强，是「首要贵人」；<strong>三合之尾</strong>（辰、丑、戌、未）力量内敛，是「持久之助」。中间之肖（子、酉、午、卯），力量适中，多元而灵活。</p>\n</div>\n\n<!-- 第三章 -->"}, {"id": "v二-c3", "kind": "chapter", "volNum": "二", "volTitle": "法 之 精 要", "volSubtitle": "地支吉凶关系全解", "volQuote": "「合则气聚，冲则气散；刑则内耗，害则暗箭。」<br>—— 地支关系总则", "chapNum": "第 三 章", "chapTitle": "地支三会 · 同气相聚", "content": "<p class=\"lead\">三会，是同方位三个连续地支气场之汇聚。其力量，比三合更纯粹，亦更专一。三会主<strong>「众人相助、同道齐心」</strong>，乃成就大事不可或缺之格。</p>\n\n<h2>一、四大三会局</h2>\n\n<table>\n  <thead>\n    <tr><th>三会局</th><th>生肖组合</th><th>方位</th><th>五行</th><th>意涵</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>亥子丑</strong></td><td>猪 · 鼠 · 牛</td><td class=\"center\">北方</td><td class=\"center\">水局</td><td>财运 · 人脉 · 智慧</td></tr>\n    <tr><td class=\"center\"><strong>寅卯辰</strong></td><td>虎 · 兔 · 龙</td><td class=\"center\">东方</td><td class=\"center\">木局</td><td>事业 · 学业 · 生机</td></tr>\n    <tr><td class=\"center\"><strong>巳午未</strong></td><td>蛇 · 马 · 羊</td><td class=\"center\">南方</td><td class=\"center\">火局</td><td>名望 · 机遇 · 热情</td></tr>\n    <tr><td class=\"center\"><strong>申酉戌</strong></td><td>猴 · 鸡 · 狗</td><td class=\"center\">西方</td><td class=\"center\">金局</td><td>权威 · 财富 · 坚毅</td></tr>\n  </tbody>\n</table>\n\n<h2>二、三合与三会之别</h2>\n\n<p>初学者常将三合与三会混为一谈，实则二者迥异。其分野在于：</p>\n\n<table>\n  <thead>\n    <tr><th>对比项</th><th>三合</th><th>三会</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>排列</strong></td><td>地支相隔四位</td><td>地支连续三位</td></tr>\n    <tr><td class=\"center\"><strong>原理</strong></td><td>藏干共鸣（长生帝旺墓库）</td><td>方位同气（同一方向汇聚）</td></tr>\n    <tr><td class=\"center\"><strong>力量</strong></td><td>跨阶段、可历久</td><td>同阶段、力专纯</td></tr>\n    <tr><td class=\"center\"><strong>象征</strong></td><td>三方贵人</td><td>三兄弟同心</td></tr>\n    <tr><td class=\"center\"><strong>姓名应用</strong></td><td>跨界资源、贵人扶持</td><td>同道齐力、家庭和睦</td></tr>\n  </tbody>\n</table>\n\n<div class=\"tip\">\n  <div class=\"tip-title\">合会并见 · 双倍助力</div>\n  <p>若名字中既有命主之三合字根，又有三会字根，则称为「合会双全」，乃姓名学中极佳格局。例如龙年生人，名字中若有申猴字根（三合）又有寅卯木气（三会），则一生贵人不绝、左右逢源。</p>\n</div>\n\n<!-- 第四章 -->"}, {"id": "v二-c4", "kind": "chapter", "volNum": "二", "volTitle": "法 之 精 要", "volSubtitle": "地支吉凶关系全解", "volQuote": "「合则气聚，冲则气散；刑则内耗，害则暗箭。」<br>—— 地支关系总则", "chapNum": "第 四 章", "chapTitle": "地支六冲 · 气场相悖", "content": "<p class=\"lead\">合则气聚，冲则气散。地支六冲，是命理中最为剧烈的对立关系，其力直接、其势凶猛。一名之中若现冲煞，命主一生奔波劳碌、人际波折、事业反复，宜避之不及。</p>\n\n<h2>一、六冲全表</h2>\n\n<table>\n  <thead>\n    <tr><th>相冲对</th><th>生肖</th><th>主导冲项</th><th>损失</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>子 · 午</strong></td><td>鼠 · 马</td><td>水火相冲</td><td>事业反复 · 财运起伏</td></tr>\n    <tr><td class=\"center\"><strong>丑 · 未</strong></td><td>牛 · 羊</td><td>土土相冲（土库相破）</td><td>家业不稳 · 健康受损</td></tr>\n    <tr><td class=\"center\"><strong>寅 · 申</strong></td><td>虎 · 猴</td><td>金木相冲</td><td>奔波劳碌 · 是非缠身</td></tr>\n    <tr><td class=\"center\"><strong>卯 · 酉</strong></td><td>兔 · 鸡</td><td>金木相冲</td><td>感情波折 · 情绪不安</td></tr>\n    <tr><td class=\"center\"><strong>辰 · 戌</strong></td><td>龙 · 狗</td><td>土土相冲（魁罡之冲）</td><td>事业受阻 · 性格刚烈</td></tr>\n    <tr><td class=\"center\"><strong>巳 · 亥</strong></td><td>蛇 · 猪</td><td>水火相冲</td><td>身心不宁 · 远行多变</td></tr>\n  </tbody>\n</table>\n\n<h2>二、六冲的两种类型</h2>\n\n<h3>一、五行对冲（子午、卯酉、寅申、巳亥）</h3>\n<p>水火、金木分居四方，为正面相冲，气场水火不容，破坏力直接而显著。命主属此类对冲生肖时，名字绝对不可用相冲生肖之字根。</p>\n\n<h3>二、土库相冲（丑未、辰戌）</h3>\n<p>四库之土自相冲，称为「冲库」或「魁罡之冲」。其特点是表面上是土与土之斗争，实际上是各自所藏之他行起冲。如丑藏癸辛，未藏丁乙——癸丁水火冲、辛乙金木冲。冲库之煞，多伤家业、积蓄、健康，须慎之又慎。</p>\n\n<div class=\"warning\">\n  <div class=\"warning-title\">六冲不可逾</div>\n  <p>本书所列十二生肖之忌字，凡言「忌某肖字根」者，多以六冲为根本依据。此为铁律，无任何回旋余地。例如属鼠者忌马字、马午、火字根；属虎者忌猴字、申字、金字根。冲煞入名，一生大祸。</p>\n</div>\n\n<!-- 第五章 -->"}, {"id": "v二-c5", "kind": "chapter", "volNum": "二", "volTitle": "法 之 精 要", "volSubtitle": "地支吉凶关系全解", "volQuote": "「合则气聚，冲则气散；刑则内耗，害则暗箭。」<br>—— 地支关系总则", "chapNum": "第 五 章", "chapTitle": "地支相害 · 暗箭难防", "content": "<p class=\"lead\">相害不如相冲之猛，但其阴而难防。冲是明枪，害是暗箭。明枪可挡，暗箭难躲。命中带害者，往往多遇小人、多受拖累、多陷是非而不自知。</p>\n\n<h2>一、六害全表</h2>\n\n<table>\n  <thead>\n    <tr><th>相害对</th><th>生肖</th><th>主要表现</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>子 · 未</strong></td><td>鼠 · 羊</td><td>朋友拖累 · 投资被骗</td></tr>\n    <tr><td class=\"center\"><strong>丑 · 午</strong></td><td>牛 · 马</td><td>劳而无功 · 身心俱疲</td></tr>\n    <tr><td class=\"center\"><strong>寅 · 巳</strong></td><td>虎 · 蛇</td><td>口舌是非 · 兄弟反目</td></tr>\n    <tr><td class=\"center\"><strong>卯 · 辰</strong></td><td>兔 · 龙</td><td>情感波折 · 长辈施压</td></tr>\n    <tr><td class=\"center\"><strong>申 · 亥</strong></td><td>猴 · 猪</td><td>合伙不睦 · 钱财消耗</td></tr>\n    <tr><td class=\"center\"><strong>酉 · 戌</strong></td><td>鸡 · 狗</td><td>家庭口角 · 邻里不和</td></tr>\n  </tbody>\n</table>\n\n<h2>二、相害的判读</h2>\n\n<p>相害的力量虽不如相冲，但其有一特点——<strong>「贴近发生」</strong>。冲多发生在远方、外缘；害则发生在身边、亲近之人。换言之，相害字根入名，所伤者多为家人、合伙人、密友——伤害最深之人，往往最在身边。</p>\n\n<p>起名时，凡相害字根，当与相冲字根同等避之。本书第七卷各肖之「忌用字根」中，皆已依此理排除，读者径用即可。</p>\n\n<!-- 第六章 -->"}, {"id": "v二-c6", "kind": "chapter", "volNum": "二", "volTitle": "法 之 精 要", "volSubtitle": "地支吉凶关系全解", "volQuote": "「合则气聚，冲则气散；刑则内耗，害则暗箭。」<br>—— 地支关系总则", "chapNum": "第 六 章", "chapTitle": "地支自刑、相刑、相破", "content": "<p class=\"lead\">自刑、相刑、相破，乃次于冲害的三种凶煞。其影响虽较缓，但若叠加于冲害之上，则祸不单行。学者宜辨明，慎不可犯。</p>\n\n<h2>一、自刑——内在的纠结</h2>\n\n<p>自刑，即同肖相刑。共有四肖犯此：</p>\n\n<table>\n  <thead>\n    <tr><th>自刑生肖</th><th>主要表现</th></tr>\n  </thead>\n  <tbody>\n    <tr><td>辰龙自刑</td><td>做事易半途而废 · 自我内耗 · 反复纠结</td></tr>\n    <tr><td>午马自刑</td><td>耳根软 · 易听奉承 · 行事冲动 · 事后懊悔</td></tr>\n    <tr><td>酉鸡自刑</td><td>脾气刚烈 · 争执不断 · 人际疏离 · 身心疲惫</td></tr>\n    <tr><td>亥猪自刑</td><td>固执压抑 · 自我为难 · 福气受损 · 钻牛角尖</td></tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <div class=\"warning-title\">自刑生肖名忌同字根</div>\n  <p>自刑生肖最忌名字中再现自身字根。例如属龙者，名字中再用龙字、辰字、辰之字根（云、雨、田田相叠等），则自刑加倍，性格上更易陷入纠结、半途而废之困境。</p>\n</div>\n\n<h2>二、三刑——三方互制</h2>\n\n<p>三刑乃三个地支之间相互刑害的关系，分两组：</p>\n\n<ul>\n  <li><strong>恃势之刑</strong>：寅 → 巳 → 申 → 寅（循环互刑）。虎仗势刑蛇，蛇仗势刑猴，猴仗势刑虎。</li>\n  <li><strong>无礼之刑</strong>：子 → 卯 → 子（鼠刑兔，兔刑鼠）。两两互刑，主无礼悖理。</li>\n</ul>\n\n<p>三刑对运势的影响，主<strong>「人际关系紧张、官非小人、是非缠身」</strong>。起名时，若命主属寅虎，名字不宜带巳、申之字根；若属猴，名字不宜带寅、巳；若属鼠，不宜带卯字根；若属兔，不宜带子字根。</p>\n\n<h2>三、相破——破财破合</h2>\n\n<p>相破有六对，主财破、合破、合作不顺：</p>\n\n<table>\n  <thead>\n    <tr><th>相破对</th><th>生肖</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>子 · 酉</strong></td><td>鼠 · 鸡</td></tr>\n    <tr><td class=\"center\"><strong>午 · 卯</strong></td><td>马 · 兔</td></tr>\n    <tr><td class=\"center\"><strong>申 · 巳</strong></td><td>猴 · 蛇</td></tr>\n    <tr><td class=\"center\"><strong>寅 · 亥</strong></td><td>虎 · 猪（与六合同对，相生相破并存）</td></tr>\n    <tr><td class=\"center\"><strong>辰 · 丑</strong></td><td>龙 · 牛</td></tr>\n    <tr><td class=\"center\"><strong>戌 · 未</strong></td><td>狗 · 羊</td></tr>\n  </tbody>\n</table>\n\n<p>相破力量较弱，但叠加冲害之时，往往是「压倒骆驼的最后一根稻草」。学者起名，能避则避。</p>\n\n<!-- 第七章 -->"}, {"id": "v二-c7", "kind": "chapter", "volNum": "二", "volTitle": "法 之 精 要", "volSubtitle": "地支吉凶关系全解", "volQuote": "「合则气聚，冲则气散；刑则内耗，害则暗箭。」<br>—— 地支关系总则", "chapNum": "第 七 章", "chapTitle": "天罗地网与四大桃花", "content": "<p class=\"lead\">除前述六合、三合、三会、六冲、相害、相刑、相破之外，地支尚有两组特殊关系——天罗地网与四大桃花。前者主受困受制，后者主人缘异性，皆为姓名学中不可不察之要项。</p>\n\n<h2>一、天罗地网</h2>\n\n<p>天罗地网，是十二地支中四个特殊位置——<strong>丑、辰、未、戌</strong>，亦即「四库土」之肖。此四肖如同居于「土之牢笼」之中，若再于名字中助其土气过旺，则有「锁住」之患。</p>\n\n<table>\n  <thead>\n    <tr><th>四库生肖</th><th>主要表现</th><th>起名要诀</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>丑牛</strong></td><td>勤劳难伸 · 受制于人</td><td>避免再叠土字根 · 适度补金水</td></tr>\n    <tr><td class=\"center\"><strong>辰龙</strong></td><td>抱负受困 · 大器晚成</td><td>避免田、口、宀之类困龙字根</td></tr>\n    <tr><td class=\"center\"><strong>未羊</strong></td><td>付出多 · 回报少</td><td>避免再叠土 · 用木字根疏之</td></tr>\n    <tr><td class=\"center\"><strong>戌狗</strong></td><td>处处碰壁 · 守而难展</td><td>用心忄、月、亻字根扶之</td></tr>\n  </tbody>\n</table>\n\n<h2>二、四大桃花</h2>\n\n<p>子、午、卯、酉，称为<strong>「四正」</strong>，又称<strong>「四桃花」</strong>。此四位居四方之正中，气场最为旺盛而专一，故主桃花、人缘、异性缘。</p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">桃花有正有邪</div>\n  <p>桃花并非全凶。<strong>正桃花</strong>主人缘佳、贵人多、异性敬重；<strong>邪桃花</strong>则主滥情、绯闻、感情纠葛。其分野，在于桃花之能量是否「过旺」与「与命相合」。</p>\n  <p>属鼠、马、兔、鸡之人，本命已带桃花。其名字若再用桃花字根（如花、艳、丽、彩、媚），则桃花过旺，易成「邪桃花」；反之，若用稳重之字调和，则能化邪为正。</p>\n</div>\n\n<h3>四桃花的起名平衡之道</h3>\n\n<ol>\n  <li><strong>属鼠</strong>：本命水气重，桃花亦旺。起名宜用稳土之字（如「安、宜、宇、宁、家」）以「土克水」之力调和过旺桃花。</li>\n  <li><strong>属马</strong>：本命火气盛，桃花张扬。起名宜用木字根缓泄火气，木火通明而不焦躁。</li>\n  <li><strong>属兔</strong>：本命柔木，桃花温和。起名宜配土字根使其有依，避免「桃花飘零」之意象。</li>\n  <li><strong>属鸡</strong>：本命金气清，桃花精致。起名宜用山或彩衣字根升其格，使其桃花归于风骨。</li>\n</ol>\n\n<p>本卷至此，地支吉凶关系已全。读者宜掌握以下口诀：</p>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">地 支 关 系 总 诀</div>\n  <p>合者气聚 · 三合三会皆为吉，<br>冲者气散 · 六冲三刑皆为凶；<br>害者贴身 · 暗箭防之于亲近，<br>破者损财 · 合伙慎之莫贪求；<br>自刑则纠结，桃花需调和，<br>四库防地网，方为名理通。</p>\n</div>\n\n<!-- ========== 第三卷 ========== -->"}, {"id": "v三-c1", "kind": "chapter", "volNum": "三", "volTitle": "术 之 核 心", "volSubtitle": "五得理论详解", "volQuote": "「得食则衣食无忧，得地则根基稳固，<br>得位则事业有成，得势则贵人相助，得福则一生安逸。」", "chapNum": "第 一 章", "chapTitle": "五得总论", "content": "<p class=\"lead\">五得，是生肖姓名学最具体、最实用、最易掌握的实操体系。它将抽象的吉凶之论，落地为五个清晰的维度——食、地、位、势、福。每一维度，对应人生的一项根本福祉；五维俱全，即为吉名之极致。</p>\n\n<h2>一、五得之名义</h2>\n\n<table>\n  <thead>\n    <tr><th>五得</th><th>核心意涵</th><th>对应福祉</th><th>对应字根</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>得食</strong></td><td>顺应饮食之性</td><td>财富 · 衣食 · 福气</td><td>禾米豆麦艹（草食）<br>心忄月（肉食）</td></tr>\n    <tr><td class=\"center\"><strong>得地</strong></td><td>得居所之安</td><td>住所 · 根基 · 资产</td><td>口宀门广户（穴居）<br>山林木丘（山居）</td></tr>\n    <tr><td class=\"center\"><strong>得位</strong></td><td>得地位之尊</td><td>事业 · 地位 · 格局</td><td>王大君（大肖）<br>小少士臣（小肖）</td></tr>\n    <tr><td class=\"center\"><strong>得势</strong></td><td>得人助之缘</td><td>人缘 · 贵人 · 声望</td><td>衣巾糸示彡羽（彩衣）<br>亻人言（贵人）</td></tr>\n    <tr><td class=\"center\"><strong>得福</strong></td><td>得安逸之份</td><td>安逸 · 享福 · 平安</td><td>宏云松元允先（跷脚）<br>夕梦汐月（夜行）</td></tr>\n  </tbody>\n</table>\n\n<h2>二、五得之逻辑</h2>\n\n<p>五得并非凭空设立，而是顺应「动物本性」与「人类福祉」之深层对应。古人观察生肖动物之生存所需——食物、住所、地位、伙伴、闲暇，乃将之投射于人之命运。这五项，恰恰也是人一生所追求的根本：</p>\n\n<ul>\n  <li><strong>食</strong>——衣食无忧，是生存的基础；</li>\n  <li><strong>地</strong>——安居乐业，是稳定的前提；</li>\n  <li><strong>位</strong>——事业地位，是发展的舞台；</li>\n  <li><strong>势</strong>——贵人人缘，是飞跃的助力；</li>\n  <li><strong>福</strong>——安享晚年，是圆满的归宿。</li>\n</ul>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">五 得 心 法</div>\n  <p>食为根、地为基、位为干、势为枝、福为果。<br>根深而基固，基固而干壮，干壮而枝茂，枝茂而果丰。</p>\n</div>\n\n<h2>三、五得圆满之难</h2>\n\n<p>初学者常误以为「五得齐备」乃理所当然——只要选字时各取一类，便算圆满。其实大谬。五得之难，难在：</p>\n\n<ol>\n  <li><strong>同一字往往兼涉数得</strong>，须细辨其主次；</li>\n  <li><strong>姓氏已定，已占一格</strong>，名字两字须填补三得，余者不可强求；</li>\n  <li><strong>不同生肖宜得不同</strong>，强求齐备反成累赘；</li>\n  <li><strong>字之间需协调</strong>，不可生拼硬凑。</li>\n</ol>\n\n<p>故起名实务中，<strong>「五得三得即吉，四得为优，五得圆满乃极品」</strong>。能取三得已属难得，能取四得已为佳作，五得圆满之名，可遇而不可强求。</p>\n\n<!-- 第二章 得食 -->"}, {"id": "v三-c2", "kind": "chapter", "volNum": "三", "volTitle": "术 之 核 心", "volSubtitle": "五得理论详解", "volQuote": "「得食则衣食无忧，得地则根基稳固，<br>得位则事业有成，得势则贵人相助，得福则一生安逸。」", "chapNum": "第 二 章", "chapTitle": "得食 · 财富衣食之根本", "content": "<p class=\"lead\">食者，命之本也。一个生肖若食得其性，则一生衣食无忧、财源不断。得食，是五得之中最易理解、亦最易兑现的一项——它直接关乎财富与生活质量。</p>\n\n<h2>一、生肖饮食之分类</h2>\n\n<p>十二生肖按饮食习性，可分为三大类：</p>\n\n<table>\n  <thead>\n    <tr><th>饮食类别</th><th>对应生肖</th><th>主要食物</th><th>得食字根</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>草食类</strong></td><td>鼠 · 牛 · 兔 · 马 · 羊 · 鸡 · 猪</td><td>禾、米、豆、麦、草</td><td><strong>禾、米、豆、麦、艹</strong></td></tr>\n    <tr><td class=\"center\"><strong>肉食类</strong></td><td>虎 · 蛇 · 狗</td><td>肉、心、血</td><td><strong>心、忄、月（肉）</strong></td></tr>\n    <tr><td class=\"center\"><strong>特殊类</strong></td><td>龙（食云水）<br>猴（食杂）</td><td>云水、果实杂物</td><td>龙：日月云雨水<br>猴：天性灵动，不重得食</td></tr>\n  </tbody>\n</table>\n\n<h2>二、草食生肖的得食字</h2>\n\n<p>七大草食生肖，皆喜以下字根，但每一肖侧重略有不同：</p>\n\n<div class=\"radical-row\"><div class=\"label\">禾字根</div><div class=\"content\">秀、秋、科、程、和、季、秉、穆、黎、秦、稻、稷、稼、穗、稳、积、稚</div></div>\n<div class=\"radical-row\"><div class=\"label\">米字根</div><div class=\"content\">米、粒、粹、粱、粲、粟、糯、糜、籽、粉、粳</div></div>\n<div class=\"radical-row\"><div class=\"label\">豆字根</div><div class=\"content\">豆、豐（丰）、登、頭（头）、豈（岂）、豎（竖）</div></div>\n<div class=\"radical-row\"><div class=\"label\">麦字根</div><div class=\"content\">麦、麸、麴、麯</div></div>\n<div class=\"radical-row\"><div class=\"label\">草艹字根</div><div class=\"content\">芳、芸、芷、芮、茵、茗、茹、荷、莉、菁、萱、蓉、萍、英、茉、茂、荃、薇、菱、菡、蓓、蕊、蓝、苓、芹、葳、葆、菊、莎</div></div>\n\n<h2>三、肉食生肖的得食字</h2>\n\n<p>三大肉食生肖（虎、蛇、狗），喜带「心、忄、月（肉）」字根。需注意：「月」字根在汉字中有两源——一为月亮之「月」，一为肉部之「月」。两者在姓名学中皆吉，但意涵不同。</p>\n\n<div class=\"radical-row\"><div class=\"label\">心字根</div><div class=\"content\">志、念、忠、恩、思、慕、慧、忆、惠、悉、忻、悦、悟、情、惟、悠、宪</div></div>\n<div class=\"radical-row\"><div class=\"label\">忄字根</div><div class=\"content\">怡、恒、恬、恪、恕、悯、悄、悌、惇、惟、慎、慷、慈、愉、悦</div></div>\n<div class=\"radical-row\"><div class=\"label\">月（肉）字根</div><div class=\"content\">朋、朔、期、朗、望、肖、育、有、肯、胜、能、胤、腾、肤、肥</div></div>\n\n<h2>四、龙之得食</h2>\n\n<p>辰龙特殊，其食天上之精气——日、月、云、雨、水。以下字皆为龙之得食吉字：</p>\n\n<div class=\"radical-row\"><div class=\"label\">天体字</div><div class=\"content\">明、昕、昀、昱、晨、景、曜、曦、朗、月、宙、宇、宸</div></div>\n<div class=\"radical-row\"><div class=\"label\">云雨字</div><div class=\"content\">云、霖、雯、霏、霓、霞、雪、雷、霆、零、霜、震、霄</div></div>\n<div class=\"radical-row\"><div class=\"label\">水气字</div><div class=\"content\">涵、清、浩、泽、泓、涛、淼、潼、源、泉、溶、济、瀚、漾</div></div>\n\n<div class=\"warning\">\n  <div class=\"warning-title\">得食三大忌</div>\n  <p>一、肉食生肖（虎蛇狗）<strong>忌用</strong>禾米艹豆麦——此为强逼食草，反致饿肚不饱；</p>\n  <p>二、草食生肖<strong>忌用</strong>心忄月——此为肉食上桌，反致积食腹胀；</p>\n  <p>三、龙忌用一切凡间食粮——龙吞凡食则降格为蛇虫之类。</p>\n</div>\n\n<!-- 第三章 得地 -->"}, {"id": "v三-c3", "kind": "chapter", "volNum": "三", "volTitle": "术 之 核 心", "volSubtitle": "五得理论详解", "volQuote": "「得食则衣食无忧，得地则根基稳固，<br>得位则事业有成，得势则贵人相助，得福则一生安逸。」", "chapNum": "第 三 章", "chapTitle": "得地 · 安居根基之保障", "content": "<p class=\"lead\">得地者，得安居之所、立家业之基也。住所于人，犹巢穴于鸟、洞穴于兽。一名之中得地，则一生有家可归、有业可立、有产可置。无地之名，则如浮萍漂泊、无根无系。</p>\n\n<h2>一、生肖栖息之分</h2>\n\n<table>\n  <thead>\n    <tr><th>栖息类别</th><th>对应生肖</th><th>得地字根</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>洞穴居</strong></td><td>鼠、兔、蛇、猪、狗</td><td>口、宀、宅、穴</td></tr>\n    <tr><td class=\"center\"><strong>门栏居</strong></td><td>牛、羊、马、鸡</td><td>口、宀、门、广、户</td></tr>\n    <tr><td class=\"center\"><strong>山林居</strong></td><td>虎、猴</td><td>山、林、木、丘</td></tr>\n    <tr><td class=\"center\"><strong>天空居</strong></td><td>龙</td><td>天、日、月、云、雨、辰</td></tr>\n  </tbody>\n</table>\n\n<h2>二、得地字根详解</h2>\n\n<div class=\"radical-row\"><div class=\"label\">口字根</div><div class=\"content\">口、和、合、品、固、回、园、围、国、容（口字根多伴宀、广出现，是穴居之象）</div></div>\n<div class=\"radical-row\"><div class=\"label\">宀字根</div><div class=\"content\">安、宇、宏、宁、宗、宜、宣、宥、家、宸、富、守、宙、容、宛、宝、寒、宪、密</div></div>\n<div class=\"radical-row\"><div class=\"label\">门字根</div><div class=\"content\">门、闻、阁、阐、闽、阅、阑、阙、闿</div></div>\n<div class=\"radical-row\"><div class=\"label\">广字根</div><div class=\"content\">广、府、庭、庠、庸、庚、庞、庆、康、应（多用于牛羊马鸡之得地）</div></div>\n<div class=\"radical-row\"><div class=\"label\">山林字</div><div class=\"content\">岚、岩、峰、峻、崇、嵩、岳、林、森、楚、松、柏、柳、柯、桂、桓、楷、梓（虎之专属）</div></div>\n\n<h2>三、得地之特殊禁忌</h2>\n\n<div class=\"warning\">\n  <div class=\"warning-title\">得地四大忌</div>\n  <p>一、<strong>虎忌洞穴</strong>——虎为山中之王，受困于穴则成「困虎」，失其威。虎宜山林、宜大字；</p>\n  <p>二、<strong>龙忌洞穴</strong>——龙游天空，居洞穴则失其神。龙宜云雨、宜日月；</p>\n  <p>三、<strong>猪忌山字</strong>——猪天性厌山，山字字根反令其奔波劳碌；</p>\n  <p>四、<strong>兔忌山字</strong>——兔遇山则惊惧，亦不可用。</p>\n</div>\n\n<!-- 第四章 得位 -->"}, {"id": "v三-c4", "kind": "chapter", "volNum": "三", "volTitle": "术 之 核 心", "volSubtitle": "五得理论详解", "volQuote": "「得食则衣食无忧，得地则根基稳固，<br>得位则事业有成，得势则贵人相助，得福则一生安逸。」", "chapNum": "第 四 章", "chapTitle": "得位 · 事业地位之契机", "content": "<p class=\"lead\">位者，地位也、格局也、舞台也。一个人在社会上的位置，决定他一生能成多大事。得位之名，使命主能立得身、出得头、撑得场。然位之高下，须视生肖气场——大肖宜称王，小肖宜辅佐，错配则成笑柄。</p>\n\n<h2>一、生肖气场之大小</h2>\n\n<table>\n  <thead>\n    <tr><th>气场类别</th><th>对应生肖</th><th>得位之道</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>大生肖</strong></td><td>鼠（地支之首）<br>虎（山林之王）<br>龙（神物之尊）<br>马（驰骋之雄）</td><td>宜称王掌权<br>用「王、大、君、帝、令、冠」</td></tr>\n    <tr><td class=\"center\"><strong>小生肖</strong></td><td>牛、兔、蛇、羊<br>猴、鸡、狗、猪</td><td>宜辅佐守成<br>用「小、少、士、臣、佐、佑」</td></tr>\n  </tbody>\n</table>\n\n<h2>二、大肖称王之字</h2>\n\n<div class=\"radical-row\"><div class=\"label\">王字根</div><div class=\"content\">玲、珍、珊、琦、琪、琳、琴、瑜、瑞、瑶、瑾、璇、璞、璜（王为玉之偏旁，亦称王字根）</div></div>\n<div class=\"radical-row\"><div class=\"label\">大字根</div><div class=\"content\">大、太、奎、奋、奕、奉、奥、奘、奢</div></div>\n<div class=\"radical-row\"><div class=\"label\">君帝字</div><div class=\"content\">君、帝、皇、令、宰、冠、长、首、霸、雄</div></div>\n\n<h2>三、小肖辅佐之字</h2>\n\n<div class=\"radical-row\"><div class=\"label\">小少字</div><div class=\"content\">少、士、臣、亚、佐、佑、仁、仕、壮、诚、伸、佳、伯、伦</div></div>\n<div class=\"radical-row\"><div class=\"label\">辅佐字</div><div class=\"content\">辅、弼、襄、副、协、扶、丞、宰</div></div>\n\n<h2>四、酉鸡之得位特例</h2>\n\n<p>酉鸡虽为小生肖，但有「鸡戴冠」之吉象。鸡顶上有冠，是其身份的象征。故鸡可用「冠」字根，亦可用兴、泰之类登高之字：</p>\n\n<div class=\"radical-row\"><div class=\"label\">鸡冠字</div><div class=\"content\">兴、泰、腾、翊、晟、昱、智、景、章、彰、彦</div></div>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">得位心法</div>\n  <p>大者称王，小者居臣，鸡独戴冠，此名学之三得位也。<br>大者若降，则失尊；小者若僭，则败身。各得其位，乃为吉。</p>\n</div>\n\n<!-- 第五章 得势 -->"}, {"id": "v三-c5", "kind": "chapter", "volNum": "三", "volTitle": "术 之 核 心", "volSubtitle": "五得理论详解", "volQuote": "「得食则衣食无忧，得地则根基稳固，<br>得位则事业有成，得势则贵人相助，得福则一生安逸。」", "chapNum": "第 五 章", "chapTitle": "得势 · 贵人人缘之助力", "content": "<p class=\"lead\">势者，气场之外延也、人缘之总和也、贵人之络也。一个人若得势，则朋友环侍、贵人扶持，做事不难、行路不孤。得势之名，能令命主「升格」——气场提升一阶，地位提升一品，机遇增加一分。</p>\n\n<h2>一、彩衣字根（升格之象）</h2>\n\n<p>动物披彩衣，乃尊贵之象征——鸡之彩羽、虎之锦纹、龙之鳞甲，皆为其身份印记。在姓名学中，彩衣字根能为生肖<strong>升格</strong>，使其得到尊崇之待遇。</p>\n\n<div class=\"radical-row\"><div class=\"label\">衣字根</div><div class=\"content\">依、衫、裴、裕、装、补、复、表</div></div>\n<div class=\"radical-row\"><div class=\"label\">巾字根</div><div class=\"content\">布、希、帛、帆、师、帝、席、帜、常、帷、幄、幅</div></div>\n<div class=\"radical-row\"><div class=\"label\">糸字根</div><div class=\"content\">素、绮、缘、绢、纯、绅、缔、维、绪、纳、绛</div></div>\n<div class=\"radical-row\"><div class=\"label\">示字根</div><div class=\"content\">祯、祥、福、禄、礼、祉、祎、祐</div></div>\n<div class=\"radical-row\"><div class=\"label\">彡字根</div><div class=\"content\">彤、彦、彬、彪、彰、彭、影、彻</div></div>\n<div class=\"radical-row\"><div class=\"label\">羽字根</div><div class=\"content\">翊、翠、翎、翔、翰、翱、翼、翘</div></div>\n\n<table>\n  <thead>\n    <tr><th>分类</th><th>生肖</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>适用</strong></td><td>鼠、虎、马、蛇、猴、鸡、龙、兔、狗</td><td>披彩衣气场升格、风采尊崇</td></tr>\n    <tr><td class=\"center\"><strong>大忌</strong></td><td>牛、羊、猪</td><td>披彩衣易被视为祭品 · 一生劳碌付出 · 无福享受</td></tr>\n  </tbody>\n</table>\n\n<h2>二、贵人字根（人缘之象）</h2>\n\n<p>「亻」（人）、「言」字根，主见人、得人助。马、猴、狗喜得人照料，为天性所喜。但需注意——非所有生肖皆喜见人。</p>\n\n<div class=\"radical-row\"><div class=\"label\">亻字根</div><div class=\"content\">仁、仲、任、伍、伯、佳、俊、信、修、伦、健、咏、诗、诚、语、佑、佩、伟、佚、休、傅</div></div>\n<div class=\"radical-row\"><div class=\"label\">言字根</div><div class=\"content\">语、诗、诚、谊、谦、谨、讷、谌、誉、警、议</div></div>\n\n<table>\n  <thead>\n    <tr><th>分类</th><th>生肖</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>适用</strong></td><td>马、猴、狗、酉鸡（部分）</td><td>得人则得贵人扶持</td></tr>\n    <tr><td class=\"center\"><strong>大忌</strong></td><td>鼠、虎、龙、兔、蛇、猪</td><td>见人则受惊、受困、降格</td></tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <div class=\"warning-title\">见人字根的特殊禁忌</div>\n  <p>一、<strong>鼠见人</strong>——人见鼠则击，鼠遇人则逃，一生劳碌；<br>二、<strong>龙见人</strong>——龙降格为蛇虫，失其神威；<br>三、<strong>蛇见人</strong>——蛇遇人则被打死，受制大凶；<br>四、<strong>猪见人</strong>——猪遇人则被宰，失其安宁。</p>\n</div>\n\n<!-- 第六章 得福 -->"}, {"id": "v三-c6", "kind": "chapter", "volNum": "三", "volTitle": "术 之 核 心", "volSubtitle": "五得理论详解", "volQuote": "「得食则衣食无忧，得地则根基稳固，<br>得位则事业有成，得势则贵人相助，得福则一生安逸。」", "chapNum": "第 六 章", "chapTitle": "得福 · 安逸晚年之回报", "content": "<p class=\"lead\">福者，安逸也、闲雅也、终老有依也。前四得（食、地、位、势）皆主奋进取得；唯得福一项，主收成与享受。一个人若一生勤勉，到头来无福可享，亦是命运之憾。得福之字根，是为命主一生最后一段路点亮一盏灯。</p>\n\n<h2>一、跷脚字根（安逸之象）</h2>\n\n<p>「跷脚」一名，源自动物悠闲歇息之姿。某些字根因笔画结构之故，呈「翘脚」之形，故有安逸之象。</p>\n\n<div class=\"radical-row\"><div class=\"label\">ㄙ ㄠ 形字</div><div class=\"content\">宏、云、松、元、允、先、兆、全、公、典、共、兹、丝、玄、率、台</div></div>\n\n<table>\n  <thead>\n    <tr><th>分类</th><th>生肖</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>适用</strong></td><td>鼠、牛、羊、猪</td><td>性温而喜静，跷脚得享福</td></tr>\n    <tr><td class=\"center\"><strong>不宜</strong></td><td>蛇、鸡、龙、马</td><td>性动而需进取，跷脚反致懒散</td></tr>\n  </tbody>\n</table>\n\n<h2>二、夜行字根（自在之象）</h2>\n\n<p>夜行生肖，喜月光夜色。其得福字根带「夕、月、梦、汐」之类。</p>\n\n<div class=\"radical-row\"><div class=\"label\">夜字根</div><div class=\"content\">夕、梦、汐、月、朋、朗、朔、望、宇、宿</div></div>\n\n<table>\n  <thead>\n    <tr><th>分类</th><th>生肖</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>夜行生肖</strong></td><td>鼠 · 蛇 · 猪 · 兔（夜间觅食或活动）</td></tr>\n  </tbody>\n</table>\n\n<h2>三、五得圆满之总观</h2>\n\n<table>\n  <thead>\n    <tr><th>五得</th><th>核心字根</th><th>主要功用</th><th>易错之处</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>得食</strong></td><td>禾米艹豆（草食）<br>心忄月（肉食）</td><td>财运 · 衣食</td><td>错配草食肉食</td></tr>\n    <tr><td class=\"center\"><strong>得地</strong></td><td>口宀门广户<br>山林（虎）日月（龙）</td><td>住所 · 根基</td><td>困龙困虎</td></tr>\n    <tr><td class=\"center\"><strong>得位</strong></td><td>王大君（大肖）<br>小少士臣（小肖）</td><td>事业 · 地位</td><td>大小错配</td></tr>\n    <tr><td class=\"center\"><strong>得势</strong></td><td>衣巾糸示彡羽<br>亻人言</td><td>人缘 · 贵人</td><td>牛羊猪不可彩衣</td></tr>\n    <tr><td class=\"center\"><strong>得福</strong></td><td>宏云松元允<br>夕月梦汐</td><td>安逸 · 晚年</td><td>动肖不宜跷脚</td></tr>\n  </tbody>\n</table>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">五 得 之 终 极 心 法</div>\n  <p>食以养身，地以安身，位以立身，势以助身，福以归身。<br>五者俱备者，名之极品；五者得三，已是吉名。<br>不可强求，但应力争；不必齐全，但需精当。</p>\n</div>\n\n<!-- ===================== 卷四 字之奥秘 ===================== -->"}, {"id": "v四-c1", "kind": "chapter", "volNum": "四", "volTitle": "字 之 奥 秘", "volSubtitle": "字根识别 · 形音义辨 · 替身警示", "volQuote": "「字字皆有形，形形皆有义；<br>识其根，方知其用；明其理，方得其妙。」", "chapNum": "第 一 章", "chapTitle": "部首与字根：姓名学之解码钥匙", "content": "<p>文字是中华文明的载体，是先贤\"仰观天文、俯察地理、近取诸身、远取诸物\"所造。每一汉字皆有其本源、构形、寓意。生肖姓名学之精髓，正在于通过<strong>字根</strong>识别字之能量本质，从而判断其与生肖之契合度。</p>\n\n<h2>一、何谓\"部首\"，何谓\"字根\"</h2>\n\n<p><strong>部首</strong>是《说文解字》《康熙字典》中分类汉字的标志性偏旁，是字典学的概念，共计214部（康熙）；而<strong>字根</strong>则是姓名学的概念，指构成汉字的具有特定能量与象征意义的基本部件，可能是部首，也可能是部首之外的偏旁、字形、结构。</p>\n\n<div class=\"tip\">\n  <strong>关键区别：</strong>部首是分类工具，字根是能量符号。例如\"湘\"字，部首为\"氵\"（水），但其字根包括\"氵\"（水）、\"木\"（树）、\"目\"（眼）三层信息，每一字根皆参与能量判断。\n</div>\n\n<h2>二、字根的三大功用</h2>\n\n<table>\n  <thead>\n    <tr><th>功用</th><th>说明</th><th>实例</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>定五行</strong></td>\n      <td>字根决定字的五行属性，如\"氵\"主水、\"木\"主木、\"火\"主火</td>\n      <td>\"林\"含双木→木旺<br>\"森\"含三木→极旺</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>定生肖宜忌</strong></td>\n      <td>字根直接对应生肖喜忌，决定一字是吉是凶</td>\n      <td>\"艹\"喜于草食生肖<br>\"心\"喜于肉食生肖</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>定能量品级</strong></td>\n      <td>字根决定字的能量等级，如\"王\"为权位字根、\"宀\"为安居字根</td>\n      <td>\"璋\"含王→称王得位<br>\"安\"含宀→安居得地</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、常用生肖字根速查</h2>\n\n<div class=\"radical-row\"><div class=\"label\">鼠字根</div><div class=\"content\">子、孑、孔、孜、存、孝、孟、孙、学、宇、字、季</div></div>\n<div class=\"radical-row\"><div class=\"label\">牛字根</div><div class=\"content\">丑、纽、扭、田（部分）、生、特、牟、牢、牲</div></div>\n<div class=\"radical-row\"><div class=\"label\">虎字根</div><div class=\"content\">寅、虎、虓、彪、虞、處（处）、虑、虚、虹、虞</div></div>\n<div class=\"radical-row\"><div class=\"label\">兔字根</div><div class=\"content\">卯、迎、印、聊、柳、留、貌</div></div>\n<div class=\"radical-row\"><div class=\"label\">龙字根</div><div class=\"content\">辰、龙、龚、宠、农、振、晨、唇、辱、辙；亦含\"东、京、辛、君\"等含龙气者</div></div>\n<div class=\"radical-row\"><div class=\"label\">蛇字根</div><div class=\"content\">巳、廴、辶、弓、几、虫、邑、之；廷、延、建、迁、运、巡</div></div>\n<div class=\"radical-row\"><div class=\"label\">马字根</div><div class=\"content\">午、马、骏、骐、骞、腾、驰、驾、驿；灬（火/马蹄印）</div></div>\n<div class=\"radical-row\"><div class=\"label\">羊字根</div><div class=\"content\">未、羊、義、群、羚、翔、善、美、姜</div></div>\n<div class=\"radical-row\"><div class=\"label\">猴字根</div><div class=\"content\">申、伸、绅、神、坤、袁、猿、侯</div></div>\n<div class=\"radical-row\"><div class=\"label\">鸡字根</div><div class=\"content\">酉、鸿、鸣、鹏、鸾、鹤、配、酬、醒；非（双羽）</div></div>\n<div class=\"radical-row\"><div class=\"label\">狗字根</div><div class=\"content\">戌、犭、犬、戎、伏、狄、狼、献、状、然</div></div>\n<div class=\"radical-row\"><div class=\"label\">猪字根</div><div class=\"content\">亥、豕、家、毅、緣（部分）、豪、象、豫、豹</div></div>\n\n<div class=\"warning\">\n  <strong>耳旁之深义：</strong>左耳旁\"阝\"藏\"阜\"，原意土山堆积，主受人压制；右耳旁\"阝\"藏\"邑\"，原意城邦聚落，主进入框架。古云\"拎耳朵被人牵\"，故陈、邱、邵、邰、邓、郭、郑等姓氏，本身已具一定受制气场，须以名补救。\n</div>\n\n<!-- 卷四第二章 -->"}, {"id": "v四-c2", "kind": "chapter", "volNum": "四", "volTitle": "字 之 奥 秘", "volSubtitle": "字根识别 · 形音义辨 · 替身警示", "volQuote": "「字字皆有形，形形皆有义；<br>识其根，方知其用；明其理，方得其妙。」", "chapNum": "第 二 章", "chapTitle": "字形阴阳：左右、上下、内外之能量分布", "content": "<p>每一汉字皆是一座微型宇宙，其内部按结构方位分配阴阳。字形阴阳的判断，是姓名学进阶之关键，更是确认字之\"主能量位\"之依据。</p>\n\n<h2>一、左右结构：左阴右阳</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">能量分布原则</div>\n  <p>汉字之左右结构，<strong>左为阴、右为阳</strong>。阴主内、主静、主储；阳主外、主动、主显。能量主体多在右部，故判断字根吉凶时，<strong>右部字根之影响更显著</strong>。</p>\n</div>\n\n<table>\n  <thead>\n    <tr><th>实例</th><th>左部（阴）</th><th>右部（阳）</th><th>主能量</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>陈</strong></td><td>阝（左耳·受制）</td><td>东（龙·尊贵）</td><td>外显尊贵，内藏受制</td></tr>\n    <tr><td class=\"center\"><strong>湘</strong></td><td>氵（水）</td><td>相（木+目）</td><td>外显观察智慧，内藏水</td></tr>\n    <tr><td class=\"center\"><strong>明</strong></td><td>日</td><td>月</td><td>外显月光柔和，内藏太阳</td></tr>\n    <tr><td class=\"center\"><strong>程</strong></td><td>禾（草食）</td><td>呈（口+王）</td><td>外显王口，内藏粮食</td></tr>\n  </tbody>\n</table>\n\n<div class=\"tip\">\n  <strong>实务运用：</strong>姓陈者，姓氏左部\"阝\"主长辈给予的压力；右部\"东\"主自身的尊贵气场。判断时，应先看\"东\"对生肖之吉凶，再衡量\"阝\"之负面影响。这亦是\"姓陈者，鸡蛇生肖三合天助\"的依据——\"东\"含龙气，\"龙鸡六合，蛇龙皆三合金局\"。\n</div>\n\n<h2>二、上下结构：上阳下阴</h2>\n\n<p>上下结构之字，上部为阳，主显、主头、主表；下部为阴，主隐、主基、主里。上部决定外在表现，下部决定根基稳固。</p>\n\n<table>\n  <thead>\n    <tr><th>实例</th><th>上部（阳）</th><th>下部（阴）</th><th>能量解析</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>家</strong></td><td>宀（屋顶）</td><td>豕（猪）</td><td>家中有猪→富足之象</td></tr>\n    <tr><td class=\"center\"><strong>宇</strong></td><td>宀（屋顶）</td><td>于（鼠根之一说）</td><td>宇宙之家，包容万象</td></tr>\n    <tr><td class=\"center\"><strong>男</strong></td><td>田</td><td>力</td><td>田中出力，劳作之象</td></tr>\n    <tr><td class=\"center\"><strong>志</strong></td><td>士</td><td>心</td><td>士之心，心存大志</td></tr>\n  </tbody>\n</table>\n\n<h2>三、内外结构：外阳内阴</h2>\n\n<p>内外结构（包围结构）之字，外部为阳、为框架；内部为阴、为内核。外部决定外在格局，内部决定内在动力。</p>\n\n<table>\n  <thead>\n    <tr><th>实例</th><th>外部（阳·框架）</th><th>内部（阴·内核）</th><th>能量解析</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>园</strong></td><td>口（围栏）</td><td>元（首始）</td><td>有围之园，根基稳固</td></tr>\n    <tr><td class=\"center\"><strong>国</strong></td><td>口</td><td>玉</td><td>国中藏玉，富贵之象</td></tr>\n    <tr><td class=\"center\"><strong>固</strong></td><td>口</td><td>古</td><td>古为根基，固若金汤</td></tr>\n    <tr><td class=\"center\"><strong>困</strong></td><td>口</td><td>木</td><td>木被困住，发展受限<br>（虎、龙忌之）</td></tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>包围之双重性：</strong>\"口\"对兔、蛇、猪等小生肖为得地之\"洞穴\"；对虎、龙、马等大生肖却为\"牢笼\"。同一字形，因生肖不同而吉凶迥异——此即字根能量之相对性。\n</div>\n\n<!-- 卷四第三章 -->"}, {"id": "v四-c3", "kind": "chapter", "volNum": "四", "volTitle": "字 之 奥 秘", "volSubtitle": "字根识别 · 形音义辨 · 替身警示", "volQuote": "「字字皆有形，形形皆有义；<br>识其根，方知其用；明其理，方得其妙。」", "chapNum": "第 三 章", "chapTitle": "字根识别法：透视一字的能量层次", "content": "<p>许多汉字非单一字根所成，而是多重字根叠加。学习字根识别，是姓名学者之基本功。以下提供\"字根分层识别法\"，帮助初学者系统化解读每一字。</p>\n\n<h2>一、四步识别法</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">字根识别四步骤</div>\n  <p><strong>第一步：拆分结构</strong>——确定字为左右、上下、内外或独体结构。</p>\n  <p><strong>第二步：识别字根</strong>——找出每一部件对应之字根（生肖、五行、能量类）。</p>\n  <p><strong>第三步：辨阴阳位</strong>——根据结构判断各字根之主从、显隐位置。</p>\n  <p><strong>第四步：综合判断</strong>——结合生肖喜忌，给出吉凶判断与适用建议。</p>\n</div>\n\n<h2>二、实例演示</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">例一：「廷」字详解</div>\n  <p><strong>结构：</strong>半包围（廴 + 壬）</p>\n  <p><strong>字根：</strong></p>\n  <p>　• 廴（蛇字根之一，蜿蜒前行）</p>\n  <p>　• 壬（天干之水，亦含\"挺立\"之意）</p>\n  <p><strong>判断：</strong>廷之主气为蛇，故\"廷\"宜于蛇之三合（鸡、牛）、三会（马、羊），忌于猪（六冲）、虎（相害）。同时含水气，对申猴有三合助力。</p>\n</div>\n\n<div class=\"example\">\n  <div class=\"example-title\">例二：「兴」字详解</div>\n  <p><strong>结构：</strong>上下（䒑 + 八 + 同上部）</p>\n  <p><strong>字根：</strong></p>\n  <p>　• 上部\"䒑\"——古字\"舉\"之省形，主举起、向上</p>\n  <p>　• 中部含\"水\"气（民俗解读为\"双手捧水\"）</p>\n  <p>　• \"冠\"之意——加冕之象</p>\n  <p><strong>判断：</strong>\"兴\"为加冕字，最适于酉鸡（鸡戴冠为得位之吉）。鸡用\"兴\"为升格之上字。</p>\n</div>\n\n<div class=\"example\">\n  <div class=\"example-title\">例三：「淏」字详解</div>\n  <p><strong>结构：</strong>左右（氵 + 昊）</p>\n  <p><strong>字根：</strong></p>\n  <p>　• 氵（水，鼠字根）</p>\n  <p>　• 日（太阳，龙喜）</p>\n  <p>　• 天（高远）</p>\n  <p><strong>判断：</strong>淏字水日天三合，为辰龙得位、得地之大吉字。\"淏\"主大财、干大事、六合财库——龙得水则升腾，得日则光辉，得天则归位。</p>\n</div>\n\n<div class=\"example\">\n  <div class=\"example-title\">例四：「冠」字详解</div>\n  <p><strong>结构：</strong>上下（冖 + 元 + 寸）</p>\n  <p><strong>字根：</strong></p>\n  <p>　• 冖（覆盖、加冕）</p>\n  <p>　• 元（首位、根本）</p>\n  <p>　• 寸（法度、节制）</p>\n  <p><strong>判断：</strong>冠为加冕之字，主有头有尾、补九（圆满）。鼠、虎、龙用之得位；酉鸡用之\"鸡戴冠\"双吉。但羊、牛等忌称王生肖不宜，会反为压力。</p>\n</div>\n\n<h2>三、复合字根的优先级判断</h2>\n\n<p>当一字含多重字根，且部分字根对生肖为吉、部分为凶时，须依以下原则判断主能量：</p>\n\n<table>\n  <thead>\n    <tr><th>优先级</th><th>判断原则</th><th>实例</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>第一位</strong></td><td>主部首（字典分类）之能量为主</td><td>\"湘\"主部首氵→水气主导</td></tr>\n    <tr><td class=\"center\"><strong>第二位</strong></td><td>右部（阳位）之能量次之</td><td>\"陈\"右部\"东\"→龙气次之</td></tr>\n    <tr><td class=\"center\"><strong>第三位</strong></td><td>占字最大空间之字根再次</td><td>\"森\"以三木叠加→木气极旺</td></tr>\n    <
