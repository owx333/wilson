tr><td class=\"center\"><strong>第四位</strong></td><td>隐藏字根（小空间）影响最弱</td><td>\"安\"含\"女\"→女气微弱</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷四第四章 -->"}, {"id": "v四-c4", "kind": "chapter", "volNum": "四", "volTitle": "字 之 奥 秘", "volSubtitle": "字根识别 · 形音义辨 · 替身警示", "volQuote": "「字字皆有形，形形皆有义；<br>识其根，方知其用；明其理，方得其妙。」", "chapNum": "第 四 章", "chapTitle": "替身字：暗藏之名，潜伏之凶", "content": "<p>替身字，是姓名学中一类特殊而隐蔽的字眼。其字面看似无害，实则在字根深处暗藏\"以己代他\"之意——用此字者，往往一生为他人替身，付出多回报少，事不在己却受其累。</p>\n\n<h2>一、何谓\"替身\"</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">替身字之核心义</div>\n  <p>替身字含有\"代替、替代、他名\"之深层语意。古人造字之初，此类字多用以指代他人或他物，用之命名，潜意识中将自身置于\"代替者\"位置——他人之事压己身、他人之福归他人、他人之祸己来挡。</p>\n</div>\n\n<h2>二、三大典型替身字详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>替身字</th><th>本义</th><th>替身之凶</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>其</strong></td>\n      <td>古为\"箕\"，又为代词\"他、它、那\"</td>\n      <td>用之者，常为他人作嫁衣<br>事业为人作嫁，财富归他人，自身耗损</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>予</strong></td>\n      <td>古为\"我\"亦为\"给予\"之意</td>\n      <td>\"予\"双义并存，用之易混淆主客<br>常代人受过、代人受累，付出无回报</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>吾</strong></td>\n      <td>本意\"我\"，但古文中亦作\"他人之代称\"</td>\n      <td>用之者自我边界模糊，被他人占便宜<br>家中事、外间事，皆由其一人承担</td>\n    </tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>三字之外的延伸：</strong>含\"其\"之字（祺、骐、棋、琪、淇、琦……）、含\"予\"之字（豫、抒、舒、序、纾……）、含\"吾\"之字（梧、悟、晤、语、敔……）皆带替身气，须慎用，尤其忌于名一（人格）位。若必用，应于名二补充强力字根中和。\n</div>\n\n<h2>三、其他隐性替身字</h2>\n\n<div class=\"radical-row\"><div class=\"label\">代字根</div><div class=\"content\">代、伐（含\"代\"形）——直接含\"代替\"之意</div></div>\n<div class=\"radical-row\"><div class=\"label\">兼字根</div><div class=\"content\">兼、廉、谦——主\"兼任他人\"之事，劳碌之象</div></div>\n<div class=\"radical-row\"><div class=\"label\">寄字根</div><div class=\"content\">寄、奇、骑——主寄人篱下、依附而非自立</div></div>\n<div class=\"radical-row\"><div class=\"label\">从字根</div><div class=\"content\">从、纵、踪——主追随而非主导</div></div>\n\n<h2>四、化解之道</h2>\n\n<p>若已用替身字命名，无需立即改名，但可从以下方面调和：</p>\n\n<ul>\n  <li><strong>名二补强</strong>——若替身字在名一，名二须用得位、得势字根（王、君、立、卓）以补主体气场。</li>\n  <li><strong>艺名印鉴</strong>——日常使用之艺名、笔名、商号，宜避替身字，以聚正能量。</li>\n  <li><strong>修心立志</strong>——替身字之凶，多在\"自我边界\"模糊；以心法立志、以行动确权，可化解大半。</li>\n</ul>\n\n<!-- 卷四第五章 -->"}, {"id": "v四-c5", "kind": "chapter", "volNum": "四", "volTitle": "字 之 奥 秘", "volSubtitle": "字根识别 · 形音义辨 · 替身警示", "volQuote": "「字字皆有形，形形皆有义；<br>识其根，方知其用；明其理，方得其妙。」", "chapNum": "第 五 章", "chapTitle": "字音字义：声韵之美与寓意之正", "content": "<p>姓名既是能量符号，亦是声音符号。一日之中，被人呼唤数十次；一生之中，听己之名万千遍。声音之能量，潜移默化，不可忽视。</p>\n\n<h2>一、字音三大要诀</h2>\n\n<table>\n  <thead>\n    <tr><th>要诀</th><th>说明</th><th>实例</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>避谐音</strong></td>\n      <td>姓名整体读音不可与不雅词语谐音<br>家庭、地域方言皆需考虑</td>\n      <td>\"史珍香\"<br>\"杜子腾\"<br>\"范统\"</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>调平仄</strong></td>\n      <td>三字姓名最佳平仄：\"仄平仄\"或\"平仄平\"<br>避免三字皆平或皆仄</td>\n      <td>\"李白\"（仄平）<br>\"杜甫\"（仄仄）调整空间</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>顺口诀</strong></td>\n      <td>声母、韵母不可重复造成拗口<br>三字之间应有起承转合</td>\n      <td>避\"周朱舟\"声母同<br>避\"刘游有\"韵母同</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>二、字义五大原则</h2>\n\n<ol>\n  <li><strong>正向不偏激</strong>——字义须吉祥光明，避凶险（如\"血、刀、杀\"）、阴暗（如\"幽、暗、寒\"）。</li>\n  <li><strong>稳重不轻浮</strong>——字义须有担当，避虚浮（如\"飘、影、幻\"）、不实（如\"梦、幻、虚\"）。</li>\n  <li><strong>清雅不浊俗</strong>——字义须脱俗，避粗鄙（如\"傻、愚、蠢\"）、媚俗（如\"富贵、发财\"等过直）。</li>\n  <li><strong>切合不夸大</strong>——字义须与个人匹配，避盲目用\"皇、帝、霸\"等过大字眼。</li>\n  <li><strong>意远不近迫</strong>——字义须有空间，避过满（如\"完、终、绝\"）、过尽（如\"够、足\"）。</li>\n</ol>\n\n<h2>三、声韵与五行的互动</h2>\n\n<p>古人将五音（宫、商、角、徵、羽）与五行对应：</p>\n\n<table>\n  <thead>\n    <tr><th>五音</th><th>五行</th><th>声母示例</th><th>音感</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>宫</strong></td><td>土</td><td>g、k、h</td><td>厚重、稳实</td></tr>\n    <tr><td class=\"center\"><strong>商</strong></td><td>金</td><td>z、c、s</td><td>清冷、坚定</td></tr>\n    <tr><td class=\"center\"><strong>角</strong></td><td>木</td><td>j、q、x</td><td>清亮、生发</td></tr>\n    <tr><td class=\"center\"><strong>徵</strong></td><td>火</td><td>d、t、n、l</td><td>明朗、活跃</td></tr>\n    <tr><td class=\"center\"><strong>羽</strong></td><td>水</td><td>b、p、m、f</td><td>圆润、流动</td></tr>\n  </tbody>\n</table>\n\n<div class=\"tip\">\n  <strong>实务建议：</strong>不必拘泥于音律学，但须避同音同声母之单调，确保姓名有\"起承转合\"之韵律美。读三遍而不拗口、听十次而不刺耳，即是好音。\n</div>\n\n<h2>四、字形美学</h2>\n\n<p>除音义外，字形亦不可忽视。好名之字形，须满足：</p>\n\n<ul>\n  <li><strong>笔画均衡</strong>——三字笔画不可一字过繁、一字过简（如\"魏卜一\"），亦不可三字皆繁难写。</li>\n  <li><strong>结构稳重</strong>——避头重脚轻（上部笔画多于下部数倍），避四面悬空。</li>\n  <li><strong>书写流畅</strong>——签名时三字一气呵成，不会因生僻字反复停顿。</li>\n  <li><strong>视觉端正</strong>——三字组合在一起，整体观感端庄，无怪异。</li>\n</ul>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">音 形 义 三 全 之 法</div>\n  <p>音求悦耳，形求端正，义求吉祥。<br>三者得其一，名可用；得其二，名为佳；得其三，名为上。<br>再合生肖喜忌、五行平衡、五得圆满，即是上上之名。</p>\n</div>\n\n<!-- ===================== 卷五 局之布置 ===================== -->"}, {"id": "v五-c1", "kind": "chapter", "volNum": "五", "volTitle": "局 之 布 置", "volSubtitle": "三段架构 · 单复姓名 · 阴阳调和", "volQuote": "「一字一格，格格相承；<br>三段成局，局定一生。」", "chapNum": "第 一 章", "chapTitle": "姓名三段式：天人地之运势分布", "content": "<p>姓名一物，看似简单三字，实为天人地三才之缩影。每一段落皆掌一段时光，每一段时光皆系一种运势。深谙此理者，方能\"以名造命\"，于人生不同阶段精准布局。</p>\n\n<h2>一、三段总览</h2>\n\n<table>\n  <thead>\n    <tr><th>段位</th><th>对应字</th><th>主管年龄</th><th>身体部位</th><th>主要运势</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>天 部</strong></td>\n      <td>姓 氏</td>\n      <td>0—20岁<br>60—80岁</td>\n      <td>头部以上</td>\n      <td>父母长辈缘<br>祖德先天<br>少年成长<br>晚年回归</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>人 部</strong></td>\n      <td>名 一</td>\n      <td>21—40岁<br>80—100岁</td>\n      <td>颈至肚脐</td>\n      <td>事业感情<br>夫妻关系<br>人际贵人<br>中年主战场</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>地 部</strong></td>\n      <td>名 二</td>\n      <td>41—60岁</td>\n      <td>肚脐以下</td>\n      <td>财富子女<br>晚年福德<br>事业财库<br>健康根基</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>二、天部（姓氏）深解</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">天 部 五 大 主 管</div>\n  <p><strong>1. 祖德前缘</strong>——家族遗传、前世因缘、天资基因</p>\n  <p><strong>2. 智慧才华</strong>——先天聪慧度、学习能力、思维模式</p>\n  <p><strong>3. 父母长辈</strong>——与父母、长辈、上司、领导之缘分深浅</p>\n  <p><strong>4. 功名官运</strong>——事业之上限、官位之可达高度、社会地位</p>\n  <p><strong>5. 头部健康</strong>——头部、颈部以上之身体健康</p>\n</div>\n\n<div class=\"tip\">\n  <strong>女性看夫之提示：</strong>女性看姓氏，可观夫君之条件——姓氏旺者，夫之\"才、材、財\"皆有助力。如姓氏含王、君、龙、贵气者，多嫁得有为之夫；姓氏弱者，需以名补强。\n</div>\n\n<div class=\"warning\">\n  <strong>姓氏不可改：</strong>姓氏是父母祖宗所赐，是先天定数，不可妄改。即使姓氏对生肖有不利之处，亦应以名一、名二之搭配化解，而非更姓。改姓即断祖德，得不偿失。\n</div>\n\n<h2>三、人部（名一）深解</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">人 部 五 大 主 管</div>\n  <p><strong>1. 后天努力</strong>——21—40岁之自我奋斗、人生中心舞台</p>\n  <p><strong>2. 感情位</strong>——夫妻感情、恋爱缘分之关键位</p>\n  <p><strong>3. 人际贵人</strong>——人缘之旺衰、贵人之多寡、社交圈层</p>\n  <p><strong>4. 事业心态</strong>——欲望、野心、奋斗动力</p>\n  <p><strong>5. 中段健康</strong>——颈部至腰部之身体健康，主呼吸、心肺、肠胃</p>\n</div>\n\n<div class=\"warning\">\n  <strong>\"名字吃错\"之严重后果：</strong>若名一之\"得食\"字根错配（如肉食生肖用了草食字根，或反之），易出现：<br>\n  ① 败家败钱——财来财去，存不住<br>\n  ② 偷吃外遇——感情不忠，桃花泛滥<br>\n  ③ 子女不和——名一影响儿女缘<br>\n  此为名一最忌之失，须严防。\n</div>\n\n<h2>四、地部（名二）深解</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">地 部 五 大 主 管</div>\n  <p><strong>1. 财富财库</strong>——金钱积蓄、不动产、资产储备</p>\n  <p><strong>2. 子女缘分</strong>——子女多寡、子女成就、亲子关系</p>\n  <p><strong>3. 福德享受</strong>——晚年福德、生活享受、安逸程度</p>\n  <p><strong>4. 下属员工</strong>——领导力、团队协助、下属关系</p>\n  <p><strong>5. 下身健康</strong>——腰部以下、生殖系统、骨骼关节</p>\n</div>\n\n<div class=\"tip\">\n  <strong>名二之上下细分：</strong>名二上部影响儿子、媳妇之缘；下部影响女儿、女婿之缘。故有女儿者，名二下部宜柔和有福；多子者，名二上部宜稳重有德。\n</div>\n\n<h2>五、三段贯通的最佳布局</h2>\n\n<table>\n  <thead>\n    <tr><th>布局原则</th><th>具体要求</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>姓 旺 名 不 弱</strong></td><td>若姓氏五行强旺，名字宜补、宜引导，不可继续助旺，否则过满则溢</td></tr>\n    <tr><td class=\"center\"><strong>姓 弱 名 助 之</strong></td><td>若姓氏对生肖偏弱或有冲克，名一、名二须有强力字根补救</td></tr>\n    <tr><td class=\"center\"><strong>名 一 主 导</strong></td><td>名一是中年主战场，最忌错配，三段中以名一最为关键</td></tr>\n    <tr><td class=\"center\"><strong>名 二 收 局</strong></td><td>名二是晚年财库，须有\"得地、得福\"字根，确保人生有归宿</td></tr>\n    <tr><td class=\"center\"><strong>三 字 不 冲</strong></td><td>姓氏字根、名一字根、名二字根之间不可有相冲、相害</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷五第二章 -->"}, {"id": "v五-c2", "kind": "chapter", "volNum": "五", "volTitle": "局 之 布 置", "volSubtitle": "三段架构 · 单复姓名 · 阴阳调和", "volQuote": "「一字一格，格格相承；<br>三段成局，局定一生。」", "chapNum": "第 二 章", "chapTitle": "单姓单名之结构：以张山为例", "content": "<p>单姓单名（即姓一字、名一字），在现代华人社会渐少，但仍属常见格局。其结构特殊，分析方法亦有别于复名。</p>\n\n<h2>一、单姓单名的格位分配</h2>\n\n<table>\n  <thead>\n    <tr><th>格位</th><th>计算方法</th><th>主管</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>天 格</strong></td>\n      <td>姓 氏</td>\n      <td>0—20岁、长辈父母、先天基础</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>地 格</strong></td>\n      <td>名 一</td>\n      <td>41—60岁、财富晚年</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>人 格</strong></td>\n      <td>姓氏阴根 + 名字阳根<br>（隐性组合）</td>\n      <td>21—40岁、事业感情</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>二、张山之范例剖析</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">单姓单名实例：张 山</div>\n  <p><strong>结构分析：</strong></p>\n  <p>　• 天格：张（弓 + 长）</p>\n  <p>　• 地格：山</p>\n  <p>　• 人格（隐合）：弓 + 山 = 蛇山相会</p>\n  <p><strong>字根识别：</strong></p>\n  <p>　• 张：含\"弓\"（蛇字根之一）、\"长\"（伸展之意）</p>\n  <p>　• 山：山岳、虎之地、猪羊忌</p>\n  <p><strong>整体判断：</strong></p>\n  <p>　• 此名最适于寅虎：山为虎之得地，张之\"长\"字增其势</p>\n  <p>　• 不适于亥猪、卯兔：山字伤之</p>\n  <p>　• 巳蛇可用：张含弓为蛇之同根，但山为蛇之忌</p>\n</div>\n\n<h2>三、单姓单名的优劣</h2>\n\n<table>\n  <thead>\n    <tr><th>优势</th><th>劣势</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>简洁有力，气场集中<br>不易出错搭配<br>显得古雅大气</td>\n      <td>缺名二（地格）独立空间<br>晚年财富、子女运须以名一兼顾<br>影响范围较为单一</td>\n    </tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>单姓单名之核心局限：</strong>由于无独立名二，41—60岁之运势完全依靠名一同时承担。若名一恰好为\"中段健康、事业感情\"之主，则晚年财富、子女、健康之运皆压于一字之上，能量负担过重。<strong>故单姓单名建议补充名二，以分担晚年运势。</strong>\n</div>\n\n<!-- 卷五第三章 -->"}, {"id": "v五-c3", "kind": "chapter", "volNum": "五", "volTitle": "局 之 布 置", "volSubtitle": "三段架构 · 单复姓名 · 阴阳调和", "volQuote": "「一字一格，格格相承；<br>三段成局，局定一生。」", "chapNum": "第 三 章", "chapTitle": "单姓复名之结构：最常见的标准格局", "content": "<p>单姓复名（姓一字、名二字），是当代华人社会最普遍的姓名结构，三字三段、天人地俱全，是姓名学分析最完整、最经典之格局。</p>\n\n<h2>一、单姓复名的格位</h2>\n\n<table>\n  <thead>\n    <tr><th>格位</th><th>对应字</th><th>主管运势</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>天 格</strong></td>\n      <td>姓氏</td>\n      <td>0—20岁，父母长辈、祖德先天</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>人 格</strong></td>\n      <td>名一</td>\n      <td>21—40岁，事业感情、人际贵人</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>地 格</strong></td>\n      <td>名二</td>\n      <td>41—60岁，财富子女、晚年福德</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>二、单姓复名实例剖析</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">实例：黄 文 森</div>\n  <p><strong>三段分析：</strong></p>\n  <p>　• 天格\"黄\"：含\"由\"（鼠根）、\"八\"、\"田\"——田为虎之忌、龙之忌、猴之忌</p>\n  <p>　• 人格\"文\"：含义繁复——表\"文采\"，亦属\"下盘不稳\"之字（依张科勉理论）</p>\n  <p>　• 地格\"森\"：三木叠加——木气极旺，宜于虎兔龙（三会东方木）、宜马（喜木）</p>\n  <p><strong>整体能量：</strong>木气强，事业有进取动能；田字带受制，须以森之木气化解；文字偏柔，配以森之刚，刚柔相济。</p>\n</div>\n\n<div class=\"example\">\n  <div class=\"example-title\">实例：李 智 慧</div>\n  <p><strong>三段分析：</strong></p>\n  <p>　• 天格\"李\"：木 + 子（鼠字根）——主木鼠相生</p>\n  <p>　• 人格\"智\"：含\"日\"、\"知\"、\"口\"——日为龙鸡所喜，但鼠忌之</p>\n  <p>　• 地格\"慧\"：含\"心\"——肉食生肖（虎、蛇、狗）之得食</p>\n  <p><strong>整体能量：</strong>若用于子鼠生肖者，\"智\"字带日，于鼠为劳碌；故子鼠不宜用\"智慧\"组合。若用于戌狗，则\"慧\"得食、\"智\"虽含日但狗忌山林日晒不甚——尚可。</p>\n</div>\n\n<h2>三、单姓复名的核心优势</h2>\n\n<ul>\n  <li><strong>三段俱全</strong>——人生三大阶段各有专管，运势分布均衡。</li>\n  <li><strong>调节空间大</strong>——名一、名二可灵活搭配，化解姓氏之不利。</li>\n  <li><strong>书写大气</strong>——三字签名最具气场，不繁不简。</li>\n  <li><strong>音律和谐</strong>——三字最易调出抑扬顿挫之美。</li>\n</ul>\n\n<h2>四、最佳搭配原则</h2>\n\n<table>\n  <thead>\n    <tr><th>原则</th><th>具体执行</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>名一主</strong></td><td>名一是中年主战场，须用最适生肖之核心字根（得位、得势）</td></tr>\n    <tr><td class=\"center\"><strong>名二补</strong></td><td>名二补名一不足，须用\"得地、得福\"以稳晚年</td></tr>\n    <tr><td class=\"center\"><strong>姓不冲</strong></td><td>名一名二之字根须避开姓氏之相冲、相害</td></tr>\n    <tr><td class=\"center\"><strong>三和谐</strong></td><td>三字音律平仄相合，字形繁简相称，字义贯通一线</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷五第四章 -->"}, {"id": "v五-c4", "kind": "chapter", "volNum": "五", "volTitle": "局 之 布 置", "volSubtitle": "三段架构 · 单复姓名 · 阴阳调和", "volQuote": "「一字一格，格格相承；<br>三段成局，局定一生。」", "chapNum": "第 四 章", "chapTitle": "复姓之结构：欧阳、司马、上官等", "content": "<p>复姓在华人社会虽不及单姓普遍，但欧阳、司马、上官、诸葛、东方、慕容等姓氏代代传承，自有其特殊格局。复姓之姓名学分析，需将\"姓\"作为一整体处理。</p>\n\n<h2>一、复姓单名格局</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">实例：欧 阳 峰</div>\n  <p><strong>结构分析：</strong></p>\n  <p>　• 天格：\"欧阳\"二字合为姓，作整体看待</p>\n  <p>　• 地格：\"峰\"为名一兼名二，无独立名二</p>\n  <p>　• 影响范围：峰一字承载21岁后所有运势</p>\n  <p><strong>字根分析：</strong></p>\n  <p>　• 欧：含\"区\"、\"欠\"——气场偏弱</p>\n  <p>　• 阳：含\"日\"——龙鸡所喜，鼠蛇所忌</p>\n  <p>　• 峰：含\"山\"、\"夆\"——山为虎之地、猪兔之忌</p>\n  <p><strong>判断：</strong>此名最适于寅虎、辰龙；不宜于子鼠、亥猪、卯兔、巳蛇。</p>\n</div>\n\n<div class=\"warning\">\n  <strong>复姓单名之负担：</strong>与单姓单名同理，名一一字承担后半生所有运势能量，负担极重。复姓单名者，建议加用字号、艺名以补名二之空缺。\n</div>\n\n<h2>二、复姓复名格局</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">实例：诸 葛 亮 卧</div>\n  <p>（虚构示例，仅作结构演示）</p>\n  <p><strong>结构分析：</strong></p>\n  <p>　• 天格：\"诸葛\"——姓氏整体</p>\n  <p>　• 人格：\"亮\"——名一</p>\n  <p>　• 地格：\"卧\"——名二</p>\n  <p>此结构与单姓复名同理，三段俱全。</p>\n</div>\n\n<h2>三、复姓的字根特殊解读</h2>\n\n<table>\n  <thead>\n    <tr><th>复姓</th><th>主要字根</th><th>能量倾向</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>欧阳</strong></td><td>欠 + 日</td><td>气场含日，宜龙鸡，忌鼠蛇</td></tr>\n    <tr><td class=\"center\"><strong>司马</strong></td><td>司 + 马</td><td>含马字根，忌鼠（六冲）</td></tr>\n    <tr><td class=\"center\"><strong>上官</strong></td><td>上 + 官</td><td>含口、宀，宜小生肖</td></tr>\n    <tr><td class=\"center\"><strong>诸葛</strong></td><td>言 + 艹</td><td>艹宜草食生肖</td></tr>\n    <tr><td class=\"center\"><strong>东方</strong></td><td>东 + 方</td><td>东含龙气，宜兔虎</td></tr>\n    <tr><td class=\"center\"><strong>慕容</strong></td><td>慕 + 容</td><td>含心、口，宜虎蛇狗</td></tr>\n    <tr><td class=\"center\"><strong>令狐</strong></td><td>令 + 狐</td><td>含犭，狗字根</td></tr>\n    <tr><td class=\"center\"><strong>皇甫</strong></td><td>白 + 甫</td><td>气场偏强，宜大生肖</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷五第五章 -->"}, {"id": "v五-c5", "kind": "chapter", "volNum": "五", "volTitle": "局 之 布 置", "volSubtitle": "三段架构 · 单复姓名 · 阴阳调和", "volQuote": "「一字一格，格格相承；<br>三段成局，局定一生。」", "chapNum": "第 五 章", "chapTitle": "阴阳调和：名字内部之能量平衡", "content": "<p>姓名之美，不在于阳极或阴极，而在于阴阳调和、刚柔相济。一个名字之内部能量是否均衡，决定其能量是否可持续、运势是否平稳。</p>\n\n<h2>一、阴阳之大原则</h2>\n\n<table>\n  <thead>\n    <tr><th>阳性能量</th><th>阴性能量</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>刚强、外显、动、热<br>权位字根：王、君、立、卓<br>火字根：日、火、明、炎<br>动态字根：奔、飞、腾、跃</td>\n      <td>柔和、内敛、静、冷<br>安居字根：宀、口、安、宁<br>水字根：氵、雨、霖、泽<br>静态字根：宁、安、静、雅</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>二、调和的四种格局</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">阴 阳 调 和 四 格</div>\n  <p><strong>1. 阳阳阳</strong>——三字皆阳。能量过刚，主性格激烈、人生波折大、夫妻不和。</p>\n  <p><strong>2. 阴阴阴</strong>——三字皆阴。能量过柔，主性格懦弱、缺乏主见、事业难成。</p>\n  <p><strong>3. 阳阴阳 / 阴阳阴</strong>——夹心式调和。最为平衡，主性格稳健、人生顺遂。</p>\n  <p><strong>4. 阳阴阴 / 阴阳阳</strong>——一头一尾对比式。主早年与晚年风格鲜明，中段过渡自然。</p>\n</div>\n\n<h2>三、男女命之调和差异</h2>\n\n<table>\n  <thead>\n    <tr><th>性别</th><th>建议格局</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>男 命</strong></td>\n      <td>宜阳气稍重，但不可三阳<br>名一阳、名二阴最佳</td>\n      <td>男主外，需有承担之阳气；<br>名二阴主家庭、子女、晚年福德</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>女 命</strong></td>\n      <td>宜阴柔为主，但不可三阴<br>名一阴、名二阳亦可</td>\n      <td>女主内，宜阴柔之姓名；<br>但全阴则失主见，须有一字承阳气</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>四、五行调和与阴阳并行</h2>\n\n<p>阴阳与五行并非孤立——五行中，木火属阳，金水属阴，土居中。故调和之法，需同时考虑：</p>\n\n<ul>\n  <li><strong>五行不可缺</strong>——金木水火土五行，名字中至少应含三种五行字根，避免单一过旺。</li>\n  <li><strong>五行不可冲</strong>——名字内部不可有水火直冲（如氵旁配火字旁）。</li>\n  <li><strong>五行有相生</strong>——若名字三字五行能形成相生（金生水、水生木、木生火、火生土、土生金），则能量循环不息，运势绵长。</li>\n</ul>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">阴 阳 调 和 之 终 极</div>\n  <p>太极生两仪，两仪生四象，四象生八卦。<br>姓名一物，亦含阴阳。<br>阳得阴而生，阴得阳而长；<br>三字之中，阴阳互济者，名之大成也。</p>\n</div>\n\n<!-- ===================== 卷六 忌之严守 ===================== -->"}, {"id": "v六-c1", "kind": "chapter", "volNum": "六", "volTitle": "忌 之 严 守", "volSubtitle": "三大凶运 · 通用禁字 · 女性专忌", "volQuote": "「知所宜者难，知所忌者更难；<br>避一凶字，胜得十吉。」", "chapNum": "第 一 章", "chapTitle": "三大凶运字详解：劳碌、受制、降格", "content": "<p>姓名学之\"凶字\"，并非字本身有罪，而是其能量与主体生肖产生冲突，致使一生背负不利气场。三大凶运字——劳碌、受制、降格——是命名之首要避讳。</p>\n\n<h2>一、劳碌运字：终生奔波，无福享受</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">劳 碌 运 之 本 质</div>\n  <p>劳碌运字之凶，在于使主体生肖处于<strong>不适宜的环境或时段</strong>，违背其天性，故须不断付出能量以维持，导致一生劳碌、福薄难享。</p>\n</div>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>受影响生肖</th><th>核心后果</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>日 · 阳 · 光 · 白</strong><br>（太阳字根）</td>\n      <td>子鼠 · 戌狗 · 巳蛇</td>\n      <td>夜行者遇日则曝，肉食者畏光<br>奔波劳碌，危机四伏，难得安歇</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>山</strong><br>（山字根）</td>\n      <td>亥猪 · 卯兔</td>\n      <td>猪登山如负重，兔上山易遭难<br>刑伤不断、事事操劳、难有清闲</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>水 · 氵 · 雨</strong><br>（水字根）</td>\n      <td>巳蛇 · 午马 · 戌狗</td>\n      <td>蛇遇水易溺，马涉水易陷，狗逢水忌寒<br>事多波折，财来财去</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>火 · 灬</strong><br>（火字根）</td>\n      <td>子鼠 · 亥猪 · 申猴</td>\n      <td>鼠居洞畏火，猪体白怕烤，猴遇火生焦躁<br>性格急躁，肝火旺盛</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>夏 · 秋 · 春 · 冬</strong><br>（季节字根）</td>\n      <td>多生肖通忌</td>\n      <td>季节字主\"时令限制\"——一字定一时<br>主大半生不顺，仅短暂得意</td>\n    </tr>\n  </tbody>\n</table>\n\n<div class=\"tip\">\n  <strong>例外说明：</strong>辰龙、酉鸡反喜太阳字根——龙腾日月、鸡司晨晓。同字对不同生肖，吉凶相反，此即字根能量之相对性。\n</div>\n\n<h2>二、受制运字：处处受困，难展才华</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">受 制 运 之 本 质</div>\n  <p>受制运字之凶，在于<strong>限制主体生肖之活动空间或自由度</strong>，使其虽有才华却难以施展，被外力压制，仿若困兽。</p>\n</div>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>受影响生肖</th><th>核心后果</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>平 · 原 · 田 · 口</strong></td>\n      <td>寅虎</td>\n      <td><em>\"虎落平阳被犬欺\"</em><br>受制于人、难有作为、官非缠身</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>田 · 川 · 浅水</strong></td>\n      <td>辰龙</td>\n      <td><em>\"龙游浅水遭虾戏\"</em><br>格局受限、才华被压、屈居人下</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>田 · 金</strong></td>\n      <td>申猴</td>\n      <td>金克木（猴属阳金，遇阴金则刑）<br>处处受制、发展受阻、心血压力大</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>拎耳朵字形</strong><br>（陈、邱、邵、邰、阿、陆等）</td>\n      <td>全 生 肖 通 用</td>\n      <td>左右耳旁主\"被人牵引\"<br>被人压制、做事难出头、易听信他人</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>笼 · 围 · 困 · 牢</strong></td>\n      <td>大 型 生 肖<br>（虎、龙、马）</td>\n      <td>大生肖最忌牢笼，气场无法施展<br>事业受限、人际紧绷</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、降格运字：地位下滑，气场受损</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">降 格 运 之 本 质</div>\n  <p>降格运字之凶，在于使主体<strong>从尊贵之位降至卑微之地</strong>，气场尽失，福气流走。最忌于辰龙——龙降格则非龙。</p>\n</div>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>受影响生肖</th><th>核心后果</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>人 · 弓 · 几 · 虫</strong></td>\n      <td>辰 龙</td>\n      <td>龙见人——成为凡夫俗子<br>龙见弓几虫——降格为蛇<br>尊贵气场尽失、运势直线下滑</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>下盘不稳字形</strong><br>（文、义、友、交、亥）</td>\n      <td>全 生 肖</td>\n      <td>下盘不稳如立沙上<br>根基不牢、运势反复、半途而废</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>气散字形</strong><br>（美、英、青、静、彤、艳）</td>\n      <td>全 生 肖</td>\n      <td>字形上下分离，气场涣散<br>聚财无力、福气难留、人缘易散</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>降格双字</strong><br>（伟、仁、化、仕——龙忌）</td>\n      <td>辰 龙 专 忌</td>\n      <td>\"伟\"含人、\"仁\"含人，皆使龙降格<br>本是好字，于龙却为凶</td>\n    </tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>降格之深义：</strong>降格不是变坏，而是\"气场降阶\"。原本可成大事者，因名字降格，沦为平庸；原本能称王者，因降格而辅佐。降格字看似无害，影响却极深远——一生最高成就被自我压低一阶。\n</div>\n\n<!-- 卷六第二章 -->"}, {"id": "v六-c2", "kind": "chapter", "volNum": "六", "volTitle": "忌 之 严 守", "volSubtitle": "三大凶运 · 通用禁字 · 女性专忌", "volQuote": "「知所宜者难，知所忌者更难；<br>避一凶字，胜得十吉。」", "chapNum": "第 二 章", "chapTitle": "通用禁用字大全：传统姓名学集萃", "content": "<p>以下字根，在传统姓名学中多带不吉之气，主孤独、虚浮、波折、刑克，使用须慎。然亦应理性对待——单字不决定命运，需结合生肖、五行、整体搭配综合判断。</p>\n\n<h2>一、孤独虚浮类</h2>\n\n<div class=\"radical-row\"><div class=\"label\">忌用字</div><div class=\"content\">婵、素、燕、莲、霞、梦、露、雪、寒、风、霜、霏</div></div>\n\n<p><strong>凶象：</strong>主孤独清冷、虚浮不定、感情难安、夫妻缘薄。多用于女性，加重孤芳自赏之气。</p>\n\n<h2>二、劳碌奔波类</h2>\n\n<div class=\"radical-row\"><div class=\"label\">忌用字</div><div class=\"content\">国、正、凤、彦、娟、琼、芬、利、丽、莉、芸、芳</div></div>\n\n<p><strong>凶象：</strong>气场过满或带刚强之气，主一生劳碌、付出多回报少。<strong>例外：</strong>\"芳、芸\"等草字头字根，对草食生肖（鼠牛兔等）反而是得食吉字，须看生肖搭配。</p>\n\n<h2>三、波折是非类</h2>\n\n<div class=\"radical-row\"><div class=\"label\">忌用字</div><div class=\"content\">智、晓、辉、春、夏、秋、冬、梅、兰、竹、菊</div></div>\n\n<p><strong>凶象：</strong>\"春夏秋冬梅兰竹菊\"皆为时令字、季节字，主\"短暂得意\"之运——只能光辉一时，难以长久。</p>\n\n<h2>四、刑克不吉类</h2>\n\n<div class=\"radical-row\"><div class=\"label\">忌用字</div><div class=\"content\">军、光、刀、冰、品、晶、磊、笑、艳、平、池</div></div>\n\n<p><strong>凶象：</strong>含\"刀刃\"、\"军武\"之气，主刑伤、官非、是非；\"品、晶、磊\"等多口多石字，主话多招怨、根基不稳。</p>\n\n<h2>五、特殊禁忌</h2>\n\n<div class=\"radical-row\"><div class=\"label\">忌用字</div><div class=\"content\">海、利、丽、月（月对部分生肖为肉，对部分为月光，须细辨）</div></div>\n\n<div class=\"warning\">\n  <strong>禁字之理性运用：</strong>以上禁字仅为传统参考，不可一刀切。例如\"丽\"对午马、辰龙等大生肖可用；\"芳\"对鼠兔羊为得食。<strong>判断字之吉凶，永远以生肖喜忌为先，以传统禁字为后。</strong>\n</div>\n\n<!-- 卷六第三章 -->"}, {"id": "v六-c3", "kind": "chapter", "volNum": "六", "volTitle": "忌 之 严 守", "volSubtitle": "三大凶运 · 通用禁字 · 女性专忌", "volQuote": "「知所宜者难，知所忌者更难；<br>避一凶字，胜得十吉。」", "chapNum": "第 三 章", "chapTitle": "女性专用禁忌：刚柔有别，宜柔不宜刚", "content": "<p>女命姓名学有其独特之原则。女性以柔为美、以静为吉、以德为贵，故起名宜避免阳刚过盛、虚幻不实、外貌张扬之字。此非男尊女卑，而是契合女性气场之自然规律。</p>\n\n<h2>一、刚强夺权类</h2>\n\n<table>\n  <thead>\n    <tr><th>禁忌字</th><th>本义</th><th>女命之凶</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>忠</strong></td><td>忠诚不二</td><td>女用之，易代夫操劳，自身委屈</td></tr>\n    <tr><td class=\"center\"><strong>义</strong></td><td>仁义担当</td><td>女用之，易夺夫权，家中无男主</td></tr>\n    <tr><td class=\"center\"><strong>顺</strong></td><td>顺从恭敬</td><td>反主\"过顺则刚\"，自我压抑</td></tr>\n    <tr><td class=\"center\"><strong>强</strong></td><td>刚健有力</td><td>女命见强，必夺夫权，婚姻多波</td></tr>\n    <tr><td class=\"center\"><strong>君 · 王</strong></td><td>权位</td><td>女命称王者，多孤独，少夫缘</td></tr>\n    <tr><td class=\"center\"><strong>武 · 雄</strong></td><td>武力强健</td><td>男气过盛，桃花散乱、夫缘弱</td></tr>\n  </tbody>\n</table>\n\n<h2>二、虚幻不稳类</h2>\n\n<table>\n  <thead>\n    <tr><th>禁忌字</th><th>本义</th><th>女命之凶</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>梦</strong></td><td>梦境</td><td>主一生如梦——好事不实、努力难成</td></tr>\n    <tr><td class=\"center\"><strong>露</strong></td><td>露水</td><td>主美丽如露——昙花一现，福不长久</td></tr>\n    <tr><td class=\"center\"><strong>霞</strong></td><td>晚霞</td><td>美则美矣，转瞬即逝，感情难恒</td></tr>\n    <tr><td class=\"center\"><strong>雪</strong></td><td>白雪</td><td>清冷孤高，主孤独、缘薄</td></tr>\n    <tr><td class=\"center\"><strong>影 · 幻</strong></td><td>虚像</td><td>主虚妄不实，事业感情皆似空</td></tr>\n    <tr><td class=\"center\"><strong>云 · 烟</strong></td><td>云烟</td><td>过虚则散，难安难定</td></tr>\n  </tbody>\n</table>\n\n<h2>三、外貌美艳类</h2>\n\n<table>\n  <thead>\n    <tr><th>禁忌字</th><th>本义</th><th>女命之凶</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>淑</strong></td><td>淑女美丽</td><td>气过美艳，易招是非桃花</td></tr>\n    <tr><td class=\"center\"><strong>姿</strong></td><td>姿态美</td><td>过显其姿，反招小人觊觎</td></tr>\n    <tr><td class=\"center\"><strong>娇</strong></td><td>娇媚</td><td>媚态过盛，难得正缘</td></tr>\n    <tr><td class=\"center\"><strong>艳</strong></td><td>艳丽</td><td>过艳易折，感情多波</td></tr>\n    <tr><td class=\"center\"><strong>媚 · 妍</strong></td><td>美貌</td><td>美字外露，内心反空</td></tr>\n  </tbody>\n</table>\n\n<div class=\"tip\">\n  <strong>女命起名之上品方向：</strong>宜用\"婉、娴、淑（少量）、贞、洁、慧、雅、静、芳、莹\"等含蓄之美；忌\"刚、强、霸、雄、君、王\"等张扬之力。柔中藏慧、静中蕴福，方为女命之最佳。\n</div>\n\n<div class=\"warning\">\n  <strong>时代变迁之提醒：</strong>本节之禁忌，为传统姓名学之古训。现代女性独立自主，\"忠、义\"等字未必皆凶。是否使用，须结合个人志向、生活方式综合判断。然命名为一生之事，传统智慧不可全弃，宜在传统与现代之间取得平衡。\n</div>\n\n<!-- 卷六第四章 -->"}, {"id": "v六-c4", "kind": "chapter", "volNum": "六", "volTitle": "忌 之 严 守", "volSubtitle": "三大凶运 · 通用禁字 · 女性专忌", "volQuote": "「知所宜者难，知所忌者更难；<br>避一凶字，胜得十吉。」", "chapNum": "第 四 章", "chapTitle": "字形不利：易招破败之结构", "content": "<p>除字根字义外，字形结构亦有禁忌。某些字形天生带破败之象，无关字义本身，但因结构使然，运势难顺。</p>\n\n<h2>一、上下分离形</h2>\n\n<div class=\"radical-row\"><div class=\"label\">字例</div><div class=\"content\">美（上下断开）、菁、青、贵、责</div></div>\n\n<p>字形上半与下半之间空隙明显，气场上下分离，主\"理想与现实脱节\"——心想之事难成，努力之事难收。</p>\n\n<h2>二、头重脚轻形</h2>\n\n<div class=\"radical-row\"><div class=\"label\">字例</div><div class=\"content\">蘩、馨、馥、霭（上部繁复，下部细弱）</div></div>\n\n<p>字形上重下轻，主\"志大才疏\"——理想宏大，根基不足，事业易倾覆。</p>\n\n<h2>三、空心散形</h2>\n\n<div class=\"radical-row\"><div class=\"label\">字例</div><div class=\"content\">回、田、囚、围、囫</div></div>\n\n<p>包围结构若内部过空，主\"看似富足实则空虚\"；若用之为名一，主中年看似有成实则不实。</p>\n\n<h2>四、刀刃伤体形</h2>\n\n<div class=\"radical-row\"><div class=\"label\">字例</div><div class=\"content\">利、刚、剑、刀、刑、刚（含立刀刂、刀字根）</div></div>\n\n<p>含刀刃字根之字，主刑伤、官非、是非。某些字虽义为吉（如\"利\"主利益），但形含刀刃，能量上仍带破败之气。</p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">字 形 选 择 之 准 则</div>\n  <p>形要稳——下部须比上部宽广，如\"安、宇、宏\"。<br>形要正——左右对称或主次分明，如\"林、森\"。<br>形要圆——避锐角刀刃，多用圆润之形。<br>形要满——避大空白、大空洞，气场聚而不散。</p>\n</div>\n\n<!-- ===================== 卷七 肖之详解 ===================== -->"}, {"id": "v七-c1", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 一 章", "chapTitle": "子 鼠：夜行机灵，五谷得位", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">子 鼠</div>\n  <div class=\"zodiac-subtitle\">地支之首 · 北方水</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>子（夜半子时 23:00—01:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>水（阳水）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>北方</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>子 申 辰（鼠猴龙 · 水局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>亥 子 丑（猪鼠牛 · 北方水会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>子 ↔ 丑（鼠 ↔ 牛）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>子 ↔ 午（鼠 ↔ 马）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>子 ↔ 未（鼠 ↔ 羊）</td></tr>\n    <tr><td class=\"center\"><strong>桃 花</strong></td><td>四大桃花生肖之一</td></tr>\n  </tbody>\n</table>\n\n<h2>一、子鼠之天性</h2>\n\n<p>鼠为生肖之首，机敏聪慧、灵动多变。鼠居洞穴、夜行食粮、喜彩衣以增身价、忌日光以避暴晒。鼠属阳水，遇金（猴）而生、遇龙而合、遇土则克。鼠之核心需求为：安全、灵活、丰足。</p>\n\n<h2>二、子鼠之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>禾、米、艹、豆、麦<br>（鼠为草食，五谷为粮）</td>\n      <td>秀、秋、科、程、和、季、秉、穆、黎、秦<br>芳、芸、芷、芮、茵、茗、茹、荷、莉、菁<br>萱、蓉、萍、英、茂、薇、苑、苇</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>口、宀、穴、广<br>（洞穴为居）</td>\n      <td>安、宇、宏、宁、宗、宜、宣、宥、家、宸<br>富、守、宙、容、宛、宝、寰、寔</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>王、大、君、帝<br>（鼠为生肖之首，宜称王）</td>\n      <td>玲、珍、珊、琦、琪、琳、琴、瑜、瑞、瑶<br>瑾、璇、璞、冠、君</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、巾、糸、示、彡、羽<br>（彩衣增其身价）</td>\n      <td>依、衫、素、绮、缘、裴、彤、彦、彬、彰<br>祯、祥、祎、翊、翠、翎</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>夕、月、夜<br>跷脚字（宏、云、松）</td>\n      <td>夕、梦、汐、月、朋、朗、朔、望、宇、宿<br>宏、云、松、元、允、先、兆、全、公</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、子鼠之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>日 · 阳 · 光 · 明</strong></td><td>鼠为夜行，遇日则曝；劳碌奔波之大忌</td></tr>\n    <tr><td class=\"center\"><strong>午 · 马 · 灬</strong></td><td>子午相冲，遇之夫妻不和、人际有阻</td></tr>\n    <tr><td class=\"center\"><strong>羊 · 未 · 善 · 美</strong></td><td>子未相害，主小人是非</td></tr>\n    <tr><td class=\"center\"><strong>兔 · 卯 · 月（卯字根）</strong></td><td>鼠兔六刑，主彼此消耗</td></tr>\n    <tr><td class=\"center\"><strong>鸡 · 酉 · 西</strong></td><td>鼠鸡相破，主家庭口角</td></tr>\n    <tr><td class=\"center\"><strong>人 · 亻 · 彳</strong></td><td>鼠见人易遭追打，主人际紧张</td></tr>\n    <tr><td class=\"center\"><strong>土 · 田 · 垚</strong></td><td>土克水，于名一影响夫妻、孩子、生育</td></tr>\n    <tr><td class=\"center\"><strong>乃 · 弓</strong></td><td>女性鼠用之，妇科易有问题</td></tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>子鼠特别提示：</strong>\"禾\"字虽为粮食，但属\"五谷之精华\"，吃肉之生肖（虎、蛇、狗）不可用；鼠虽喜禾米，但若名一已得食，名二宜补得地，不可重复用禾米叠加。\n</div>\n\n<h2>四、子鼠命名实例</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">范例一：李 宸 君（男）</div>\n  <p><strong>分析：</strong></p>\n  <p>　• 姓\"李\"含\"木 + 子\"，木与水相生，子为本命，姓氏极佳</p>\n  <p>　• 名一\"宸\"含\"宀 + 辰\"，宀为得地（洞穴），辰为三合（子申辰）——双重吉</p>\n  <p>　• 名二\"君\"为得位（鼠宜称王）</p>\n  <p><strong>整体：</strong>得地、得位、三合俱全，事业贵人皆备。</p>\n</div>\n\n<div class=\"example\">\n  <div class=\"example-title\">范例二：王 茉 莉（女）</div>\n  <p><strong>分析：</strong></p>\n  <p>　• 姓\"王\"为得位字根，鼠之贵气</p>\n  <p>　• 名一\"茉\"含艹得食、含末（含未羊气）——半吉半忌</p>\n  <p>　• 名二\"莉\"含艹得食、含禾、刂（刀）——刀字带凶</p>\n  <p><strong>建议：</strong>\"莉\"字含刀，对女性温柔气质有损，宜改为\"茵、芸、蓉\"等纯吉字。</p>\n</div>\n\n<!-- 卷七第二章 丑牛 -->"}, {"id": "v七-c2", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 二 章", "chapTitle": "丑 牛：勤恳踏实，门栏五谷", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">丑 牛</div>\n  <div class=\"zodiac-subtitle\">地支之二 · 北方水土</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>丑（凌晨丑时 01:00—03:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>土（阴土，藏水）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>北方偏东</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>巳 酉 丑（蛇鸡牛 · 金局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>亥 子 丑（猪鼠牛 · 北方水会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>丑 ↔ 子（牛 ↔ 鼠）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>丑 ↔ 未（牛 ↔ 羊）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>丑 ↔ 午（牛 ↔ 马）</td></tr>\n    <tr><td class=\"center\"><strong>相 刑</strong></td><td>丑 ↔ 戌（牛 ↔ 狗）</td></tr>\n  </tbody>\n</table>\n\n<h2>一、丑牛之天性</h2>\n\n<p>牛为耕作之畜，吃苦耐劳、稳重务实。牛喜居门栏（牛舍）、食五谷（草料）、有大口食为安、若小口则气难喘。牛属阴土藏水，故为四库之一。牛最忌穿彩衣——彩衣即是祭祀供品，牛披彩衣则一生劳碌、无福享受。</p>\n\n<h2>二、丑牛之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>艹、禾、米、豆、麦</td>\n      <td>芳、芸、芷、芮、茵、茹、莉、萱、苇、苑<br>程、秀、秋、科、和、季、秉、穆、稻</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>田、宀、门、广、家<br>（牛舍门栏）</td>\n      <td>富、家、庭、宏、宜、安、宙、宥、野、疆<br>畴、畔、甸、宇、宁、宝、宣</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>小、少、士、臣、亚<br>（牛宜辅佐，不宜称王）</td>\n      <td>士、臣、亚、佐、佑、仁、仕、壮、诚、彦</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>车、軒（牛拉车之得势）<br>大口字（食槽足）</td>\n      <td>轩、运、辅、轶、轲、载、辉、辕、辑<br>口、和、品、合、君、吉</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>跷脚字（宏、云、松、允）<br>水字根（牛饮水）</td>\n      <td>宏、云、松、元、允、先、公、典、共<br>泽、清、源、涵、霖、雯</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、丑牛之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>彩衣字根</strong><br>（衣、糸、彡、巾、示）</td><td>牛披彩衣 = 祭品；一生劳碌、无福享受、为人作嫁</td></tr>\n    <tr><td class=\"center\"><strong>王 · 玉 · 君</strong></td><td>牛非王者，称王则气场反噬，如祭天之牲</td></tr>\n    <tr><td class=\"center\"><strong>未 · 羊 · 善</strong></td><td>丑未相冲，主与配偶、合伙人冲突</td></tr>\n    <tr><td class=\"center\"><strong>午 · 马 · 灬</strong></td><td>丑午相害，主小人是非</td></tr>\n    <tr><td class=\"center\"><strong>戌 · 犬 · 犭</strong></td><td>丑戌相刑，主自我内耗、健康有损</td></tr>\n    <tr><td class=\"center\"><strong>日 · 阳 · 光</strong></td><td>牛在烈日下劳作，主辛苦</td></tr>\n    <tr><td class=\"center\"><strong>山 · 林</strong></td><td>牛上山为艰辛，非其本性</td></tr>\n    <tr><td class=\"center\"><strong>心 · 忄 · 月（肉）</strong></td><td>牛为草食，肉食字根反成内耗</td></tr>\n    <tr><td class=\"center\"><strong>小口字</strong><br>（如\"咬、噢\"）</td><td>小口无法吃饱，气难喘、福薄</td></tr>\n  </tbody>\n</table>\n\n<h2>四、丑牛命名实例</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">范例：陈 安 富（男）</div>\n  <p><strong>分析：</strong></p>\n  <p>　• 姓\"陈\"右部\"东\"含龙气——龙牛六冲（实为辰戌冲，但东亦含部分木气，对牛影响中性）</p>\n  <p>　• 名一\"安\"含宀（牛栏）、女——双重得地</p>\n  <p>　• 名二\"富\"含宀、田——得地、得食兼备</p>\n  <p><strong>整体：</strong>三段皆稳，得地圆满，是牛命之上佳搭配。</p>\n</div>\n\n<!-- 卷七第三章 寅虎 -->"}, {"id": "v七-c3", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 三 章", "chapTitle": "寅 虎：山林之王，称霸气场", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">寅 虎</div>\n  <div class=\"zodiac-subtitle\">地支之三 · 东方木</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>寅（凌晨寅时 03:00—05:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>木（阳木）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>东方偏北</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>寅 午 戌（虎马狗 · 火局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>寅 卯 辰（虎兔龙 · 东方木会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>寅 ↔ 亥（虎 ↔ 猪）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>寅 ↔ 申（虎 ↔ 猴）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>寅 ↔ 巳（虎 ↔ 蛇）</td></tr>\n  </tbody>\n</table>\n\n<h2>一、寅虎之天性</h2>\n\n<p>虎为山林之王，威猛尊贵、独立霸气、肉食为生。虎喜大不喜小、喜山林日光、喜肉食、忌平原（虎落平阳被犬欺）、忌洞穴（如囚虎）、忌五谷（非其食）、忌口字（如笼）、忌人字（不愿被驯）。虎水木相生为格局，水生木、木旺虎气盛。</p>\n\n<h2>二、寅虎之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>心、忄、月（肉）<br>（虎为肉食）</td>\n      <td>志、念、忠、怡、恒、恩、悦、悟、情、惠<br>慕、慧、忆、怀、悠、朗、朔、期、惟、明</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>山、林、木、丘、艮<br>（虎居山林）</td>\n      <td>岚、岩、峰、峻、崇、嵩、岳、崧、岭、屹<br>林、森、楚、松、柏、柳、柯、桂、桓、楷、梓</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>王、大、君、帝<br>（虎为山林之王）</td>\n      <td>琳、琪、瑾、瑶、冠、君、瑞、璇、玺、璋<br>大、奇、奕、奎</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾<br>（虎披彩衣更威）</td>\n      <td>彤、绮、祯、祥、素、裴、缘、彬、彰、彦<br>翊、翠、翎</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>水（水生木）<br>夜行字（虎夜出）</td>\n      <td>泽、清、源、涵、霖、雯、潇<br>夕、月、朔、望、宿</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、寅虎之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>平 · 原 · 田</strong></td><td>虎落平阳被犬欺，主受制于人、难展才华</td></tr>\n    <tr><td class=\"center\"><strong>口 · 囗</strong></td><td>虎入笼为困，主事业受限、官非缠身</td></tr>\n    <tr><td class=\"center\"><strong>申 · 猴 · 袁</strong></td><td>寅申相冲，主夫妻、合伙人冲突</td></tr>\n    <tr><td class=\"center\"><strong>巳 · 蛇 · 弓 · 虫</strong></td><td>寅巳相害，主小人暗算</td></tr>\n    <tr><td class=\"center\"><strong>人 · 亻 · 彳</strong></td><td>虎被驯化，气场尽失</td></tr>\n    <tr><td class=\"center\"><strong>跷脚字</strong></td><td>虎须四脚着地以扑食，跷脚则失威</td></tr>\n    <tr><td class=\"center\"><strong>五谷字</strong>（禾、米、麦、豆）</td><td>非肉食生肖，错配则败钱败家</td></tr>\n    <tr><td class=\"center\"><strong>小 · 少 · 微</strong></td><td>虎气场大，缩小则反伤其气</td></tr>\n  </tbody>\n</table>\n\n<h2>四、寅虎命名实例</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">范例：林 慧 君（女）</div>\n  <p><strong>分析：</strong></p>\n  <p>　• 姓\"林\"双木叠加——虎之得地（山林）双重</p>\n  <p>　• 名一\"慧\"含心——肉食得食；含彗（扫帚），略带波折</p>\n  <p>　• 名二\"君\"——得位称王</p>\n  <p><strong>整体：</strong>得地、得食、得位三全，但\"君\"字女性用之偏刚强，可考虑改为\"瑜\"等。</p>\n</div>\n\n<!-- 卷七第四章 卯兔 -->"}, {"id": "v七-c4", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 四 章", "chapTitle": "卯 兔：温和谨慎，洞穴五谷", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">卯 兔</div>\n  <div class=\"zodiac-subtitle\">地支之四 · 东方木</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>卯（清晨卯时 05:00—07:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>木（阴木）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>正东</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>亥 卯 未（猪兔羊 · 木局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>寅 卯 辰（虎兔龙 · 东方木会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>卯 ↔ 戌（兔 ↔ 狗）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>卯 ↔ 酉（兔 ↔ 鸡）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>卯 ↔ 辰（兔 ↔ 龙）</td></tr>\n    <tr><td class=\"center\"><strong>桃 花</strong></td><td>四大桃花生肖之一</td></tr>\n  </tbody>\n</table>\n\n<h2>一、卯兔之天性</h2>\n\n<p>兔温顺谨慎、机敏可爱、夜行食草。兔喜小不喜大、喜洞穴（藏身）、喜五谷（食粮）、喜彩衣（升格）。兔最忌山——山为虎之地，兔上山遇虎；忌大字、王字（兔小，称王反伤气）；忌抬头字（仰头则颈伤）。兔有\"三口为王格\"之说——三个口字根叠加，反成尊贵之象。</p>\n\n<h2>二、卯兔之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>艹、禾、米、豆、麦</td>\n      <td>芳、兰、萱、薇、芷、荃、萍、英、茂、莉<br>程、秀、和、季、秉、穆、稻、苑、苇</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>口、宀、穴、广<br>（兔居洞穴）</td>\n      <td>可、宜、宙、安、守、宇、宏、宥、家、宁<br>富、容、寰、品（三口为王格）</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>小、少、士、臣<br>（兔为小肖，宜辅佐）</td>\n      <td>士、臣、佐、佑、仁、仕、彦、亚、佳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾<br>（兔披彩衣升格）</td>\n      <td>彤、素、绮、缘、裴、翎、翊、祯、祥、彬<br>彦、彰、绅</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>夜字根（兔夜行）<br>跷脚字</td>\n      <td>夕、月、朋、朗、朔、望、宿、宇<br>宏、云、松、元、允、先、公</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、卯兔之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>山 · 岩 · 峰</strong></td><td>兔登山遇虎，主刑伤、劳碌</td></tr>\n    <tr><td class=\"center\"><strong>王 · 大 · 君</strong></td><td>兔为小肖，称王则气场反噬</td></tr>\n    <tr><td class=\"center\"><strong>酉 · 鸡 · 鸟</strong></td><td>卯酉相冲，主夫妻、合伙冲突</td></tr>\n    <tr><td class=\"center\"><strong>辰 · 龙</strong></td><td>卯辰相害，主小人暗害</td></tr>\n    <tr><td class=\"center\"><strong>子 · 鼠 · 午 · 马</strong></td><td>鼠兔相刑、马兔相破，主家庭波折</td></tr>\n    <tr><td class=\"center\"><strong>日 · 阳 · 光</strong></td><td>兔为夜行，遇日劳碌</td></tr>\n    <tr><td class=\"center\"><strong>抬头字</strong>（如\"昂、仰\"）</td><td>兔抬头颈伤，主健康有损</td></tr>\n    <tr><td class=\"center\"><strong>蛇 · 巳 · 弓</strong></td><td>蛇能吞兔，主受惊吓</td></tr>\n  </tbody>\n</table>\n\n<h2>四、卯兔命名实例</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">范例：王 湘 月（女）</div>\n  <p><strong>分析：</strong></p>\n  <p>　• 姓\"王\"——兔忌称王，但姓氏先天不可改，可视为先天压力</p>\n  <p>　• 名一\"湘\"含氵（水生木）、木（兔为木）、目——三者皆吉</p>\n  <p>　• 名二\"月\"含夜行字根、得食</p>\n  <p><strong>整体：</strong>\"湘\"字为兔之大吉字，弥补\"王\"姓之刚气；月字得福。整体是兔命佳作。<br>📌 笔记中\"姓张为兔之贵人\"——因\"张\"含弓，蛇兔有刑，但弓亦为伸展之象，配合得当可助兔之灵动。</p>\n</div>\n\n<!-- 卷七第五章 辰龙 -->"}, {"id": "v七-c5", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 五 章", "chapTitle": "辰 龙：腾云之神，得位为本", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">辰 龙</div>\n  <div class=\"zodiac-subtitle\">地支之五 · 东方木 · 水库</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>辰（清晨辰时 07:00—09:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>土（阳土，水库）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>东南</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>申 子 辰（猴鼠龙 · 水局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>寅 卯 辰（虎兔龙 · 东方木会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>辰 ↔ 酉（龙 ↔ 鸡）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>辰 ↔ 戌（龙 ↔ 狗）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>辰 ↔ 卯（龙 ↔ 兔）</td></tr>\n    <tr><td class=\"center\"><strong>自 刑</strong></td><td>辰 自刑</td></tr>\n  </tbody>\n</table>\n\n<h2>一、辰龙之天性</h2>\n\n<p>龙为神兽之首，腾云驾雾、呼风唤雨、尊贵无比。龙喜大喜尊、喜水喜日月、喜抬头登天、忌人忌弓忌虫（降格为蛇）、忌田忌川（屈居浅水）、忌洞穴（困龙）。龙最忌\"降格\"——一降则非龙，气场全失。</p>\n\n<h2>二、辰龙之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>水（龙之原乡）<br>星辰宇宙</td>\n      <td>泽、清、源、涵、霖、雯、潇、滨、汇、海<br>湘、淏、淳、汐、沛、洲、洋</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>云、辰、龙、龚<br>（龙居云端）</td>\n      <td>云、辰、晨、振、农、宸、宠、霏、霖、雯<br>霓、霁、霭、霆</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>王、大、君、帝<br>日、月（日月为龙）</td>\n      <td>玲、珍、琦、琪、琳、琴、瑜、瑞、瑶、瑾<br>璇、璞、冠、君、明、晗、昇、昊、昕、晨<br>昱、晗</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾<br>（龙披龙袍）</td>\n      <td>彤、绮、祯、祥、素、裴、缘、彬、彰、彦<br>翊、翠、翎、绅、绫</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>抬头字（龙头上抬）<br>夜行字</td>\n      <td>昂、亢、京、亮、亨、亭<br>夕、月、朔、朗、望、宿</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、辰龙之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>人 · 亻 · 彳</strong></td><td>龙见人则降格为凡夫，气场全失</td></tr>\n    <tr><td class=\"center\"><strong>弓 · 几 · 虫</strong></td><td>龙见弓几虫则降格为蛇</td></tr>\n    <tr><td class=\"center\"><strong>戌 · 犬 · 犭</strong></td><td>辰戌相冲，主夫妻、合伙冲突</td></tr>\n    <tr><td class=\"center\"><strong>卯 · 兔</strong></td><td>辰卯相害，主小人是非</td></tr>\n    <tr><td class=\"center\"><strong>田 · 川 · 浅水</strong></td><td>龙游浅水遭虾戏，格局受限</td></tr>\n    <tr><td class=\"center\"><strong>口 · 囗</strong></td><td>困龙之象，主事业受限</td></tr>\n    <tr><td class=\"center\"><strong>小 · 少 · 微</strong></td><td>龙气场大，缩小则气场反伤</td></tr>\n    <tr><td class=\"center\"><strong>伟、仁、化、仕</strong></td><td>含人之字，皆使龙降格</td></tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>辰龙特别提示：</strong>姓氏含\"人\"或\"亻\"者（如何、伟、任、傅），龙宝宝起名须以名一名二之水气、君王气补强。\"伟\"虽吉字，对龙却凶，须格外注意。\n</div>\n\n<h2>四、辰龙命名实例</h2>\n\n<div class=\"example\">\n  <div class=\"example-title\">范例：李 淏 君（男）</div>\n  <p><strong>分析：</strong></p>\n  <p>　• 姓\"李\"含木 + 子（鼠），子辰三合——大吉</p>\n  <p>　• 名一\"淏\"含氵（水）、日（昊）——龙之得食、得位双吉</p>\n  <p>　• 名二\"君\"——得位称王</p>\n  <p><strong>整体：</strong>水、日、王三全，龙腾云海之大格，事业贵气兼备。</p>\n</div>\n\n<!-- 卷七第六章 巳蛇 -->"}, {"id": "v七-c6", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 六 章", "chapTitle": "巳 蛇：灵动幽隐，彩衣升格", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">巳 蛇</div>\n  <div class=\"zodiac-subtitle\">地支之六 · 南方火</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>巳（上午巳时 09:00—11:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>火（阴火）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>东南</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>巳 酉 丑（蛇鸡牛 · 金局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>巳 午 未（蛇马羊 · 南方火会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>巳 ↔ 申（蛇 ↔ 猴）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>巳 ↔ 亥（蛇 ↔ 猪）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>巳 ↔ 寅（蛇 ↔ 虎）</td></tr>\n  </tbody>\n</table>\n\n<h2>一、巳蛇之天性</h2>\n\n<p>蛇为灵巧之物，幽隐善变、智慧深沉、肉食为生。蛇喜彩衣（披彩衣升格为龙）、喜洞穴、喜暖（南方火）、喜杂木林。蛇忌寒（水）、忌虎（相害）、忌人（被打）、忌大字（蛇身小不可称王）。蛇得彩衣是其升格之关键——披彩衣则气场如龙。</p>\n\n<h2>二、巳蛇之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>心、忄、月（肉）<br>（蛇为肉食）</td>\n      <td>志、念、忠、怡、恒、恩、悦、悟、情、惠<br>慕、慧、忆、怀、悠、朗、朔</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>口、宀、穴<br>木、林（杂木）</td>\n      <td>安、宇、宏、宁、宗、宜、宣、宥、家、宸<br>林、森、楚、松、柏、柳、柯</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>小、少、士、臣<br>（蛇为小肖）</td>\n      <td>士、臣、亚、佐、佑、仕、彦、佳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾<br>（彩衣升格为龙）</td>\n      <td>彤、素、绮、缘、裴、彬、彰、彦、绅<br>祯、祥、祎、翎、翊、彩</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>火、灬（南方暖气）<br>跷脚字</td>\n      <td>炎、炳、炯、炫、烨、煊、煜、灿、煌<br>宏、云、松、元、允</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、巳蛇之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>水 · 氵 · 雨</strong></td><td>蛇属火忌寒，水克火</td></tr>\n    <tr><td class=\"center\"><strong>亥 · 猪 · 豕</strong></td><td>巳亥相冲，主夫妻冲突</td></tr>\n    <tr><td class=\"center\"><strong>寅 · 虎 · 山</strong></td><td>巳寅相害，主小人暗算</td></tr>\n    <tr><td class=\"center\"><strong>王 · 大 · 君</strong></td><td>蛇为小肖，称王则气场反噬</td></tr>\n    <tr><td class=\"center\"><strong>人 · 亻</strong></td><td>蛇见人易遭打杀</td></tr>\n    <tr><td class=\"center\"><strong>日 · 阳 · 光</strong></td><td>蛇喜幽暗，烈日下劳碌</td></tr>\n    <tr><td class=\"center\"><strong>五谷字</strong>（禾、米、麦）</td><td>非肉食生肖，错配则败钱</td></tr>\n    <tr><td class=\"center\"><strong>子 · 鼠</strong></td><td>子蛇相破，主家庭波折</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷七第七章 午马 -->"}, {"id": "v七-c7", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 七 章", "chapTitle": "午 马：奔腾驰骋，山林彩衣", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">午 马</div>\n  <div class=\"zodiac-subtitle\">地支之七 · 南方火</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>午（中午午时 11:00—13:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>火（阳火）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>正南</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>寅 午 戌（虎马狗 · 火局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>巳 午 未（蛇马羊 · 南方火会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>午 ↔ 未（马 ↔ 羊）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>午 ↔ 子（马 ↔ 鼠）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>午 ↔ 丑（马 ↔ 牛）</td></tr>\n    <tr><td class=\"center\"><strong>桃 花</strong></td><td>四大桃花生肖之一</td></tr>\n  </tbody>\n</table>\n\n<h2>一、午马之天性</h2>\n\n<p>马为奔驰之畜，独立勇敢、热情奔放、草食为生。马喜山林（山林奔驰）、喜彩衣（披甲为骏马）、喜五谷（草料）、喜大字（千里马为王）。马忌水（涉水难行）、忌洞穴（困马）、忌两口（不可两口——一马吃二人，主多妻多病）、忌田（农耕之马为劳碌）。</p>\n\n<h2>二、午马之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>艹、禾、米、豆、麦</td>\n      <td>芳、芸、茵、莉、菁、萱、薇、苑、苇、苗<br>程、秀、秋、和、季、秉、穆</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>山、林、木<br>（山林奔驰）</td>\n      <td>岚、岩、峰、峻、崇、嵩、岳、崧<br>林、森、楚、松、柏、柳、柯、桂、楷、梓</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>王、大、君、帝<br>（千里马为王）</td>\n      <td>玲、琦、琪、琳、琴、瑜、瑞、瑶、瑾、璇<br>君、冠、奇、奎</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾<br>（披甲战马）</td>\n      <td>彤、绮、祯、祥、素、裴、彬、彰、彦<br>翊、翠、翎、彩、绅</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>火、灬（马之同根）<br>跷脚字</td>\n      <td>炳、炯、炫、烨、煊、煜、灿、煌、烁<br>宏、云、松、元、允</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、午马之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>水 · 氵 · 雨</strong></td><td>马涉水陷蹄，主事业受阻</td></tr>\n    <tr><td class=\"center\"><strong>子 · 鼠</strong></td><td>子午相冲，主夫妻不和</td></tr>\n    <tr><td class=\"center\"><strong>丑 · 牛</strong></td><td>午丑相害，主小人是非</td></tr>\n    <tr><td class=\"center\"><strong>两口字</strong>（如\"吕、品\"）</td><td>\"一马不可两口\"，主多妻、健康损</td></tr>\n    <tr><td class=\"center\"><strong>田 · 农耕</strong></td><td>马耕田为劳碌之象</td></tr>\n    <tr><td class=\"center\"><strong>洞穴字</strong>（穴、囗）</td><td>困马之象</td></tr>\n    <tr><td class=\"center\"><strong>心 · 忄 · 月（肉）</strong></td><td>非肉食生肖，错配败钱</td></tr>\n    <tr><td class=\"center\"><strong>小 · 少 · 微</strong></td><td>马气大，缩小反伤</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷七第八章 未羊 -->"}, {"id": "v七-c8", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 八 章", "chapTitle": "未 羊：温和柔顺，五谷有福", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">未 羊</div>\n  <div class=\"zodiac-subtitle\">地支之八 · 南方火土</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>未（午后未时 13:00—15:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>土（阴土，藏木火）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>南偏西</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>亥 卯 未（猪兔羊 · 木局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>巳 午 未（蛇马羊 · 南方火会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>未 ↔ 午（羊 ↔ 马）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>未 ↔ 丑（羊 ↔ 牛）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>未 ↔ 子（羊 ↔ 鼠）</td></tr>\n    <tr><td class=\"center\"><strong>相 刑</strong></td><td>未 ↔ 戌（羊 ↔ 狗）</td></tr>\n  </tbody>\n</table>\n\n<h2>一、未羊之天性</h2>\n\n<p>羊为温柔之畜，性情温和、孝顺善良、草食为生。羊喜五谷（草料）、喜艹字头、喜口（食槽）、喜彩衣（祭祀之尊）。羊忌犬犬戎（戌为羊之刑）、忌山（羊登山易摔）、忌大字王字（羊为小肖辅佐之畜）、忌水（羊怕水）。</p>\n\n<h2>二、未羊之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>艹、禾、米、豆、麦</td>\n      <td>芳、芸、芷、茵、莉、菁、萱、薇、苑、苇<br>程、秀、秋、和、季、秉、穆</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>口、宀、广<br>（食槽与栏）</td>\n      <td>安、宇、宏、宁、宗、宜、宣、宥、家、宸<br>富、容、宙、宛、品</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>小、少、士、臣<br>（羊为小肖辅佐）</td>\n      <td>士、臣、亚、佐、佑、仁、仕、彦、佳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾<br>（祭祀彩衣）</td>\n      <td>彤、绮、祯、祥、素、裴、缘、彬、彰<br>翊、翠、翎</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>跷脚字（羊休息）<br>夜行字</td>\n      <td>宏、云、松、元、允、先、公、典<br>夕、月、朋、宿</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、未羊之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>犬 · 犭 · 戎 · 戌</strong></td><td>羊犬相刑，主自我内耗、健康损</td></tr>\n    <tr><td class=\"center\"><strong>丑 · 牛</strong></td><td>未丑相冲，主夫妻冲突</td></tr>\n    <tr><td class=\"center\"><strong>子 · 鼠</strong></td><td>子未相害，主小人是非</td></tr>\n    <tr><td class=\"center\"><strong>山 · 岩 · 峰</strong></td><td>羊登山易摔，主刑伤</td></tr>\n    <tr><td class=\"center\"><strong>王 · 大 · 君</strong></td><td>羊为小肖，称王反伤气场</td></tr>\n    <tr><td class=\"center\"><strong>水 · 氵</strong></td><td>羊怕水，主事业波折</td></tr>\n    <tr><td class=\"center\"><strong>心 · 忄 · 月（肉）</strong></td><td>非肉食生肖，错配败钱</td></tr>\n    <tr><td class=\"center\"><strong>武 · 刚 · 强</strong></td><td>羊性柔，刚强字反成压力</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷七第九章 申猴 -->"}, {"id": "v七-c9", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 九 章", "chapTitle": "申 猴：聪慧灵巧，木上称王", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">申 猴</div>\n  <div class=\"zodiac-subtitle\">地支之九 · 西方金</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>申（午后申时 15:00—17:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>金（阳金）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>西偏南</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>申 子 辰（猴鼠龙 · 水局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>申 酉 戌（猴鸡狗 · 西方金会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>申 ↔ 巳（猴 ↔ 蛇）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>申 ↔ 寅（猴 ↔ 虎）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>申 ↔ 亥（猴 ↔ 猪）</td></tr>\n  </tbody>\n</table>\n\n<h2>一、申猴之天性</h2>\n\n<p>猴为灵巧之物，机敏聪慧、活泼好动、喜杂食。猴喜木（树上为王）、喜水（生猴气）、喜山（山林之家）、喜五谷。猴忌田（受制）、忌金（同金为刑）、忌虎（相冲）、忌猪（相害）。猴最喜\"木上称王\"——木字根加王字根，是猴之大吉。</p>\n\n<h2>二、申猴之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>艹、禾、米、豆<br>水（生金）</td>\n      <td>芳、茵、芮、莉、菁、萱、薇<br>泽、清、源、涵、霖、雯、湘、淳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>木、林、山<br>（树上山中为家）</td>\n      <td>林、森、楚、松、柏、柳、柯、桂、桓、楷<br>岚、岩、峰、峻、崇、嵩、岳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>王、大、君<br>（木上称王为大吉）</td>\n      <td>玲、珍、琦、琪、琳、琴、瑜、瑞、瑶、瑾<br>璇、君、冠</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾</td>\n      <td>彤、绮、祯、祥、素、裴、彬、彰、彦<br>翊、翠、翎</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>跷脚字<br>夜行字</td>\n      <td>宏、云、松、元、允、先、公<br>夕、月、朋、朗、宿</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、申猴之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>田 · 农耕</strong></td><td>猴入农田受人束缚，主事业受制</td></tr>\n    <tr><td class=\"center\"><strong>金 · 钅</strong></td><td>同金为刑，主自我内耗</td></tr>\n    <tr><td class=\"center\"><strong>寅 · 虎</strong></td><td>申寅相冲，主夫妻、合伙冲突</td></tr>\n    <tr><td class=\"center\"><strong>亥 · 猪 · 豕</strong></td><td>申亥相害，主小人暗算</td></tr>\n    <tr><td class=\"center\"><strong>火 · 灬</strong></td><td>火克金，性情急躁</td></tr>\n    <tr><td class=\"center\"><strong>心 · 忄 · 月（肉）</strong></td><td>猴杂食偏向果实，肉食字根不利</td></tr>\n    <tr><td class=\"center\"><strong>口 · 囗</strong></td><td>困猴之象</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷七第十章 酉鸡 -->"}, {"id": "v七-c10", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 十 章", "chapTitle": "酉 鸡：司晨啼旦，戴冠为荣", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">酉 鸡</div>\n  <div class=\"zodiac-subtitle\">地支之十 · 西方金</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>酉（傍晚酉时 17:00—19:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>金（阴金）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>正西</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>巳 酉 丑（蛇鸡牛 · 金局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>申 酉 戌（猴鸡狗 · 西方金会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>酉 ↔ 辰（鸡 ↔ 龙）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>酉 ↔ 卯（鸡 ↔ 兔）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>酉 ↔ 戌（鸡 ↔ 狗）</td></tr>\n    <tr><td class=\"center\"><strong>桃 花</strong></td><td>四大桃花生肖之一</td></tr>\n    <tr><td class=\"center\"><strong>自 刑</strong></td><td>酉 自刑</td></tr>\n  </tbody>\n</table>\n\n<h2>一、酉鸡之天性</h2>\n\n<p>鸡为司晨之鸟，勤劳准时、自尊高傲、五谷为食。鸡喜日（司晨）、喜冠冕（戴冠为荣）、喜五谷、喜彩衣（鸡披彩衣为凤）、喜小口（啄食）。鸡忌大口（无法啄食）、忌肉食字、忌兔（相冲）、忌犬（相害）、忌山（鸡上山易遇险）。鸡得\"日 + 冠\"是其最大吉——升格为凤凰。</p>\n\n<h2>二、酉鸡之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>艹、禾、米、豆、麦<br>小口（啄食）</td>\n      <td>芳、茵、莉、菁、萱、薇、苇、苑<br>程、秀、秋、和、季、秉、穆<br>启、合、咏、咸、和、品</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>宀、广、口</td>\n      <td>安、宇、宏、宁、宗、宜、宣、宥、家、宸<br>富、容、宛、宝</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>王、君、冠、亢<br>日、阳（司晨）<br>（鸡戴冠为凤凰）</td>\n      <td>玲、琦、琪、琳、琴、瑜、瑞、瑶、瑾<br>君、冠、兴、亮、亨、亭<br>明、晗、昇、昊、昕、晨、昱、昭</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾<br>羽（鸡之翼）</td>\n      <td>彤、绮、祯、祥、素、裴、缘、彬、彰<br>翊、翠、翎、羚、翔</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>双脚立字<br>跷脚字</td>\n      <td>立、章、竞、端、竟<br>宏、云、松、元、允、公</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>三、酉鸡之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>大口字</strong>（如\"喷、嗨\"）</td><td>鸡无法啄食大口，主吃不饱</td></tr>\n    <tr><td class=\"center\"><strong>卯 · 兔 · 月（卯）</strong></td><td>卯酉相冲，主夫妻冲突</td></tr>\n    <tr><td class=\"center\"><strong>戌 · 犬 · 犭</strong></td><td>酉戌相害，主小人暗算</td></tr>\n    <tr><td class=\"center\"><strong>心 · 忄 · 月（肉）</strong></td><td>非肉食生肖，错配败钱</td></tr>\n    <tr><td class=\"center\"><strong>山 · 岩</strong></td><td>鸡上山易遇险</td></tr>\n    <tr><td class=\"center\"><strong>火 · 灬</strong></td><td>火克金，性情急躁</td></tr>\n    <tr><td class=\"center\"><strong>水 · 氵</strong></td><td>金生水耗自身气场，鸡羽湿则飞难</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷七第十一章 戌狗 -->"}, {"id": "v七-c11", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 十 一 章", "chapTitle": "戌 狗：忠义守家，三口考试", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">戌 狗</div>\n  <div class=\"zodiac-subtitle\">地支之十一 · 西方金土</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>戌（夜晚戌时 19:00—21:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>土（阳土，藏金火）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>西北</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>寅 午 戌（虎马狗 · 火局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>申 酉 戌（猴鸡狗 · 西方金会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>戌 ↔ 卯（狗 ↔ 兔）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>戌 ↔ 辰（狗 ↔ 龙）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>戌 ↔ 酉（狗 ↔ 鸡）</td></tr>\n    <tr><td class=\"center\"><strong>相 刑</strong></td><td>戌 ↔ 丑、未</td></tr>\n  </tbody>\n</table>\n\n<h2>一、戌狗之天性</h2>\n\n<p>狗为忠义之畜，护主守家、勇敢直爽、肉食为生。狗喜口（守家有口、考试得口）——尤其\"三口、四口考试\"为最佳，主功名考运极旺。狗喜山（山林家园）、喜肉食、喜杂木林。狗忌水（涉水难行）、忌日光（暴晒）、忌田（无家可归）、忌龙（相冲）、忌牛羊（相刑）。</p>\n\n<h2>二、戌狗之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>心、忄、月（肉）<br>（狗为肉食）</td>\n      <td>志、念、忠、怡、恒、恩、悦、悟、情、惠<br>慕、慧、忆、怀、悠、朗、朔、期</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>口、宀、广<br>（守家护宅）</td>\n      <td>安、宇、宏、宁、宗、宜、宣、宥、家、宸<br>富、容、宛、宝<br>品（三口）、嘉、嘉</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>小、少、士、臣<br>（狗为小肖辅佐）</td>\n      <td>士、臣、亚、佐、佑、仁、仕、彦、佳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>衣、彡、糸、巾</td>\n      <td>彤、绮、祯、祥、素、裴、彬、彰、彦<br>翊、翠、翎</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>跷脚字<br>夜行字</td>\n      <td>宏、云、松、元、允、先、公<br>夕、月、朋、朗、宿、夜</td>\n    </tr>\n  </tbody>\n</table>\n\n<div class=\"tip\">\n  <strong>狗喜\"考试字\"特别提示：</strong>狗最喜含三个口、四个口的字，如\"品（三口）、器（四口）、嘉（多口）\"——主功名考运、读书有成、文凭学历皆顺。家有狗宝宝者，名一名二有\"品、嘉\"等字，孩子读书运极旺。\n</div>\n\n<h2>三、戌狗之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>水 · 氵 · 雨</strong></td><td>狗涉水寒湿，主事业波折</td></tr>\n    <tr><td class=\"center\"><strong>辰 · 龙</strong></td><td>戌辰相冲，主夫妻冲突</td></tr>\n    <tr><td class=\"center\"><strong>酉 · 鸡 · 鸟</strong></td><td>戌酉相害，主小人暗算</td></tr>\n    <tr><td class=\"center\"><strong>丑 · 牛 · 未 · 羊</strong></td><td>戌丑、戌未相刑，主自我内耗</td></tr>\n    <tr><td class=\"center\"><strong>日 · 阳 · 光</strong></td><td>狗忌烈日暴晒</td></tr>\n    <tr><td class=\"center\"><strong>田 · 农耕</strong></td><td>狗无家可归，主漂泊</td></tr>\n    <tr><td class=\"center\"><strong>五谷字</strong>（禾、米、麦）</td><td>非肉食生肖，错配败钱</td></tr>\n  </tbody>\n</table>\n\n<!-- 卷七第十二章 亥猪 -->"}, {"id": "v七-c12", "kind": "chapter", "volNum": "七", "volTitle": "肖 之 详 解", "volSubtitle": "十二生肖 · 完整宜忌 · 实战吉字", "volQuote": "「天分十二宫，地化十二肖；<br>各有其性，各有其忌；<br>知性而起名，因肖而立局。」", "chapNum": "第 十 二 章", "chapTitle": "亥 猪：丰盈憨厚，水边有福", "content": "<div class=\"zodiac-header\">\n  <div class=\"zodiac-title\">亥 猪</div>\n  <div class=\"zodiac-subtitle\">地支之十二 · 北方水</div>\n</div>\n\n<table>\n  <thead>\n    <tr><th>属性</th><th>内容</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>地支</strong></td><td>亥（深夜亥时 21:00—23:00）</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>水（阴水）</td></tr>\n    <tr><td class=\"center\"><strong>方位</strong></td><td>北偏西</td></tr>\n    <tr><td class=\"center\"><strong>三 合</strong></td><td>亥 卯 未（猪兔羊 · 木局）</td></tr>\n    <tr><td class=\"center\"><strong>三 会</strong></td><td>亥 子 丑（猪鼠牛 · 北方水会）</td></tr>\n    <tr><td class=\"center\"><strong>六 合</strong></td><td>亥 ↔ 寅（猪 ↔ 虎）</td></tr>\n    <tr><td class=\"center\"><strong>六 冲</strong></td><td>亥 ↔ 巳（猪 ↔ 蛇）</td></tr>\n    <tr><td class=\"center\"><strong>相 害</strong></td><td>亥 ↔ 申（猪 ↔ 猴）</td></tr>\n    <tr><td class=\"center\"><strong>自 刑</strong></td><td>亥 自刑</td></tr>\n  </tbody>\n</table>\n\n<h2>一、亥猪之天性</h2>\n\n<p>猪为憨厚之畜，性情温和、福气深厚、五谷为食。猪喜水字边（水生猪气）、喜五谷（食粮）、喜口（食槽）、喜宀（猪舍）。猪最忌土字边——土克水，主事业波折。猪忌山（猪上山为艰辛）、忌猴（相害）、忌蛇（相冲）、忌彩衣（祭祀供品）、忌刀（屠宰）。猪是水底之福，故水字边最为关键。</p>\n\n<h2>二、亥猪之五得详解</h2>\n\n<table class=\"zodiac-table\">\n  <thead>\n    <tr><th>五得</th><th>宜用字根</th><th>精选取名吉字</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>得 食</strong></td>\n      <td>艹、禾、米、豆、麦<br>水（生猪气）</td>\n      <td>芳、茵、莉、菁、萱、薇、苇、苑<br>程、秀、秋、和、季、秉、穆<br>泽、清、源、涵、霖、雯、湘、淳、洲</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 地</strong></td>\n      <td>口、宀、广、家<br>（猪舍栏圈）</td>\n      <td>安、宇、宏、宁、宗、宜、宣、宥、家、宸<br>富、容、宛、宝、宙</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 位</strong></td>\n      <td>小、少、士、臣<br>（猪为辅佐之畜）</td>\n      <td>士、臣、亚、佐、佑、仁、仕、彦、佳</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 势</strong></td>\n      <td>慎用彩衣<br>（猪披彩衣为祭品，宜薄不宜厚）</td>\n      <td>素、缘、绅（少量为宜）</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>得 福</strong></td>\n      <td>跷脚字<br>夜行字</td>\n      <td>宏、云、松、元、允、先、公、典<br>夕、月、朋、朗、宿、夜</td>\n    </tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>亥猪重大警告——土字根：</strong>猪属水，最忌土克水。\"土\"字根包括：土、田、垚、垚、艮、坚、坤、堂、城、培、垒、墉、墙等。一旦含土字根于名一，主事业波折、财来财去、根基不稳。猪宝宝起名第一忌为\"土\"。\n</div>\n\n<h2>三、亥猪之忌用</h2>\n\n<table>\n  <thead>\n    <tr><th>忌用字根</th><th>原因</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>土 · 田 · 垚 · 艮</strong></td><td>土克水，主事业波折、财库受损（猪第一忌）</td></tr>\n    <tr><td class=\"center\"><strong>巳 · 蛇 · 弓 · 虫</strong></td><td>亥巳相冲，主夫妻冲突</td></tr>\n    <tr><td class=\"center\"><strong>申 · 猴</strong></td><td>亥申相害，主小人暗算</td></tr>\n    <tr><td class=\"center\"><strong>山 · 岩</strong></td><td>猪上山为艰辛，主刑伤</td></tr>\n    <tr><td class=\"center\"><strong>刀 · 刂 · 刑</strong></td><td>屠宰之象，主伤损</td></tr>\n    <tr><td class=\"center\"><strong>厚彩衣字</strong>（巾、糸过多）</td><td>猪披彩衣为祭品，主一生辛劳</td></tr>\n    <tr><td class=\"center\"><strong>心 · 忄 · 月（肉）</strong></td><td>非肉食生肖，错配败钱</td></tr>\n    <tr><td class=\"center\"><strong>王 · 大 · 君</strong></td><td>猪为辅佐，称王反伤气场</td></tr>\n  </tbody>\n</table>\n\n<div class=\"example\">\n  <div class=\"example-title\">范例：陈 涵 宇（男 · 亥猪）</div>\n  <p><strong>分析：</strong></p>\n  <p>　• 姓\"陈\"——有左耳旁（受制气），但右部\"东\"含龙气，与猪非相冲（辰戌冲，亥不冲）</p>\n  <p>　• 名一\"涵\"含氵——猪喜水气大吉</p>\n  <p>　• 名二\"宇\"含宀——猪舍得地大吉</p>\n  <p><strong>整体：</strong>水字根 + 宀字根，是猪命之上佳搭配，主财库稳、福气厚。</p>\n</div>\n\n<!-- ===================== 卷八 用之实战 ===================== -->"}, {"id": "v八-c1", "kind": "chapter", "volNum": "八", "volTitle": "用 之 实 战", "volSubtitle": "起名七步 · 综合判断 · 改名时机", "volQuote": "「理在于学，术在于练，<br>千学不如一用，万言不如一名。」", "chapNum": "第 一 章", "chapTitle": "起名七步流程：从命到名的完整路径", "content": "<p>起名一事，看似简单，实则需要严密之逻辑、深厚之学识、敏锐之判断。本章为读者提供\"起名七步流程\"——一套可重复、可验证、可落地之实操方法，让起名从\"凭感觉\"升级为\"有章法\"。</p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">起 名 七 步 流 程</div>\n  <p><strong>第一步</strong>　确定生肖与立春分界</p>\n  <p><strong>第二步</strong>　分析姓氏之先天能量</p>\n  <p><strong>第三步</strong>　选定五得之优先组合</p>\n  <p><strong>第四步</strong>　从生肖喜用字库筛字</p>\n  <p><strong>第五步</strong>　校核音形义与笔画</p>\n  <p><strong>第六步</strong>　测算流年与五行平衡</p>\n  <p><strong>第七步</strong>　最终确认与命名落定</p>\n</div>\n\n<h2>第一步：确定生肖与立春分界</h2>\n\n<p>生肖以<strong>立春</strong>为分界，而非农历正月初一。立春一过，新一年生肖才算正式启动。</p>\n\n<table>\n  <thead>\n    <tr><th>例子</th><th>说明</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>2024年1月15日</strong></td>\n      <td>2024年立春前出生——属<strong>兔</strong>（卯）</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>2024年2月10日</strong></td>\n      <td>2024年立春后出生——属<strong>龙</strong>（辰）</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>春节前几日</strong></td>\n      <td>仍属上一年生肖，须查具体时辰</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>第二步：分析姓氏之先天能量</h2>\n\n<p>姓氏不可改，是先天定数，须先分析其字根、五行、生肖契合度。具体步骤：</p>\n\n<ul>\n  <li>拆解姓氏之字根（左右、上下、内外结构）</li>\n  <li>判断主能量字根对生肖之吉凶</li>\n  <li>识别\"先天助力\"或\"先天压力\"</li>\n  <li>记录需在名一名二补救之能量</li>\n</ul>\n\n<div class=\"example\">\n  <div class=\"example-title\">姓氏分析示例：黄</div>\n  <p><strong>字根：</strong>由（鼠根）+ 田 + 八</p>\n  <p><strong>能量：</strong>含\"田\"字根——对虎、龙、猴为受制压力</p>\n  <p><strong>对策：</strong>若孩子属虎、龙或猴，须以名字补强王字根、山字根，化解受制气场</p>\n</div>\n\n<h2>第三步：选定五得之优先组合</h2>\n\n<p>五得不必齐全，但应有所侧重。可按以下优先级选取：</p>\n\n<table>\n  <thead>\n    <tr><th>家庭关注</th><th>优先得</th><th>说明</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td class=\"center\"><strong>财富事业</strong></td>\n      <td>得食 + 得位</td>\n      <td>食为财源，位为事业之高度</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>稳定根基</strong></td>\n      <td>得地 + 得福</td>\n      <td>地为根基，福为安逸</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>人际贵人</strong></td>\n      <td>得势 + 得位</td>\n      <td>势主外缘，位定身份</td>\n    </tr>\n    <tr>\n      <td class=\"center\"><strong>女命福寿</strong></td>\n      <td>得食 + 得地 + 得福</td>\n      <td>食以丰、地以稳、福以归</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>第四步：从生肖喜用字库筛字</h2>\n\n<p>根据五得优先级，从生肖喜用字库（卷七已列）筛选符合条件之字。建议每一得选3-5字，作为候选池。</p>\n\n<h2>第五步：校核音形义与笔画</h2>\n\n<p>候选字筛出后，须逐一通过以下校核：</p>\n\n<ul>\n  <li><strong>音律</strong>——三字读音和谐，避谐音、避拗口</li>\n  <li><strong>字形</strong>——三字繁简相称，结构稳重</li>\n  <li><strong>字义</strong>——吉祥光明，无虚浮、无凶煞</li>\n  <li><strong>笔画</strong>——按康熙字典正繁体字计算</li>\n  <li><strong>避禁字</strong>——避替身字（其、予、吾）、避女命禁忌</li>\n</ul>\n\n<h2>第六步：测算流年与五行平衡</h2>\n\n<p>结合八白姓名学之笔画系统，测算总笔画对应之\"星座数字\"——判断人生剧本型态；查询人格、地格、外格之流年凶数；分析五行之平衡（金木水火土比例）。</p>\n\n<div class=\"warning\">\n  <strong>务必避开人格之先天命数流年凶数。</strong>姓 + 名一之笔画总和，不可与该年命数对应之凶数重合，否则少年至中年之运势波折较大。\n</div>\n\n<h2>第七步：最终确认与命名落定</h2>\n\n<p>选出2-3个候选名，由家庭成员共同评估：</p>\n\n<ol>\n  <li>朗读候选名10遍——感受是否上口、亲切</li>\n  <li>书写候选名5遍——感受是否流畅、端正</li>\n  <li>查询同名同姓——避与近亲、明星、负面人物重名</li>\n  <li>家中长辈共议——尊重家族传承、避同字与直系长辈</li>\n  <li>最终落定——命名后即加以稳固使用，不再频繁更动</li>\n</ol>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">起 名 之 心 法</div>\n  <p>名以载命，命以承志。<br>不求其奇，但求其正；不求其华，但求其实；<br>不求其满，但求其中；不求其速，但求其久。<br>一名得当，伴一生；一字之吉，受用百年。</p>\n</div>\n\n<!-- 卷八第二章 -->"}, {"id": "v八-c2", "kind": "chapter", "volNum": "八", "volTitle": "用 之 实 战", "volSubtitle": "起名七步 · 综合判断 · 改名时机", "volQuote": "「理在于学，术在于练，<br>千学不如一用，万言不如一名。」", "chapNum": "第 二 章", "chapTitle": "综合判断法：多维度交叉验证", "content": "<p>姓名学之高阶应用，不是单看生肖、单看五行、或单看笔画，而是<strong>多维度交叉验证</strong>。一字之吉凶，须经\"生肖、五行、字义、字形、笔画、流年\"六个维度同时通过，方为真吉。</p>\n\n<h2>一、六维交叉判断表</h2>\n\n<table>\n  <thead>\n    <tr><th>维度</th><th>判断标准</th><th>合格</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>生肖</strong></td><td>字根契合生肖喜用，避忌讳</td><td>必须✓</td></tr>\n    <tr><td class=\"center\"><strong>五行</strong></td><td>五行平衡，无极旺极缺</td><td>必须✓</td></tr>\n    <tr><td class=\"center\"><strong>字义</strong></td><td>正向、吉祥、有内涵</td><td>必须✓</td></tr>\n    <tr><td class=\"center\"><strong>字形</strong></td><td>结构稳重，书写流畅</td><td>建议✓</td></tr>\n    <tr><td class=\"center\"><strong>笔画</strong></td><td>避先天凶数，适合星座剧本</td><td>建议✓</td></tr>\n    <tr><td class=\"center\"><strong>流年</strong></td><td>未来五年关键流年无大冲</td><td>建议✓</td></tr>\n  </tbody>\n</table>\n\n<div class=\"tip\">\n  <strong>\"必须\"与\"建议\"之差别：</strong>\"必须\"项不通过——名不可用，须重新选字；\"建议\"项不通过——可作为优化方向，但不必否决整个名字。命名是综合艺术，须接受一定折衷。\n</div>\n\n<h2>二、矛盾点之处理原则</h2>\n\n<p>实际起名中，常遇到\"满足生肖喜，但五行偏旺\"或\"字义吉，但笔画凶\"之矛盾。处理原则如下：</p>\n\n<ul>\n  <li><strong>生肖优先于五行</strong>——生肖字根决定命之主轴，五行可微调</li>\n  <li><strong>字义优先于笔画</strong>——字义决定一生气场，笔画仅决定剧本型态</li>\n  <li><strong>名一优先于名二</strong>——名一是中年主战场，必须最优；名二可补救</li>\n  <li><strong>整体优先于局部</strong>——三字组合之整体气场，胜过单字之完美</li>\n</ul>\n\n<!-- 卷八第三章 -->"}, {"id": "v八-c3", "kind": "chapter", "volNum": "八", "volTitle": "用 之 实 战", "volSubtitle": "起名七步 · 综合判断 · 改名时机", "volQuote": "「理在于学，术在于练，<br>千学不如一用，万言不如一名。」", "chapNum": "第 三 章", "chapTitle": "实例分析：从命盘到名字", "content": "<p>本章以三个真实命盘为例，演示从生辰资料到最终命名之完整推演过程。</p>\n\n<div class=\"example\">\n  <div class=\"example-title\">案例一：男 · 2024年4月15日 · 姓陈</div>\n  <p><strong>第一步：</strong>2024年立春后——属<strong>辰龙</strong></p>\n  <p><strong>第二步：</strong>姓陈含左耳\"阝\"（受制）+ \"东\"（龙气）——先天有助力（东含龙），但受制气需化解</p>\n  <p><strong>第三步：</strong>选\"得位 + 得食\"为主，化解受制</p>\n  <p><strong>第四步：</strong>龙喜王、日、水、云——筛字\"淏、君、宸、晨、霖、辰\"</p>\n  <p><strong>第五步：</strong>组合\"宸君\"——含宀（龙之云）、辰（龙本字）、君（得位）</p>\n  <p><strong>第六步：</strong>陈（11笔）+ 宸（10笔）= 21笔人格——非凶数</p>\n  <p><strong>最终：</strong>陈宸君</p>\n</div>\n\n<div class=\"example\">\n  <div class=\"example-title\">案例二：女 · 2025年9月10日 · 姓林</div>\n  <p><strong>第一步：</strong>2025年立春后——属<strong>巳蛇</strong></p>\n  <p><strong>第二步：</strong>姓林——双木叠加，蛇喜杂木林，先天大吉</p>\n  <p><strong>第三步：</strong>选\"得势 + 得地 + 得福\"</p>\n  <p><strong>第四步：</strong>蛇喜彩衣升格——筛字\"彤、绮、缘、彩、彬、彦\"</p>\n  <p><strong>第五步：</strong>组合\"彤宇\"——彤含彡（彩衣得势）、宇含宀（得地）</p>\n  <p><strong>第六步：</strong>林（8）+ 彤（7）= 15笔——禄存星，主稳定</p>\n  <p><strong>最终：</strong>林彤宇</p>\n</div>\n\n<div class=\"example\">\n  <div class=\"example-title\">案例三：男 · 2023年8月20日 · 姓王</div>\n  <p><strong>第一步：</strong>2023年立春后——属<strong>卯兔</strong></p>\n  <p><strong>第二步：</strong>姓王——王字根，对兔为先天压力（兔为小肖不宜称王）</p>\n  <p><strong>第三步：</strong>选\"得食 + 得地 + 得福\"补救</p>\n  <p><strong>第四步：</strong>兔喜艹、宀、月（夜行）——筛字\"芮、宁、宇、月、朔、苇\"</p>\n  <p><strong>第五步：</strong>组合\"芮宇\"——芮含艹（得食）、宇含宀（得地）</p>\n  <p><strong>第六步：</strong>王（4）+ 芮（10）= 14笔——天机星，主智慧</p>\n  <p><strong>最终：</strong>王芮宇（虽姓压力，名补足三得）</p>\n</div>\n\n<!-- 卷八第四章 -->"}, {"id": "v八-c4", "kind": "chapter", "volNum": "八", "volTitle": "用 之 实 战", "volSubtitle": "起名七步 · 综合判断 · 改名时机", "volQuote": "「理在于学，术在于练，<br>千学不如一用，万言不如一名。」", "chapNum": "第 四 章", "chapTitle": "改名时机：何时改、如何改", "content": "<p>改名是大事，不可轻举妄动。然名若不利，亦须果断更改。本章探讨改名之时机、方法、原则。</p>\n\n<h2>一、改名之时机</h2>\n\n<table>\n  <thead>\n    <tr><th>时机</th><th>说明</th></tr>\n  </thead>\n  <tbody>\n    <tr><td class=\"center\"><strong>9岁前</strong></td><td>最佳改名时段——人格未定，能量易转</td></tr>\n    <tr><td class=\"center\"><strong>9—18岁</strong></td><td>仍可改，效力稍减</td></tr>\n    <tr><td class=\"center\"><strong>大学毕业前</strong></td><td>改名仍可影响中年运</td></tr>\n    <tr><td class=\"center\"><strong>转折期</strong></td><td>升学、毕业、结婚、创业、移居前后</td></tr>\n    <tr><td class=\"center\"><strong>成年后</strong></td><td>正式改名手续繁复，可改\"使用名\"或\"艺名\"</td></tr>\n  </tbody>\n</table>\n\n<div class=\"warning\">\n  <strong>9岁前后之差异：</strong>古人云\"9岁前行为惯性已成型\"。9岁前改名，能量可重塑性格基础；9岁后改名，主要影响人际、事业等外缘运势，对内在性格之改造力有限。\n</div>\n\n<h2>二、改名之方式</h2>\n\n<ol>\n  <li><strong>正式改名</strong>——通过法律手续更改身份证、户口、护照——影响最强</li>\n  <li><strong>艺名 / 笔名</strong>——日常使用名字，不改身份证——影响中等</li>\n  <li><strong>商号 / 字号</strong>——商业用名，仅限商业范畴——影响商务运</li>\n  <li><strong>电邮 / 社交名</strong>——网络与社交场合用名——影响人际网络运</li>\n  <li><strong>印章 / 签名</strong>——个人专用印章签名——辅助加持</li>\n</ol>\n\n<h2>三、改名之原则</h2>\n\n<ul>\n  <li><strong>不轻动姓氏</strong>——姓为祖德，不可改</li>\n  <li><strong>不全部更换</strong>——若名一名二都不利，可先改名一，名二慢慢调</li>\n  <li><strong>不追求奇特</strong>——改名是为补能量，不是为标新立异</li>\n  <li><strong>不频繁更动</strong>——一名定型至少使用3-5年，方有效果</li>\n  <li><strong>用即生效</strong>——改名之力，在于\"被人呼唤\"。须主动让家人、朋友、同事使用新名</li>\n</ul>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">改 名 之 真 义</div>\n  <p>名是助推器，不是命主宰。<br>改名不能改命，但能调运、能聚气、能引势。<br>改一字而开一窗，调一名而通一脉。<br>改名之时机，亦是反思之时机；<br>改名之过程，亦是立志之过程。<br>名变心不变，则改名无意；名变心亦变，则改名通天。</p>\n</div>\n\n\n<!-- ===================== 卷九 智之辨明 ===================== -->"}, {"id": "v九-c1", "kind": "chapter", "volNum": "九", "volTitle": "智 之 辨 明", "volSubtitle": "理性认知 · 现代审视 · 实践智慧", "volQuote": "「学而不思则罔，思而不学则殆。<br>姓名一道，亦须思学并济，理性以观。」", "chapNum": "第 一 章", "chapTitle": "传统与现代之审视：姓名学的边界", "content": "<p>姓名学源远流长，乃华夏文化之珍贵遗产。然在现代科学视角下，亦须明辨其边界、理性看待其作用。本章不为否定传统，亦不为盲信古法，而是以平衡之态度，引读者认清姓名学之\"能\"与\"不能\"。</p>\n\n<h2>一、姓名学之\"能\"</h2>\n\n<ul>\n  <li><strong>能聚正能量</strong>——一字一日一呼，潜移默化，加强自我认同</li>\n  <li><strong>能影响心理</strong>——名字之美感、寓意，影响自信、性格、气质</li>\n  <li><strong>能营造环境</strong>——好名引人喜爱，好名结善缘，环境随之改善</li>\n  <li><strong>能体现传承</strong>——名字承载家族文化、长辈期望、世代记忆</li>\n  <li><strong>能调和气场</strong>——配合生肖、五行，达成内在与外在之平衡</li>\n</ul>\n\n<h2>二、姓名学之\"不能\"</h2>\n\n<ul>\n  <li><strong>不能改命</strong>——生辰八字、家庭背景、时代际遇，皆非名字所能逆转</li>\n  <li><strong>不能代替努力</strong>——好名只是助推器，不是事业有成之保证</li>\n  <li><strong>不能违逆现实</strong>——若一个人本身懒惰、消极，再好之名亦无济于事</li>\n  <li><strong>不能预测细节</strong>——姓名学是大方向之能量，不可精确到某月某日</li>\n  <li><strong>不能取代医学法律</strong>——健康问题须就医，法律纠纷须求法</li>\n</ul>\n\n<h2>三、对\"81数吉凶\"之反思</h2>\n\n<p>市面上流传之\"81数吉凶论\"（如13数吉、14数凶等），源自日本雄崎先生之研究，被广为传抄。然张科勉老师明确指出：<strong>\"数字只有型态特色并无吉凶。\"</strong></p>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">张 科 勉 老 师 之 论 点</div>\n  <p><strong>1.</strong>每一总笔画数对应一种\"星座数字\"，是人生剧本之型态，非简单吉凶。</p>\n  <p><strong>2.</strong>所谓\"凶数\"，仅在<strong>流年凶数</strong>层面有效——即某年人格数遇某流年时，会有较大波折。</p>\n  <p><strong>3.</strong>名人之中，成功者多有\"凶数\"——19数（李斯、唐飞、林挺生）、34数（李登辉、宋楚瑜、郭台铭）、44数（曾国藩、戴胜通）。</p>\n  <p><strong>4.</strong>用\"81数吉凶\"否定一个名字，是<strong>过度简化</strong>，不可作为命名之主要依据。</p>\n</div>\n\n<h2>四、对\"五格剖象\"之看待</h2>\n\n<p>五格剖象（天格、人格、地格、外格、总格）是日本姓名学体系，亦广泛流传于华人社会。其分析方法系统化，但非中国传统姓名学之根本。建议读者：</p>\n\n<ul>\n  <li><strong>可参考</strong>——五格剖象之笔画分析，可作辅助工具</li>\n  <li><strong>不迷信</strong>——不要以五格剖象之吉凶论否定生肖姓名学之判断</li>\n  <li><strong>知其源</strong>——明白此系统之由来与局限，方能合理运用</li>\n</ul>\n\n<!-- 卷九第二章 -->"}, {"id": "v九-c2", "kind": "chapter", "volNum": "九", "volTitle": "智 之 辨 明", "volSubtitle": "理性认知 · 现代审视 · 实践智慧", "volQuote": "「学而不思则罔，思而不学则殆。<br>姓名一道，亦须思学并济，理性以观。」", "chapNum": "第 二 章", "chapTitle": "心理暗示与名字之力量", "content": "<p>现代心理学研究表明，名字对人之影响远比想象深远。这种影响并非\"玄学\"，而是<strong>心理暗示</strong>之科学机制。理解这一点，有助于我们更理性地看待姓名学。</p>\n\n<h2>一、自我认同效应</h2>\n\n<p>每日被人呼唤之名字，潜移默化中塑造自我认同。研究显示：</p>\n\n<ul>\n  <li>名字含\"勇、刚、强\"等阳气字者，自信度普遍较高</li>\n  <li>名字含\"美、丽、雅\"等审美字者，对外貌更加重视</li>\n  <li>名字含\"博、学、智\"等学识字者，对学习更加投入</li>\n  <li>名字含\"福、寿、康\"等吉祥字者，对生活更加乐观</li>\n</ul>\n\n<h2>二、社会期望效应</h2>\n\n<p>名字向外界传递信息，他人据此形成第一印象。这影响：</p>\n\n<ul>\n  <li><strong>职场印象</strong>——名字显得专业、稳重者，更易获得工作机会</li>\n  <li><strong>人际开端</strong>——名字易记、好听者，更易被他人记住和喜爱</li>\n  <li><strong>异性缘分</strong>——名字与气质相符者，更能吸引同频之人</li>\n  <li><strong>商业品牌</strong>——商号名响亮、寓意佳者，更易获得客户信任</li>\n</ul>\n\n<h2>三、文化能量效应</h2>\n\n<p>中文字之每一笔画，皆承载千年之文化能量。书写、念诵、欣赏一个好名字，本身即是与中华文化之深层连接。这种连接：</p>\n\n<ul>\n  <li>增强文化自信</li>\n  <li>滋养精神境界</li>\n  <li>传承家族记忆</li>\n  <li>连接历史源流</li>\n</ul>\n\n<!-- 卷九第三章 -->"}, {"id": "v九-c3", "kind": "chapter", "volNum": "九", "volTitle": "智 之 辨 明", "volSubtitle": "理性认知 · 现代审视 · 实践智慧", "volQuote": "「学而不思则罔，思而不学则殆。<br>姓名一道，亦须思学并济，理性以观。」", "chapNum": "第 三 章", "chapTitle": "起名实践：让传统智慧落地", "content": "<p>姓名学之最终目标，是让传统智慧服务于现代生活。本章为读者总结实践要点，让起名一事既有传统底蕴，又能与时代同行。</p>\n\n<h2>一、平衡传统与现代</h2>\n\n<table>\n  <thead>\n    <tr><th>传统坚持</th><th>现代调适</th></tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>生肖喜忌之底层逻辑</td>\n      <td>用现代字而非生僻字</td>\n    </tr>\n    <tr>\n      <td>五得五失之能量框架</td>\n      <td>避免过度迷信单一吉字</td>\n    </tr>\n    <tr>\n      <td>音形义之美学</td>\n      <td>结合英文谐音、国际化考量</td>\n    </tr>\n    <tr>\n      <td>家族传承之尊重</td>\n      <td>不必拘泥族谱字辈</td>\n    </tr>\n    <tr>\n      <td>命名之严谨态度</td>\n      <td>父母可与孩子共同探讨成长</td>\n    </tr>\n  </tbody>\n</table>\n\n<h2>二、给父母之忠告</h2>\n\n<div class=\"callout\">\n  <div class=\"callout-title\">为 子 起 名 · 七 戒</div>\n  <p><strong>一戒迷信</strong>——不要把名字看成命运之全部</p>\n  <p><strong>二戒奇特</strong>——不要为标新立异而起怪名</p>\n  <p><strong>三戒生僻</strong>——不要用电脑打不出之字</p>\n  <p><strong>四戒重名</strong>——不要起与亲人或明星重名</p>\n  <p><strong>五戒过满</strong>——不要把所有吉字堆砌一起</p>\n  <p><strong>六戒拗口</strong>——不要让孩子一生为读音烦恼</p>\n  <p><strong>七戒草率</strong>——不要为图方便而随便定名</p>\n</div>\n\n<h2>三、给改名者之忠告</h2>\n\n<ul>\n  <li><strong>动机要纯</strong>——改名不是逃避现实，而是配合内在变化</li>\n  <li><strong>耐心要足</strong>——改名后需要使用3-5年方见效</li>\n  <li><strong>行动要跟</strong>——改名之同时，要付出实际行动改变</li>\n  <li><strong>心态要正</strong>——改名只是助推器，不要寄望奇迹</li>\n  <li><strong>家人要知</strong>——改名要让家人朋友配合呼唤</li>\n</ul>\n\n<h2>四、给从业者之忠告</h2>\n\n<ul>\n  <li><strong>德为先</strong>——以助人为本，不可借命名而贩售焦虑</li>\n  <li><strong>学为本</strong>——持续精进，不可学而不深、用而不精</li>\n  <li><strong>诚为信</strong>——讲究因果，不可虚言妄语、过度承诺</li>\n  <li><strong>行为正</strong>——身体力行，不可知一行二、自欺欺人</li>\n</ul>\n\n<div class=\"heart\">\n  <div class=\"heart-title\">姓 名 学 之 终 极 智 慧</div>\n  <p>名是助推器，不是命主宰；<br>名是锦上花，不是雪中炭。<br>识其性，知其忌，得其宜，用其势——<br>则名为我用，我为命主，命随我转。<br><br>幸福人生三部曲：<br>知 天 命 　 →　 运 命 　 →　 造 命<br><br>愿每一位读者，皆能由名识命，由命知用，<br>以正向之力，行光明之路，造圆满之生。</p>\n</div>\n\n<!-- ===================== 附 录 ===================== -->"}, {"id": "v附录-c附1", "kind": "chapter", "volNum": "附录", "volTitle": "速 查 工 具", "volSubtitle": "字根速查 · 生肖宜忌 · 禁字汇总 · 常见问答", "volQuote": "「学之以理，用之以查；<br>书页方寸之间，藏千万字之宜忌。」", "chapNum": "附 录 一", "chapTitle": "部首字根速查表", "content": "<p>本表收录姓名学常用之部首字根，按生肖喜忌分类。每一字根标明本义、所属生肖、五行属性，方便起名时快速查阅。</p>\n\n<h2>一、五谷字根类（草食生肖喜）</h2>\n\n<div class=\"radical-row\"><div class=\"label\">艹（草）</div><div class=\"content\">本义：青草。生肖：鼠、牛、兔、马、羊、猴、鸡、猪皆喜。例字：芳、芝、芷、茵、茜、莉、菁、萱、蓉、薇、苑、苇、苗、芮、芊</div></div>\n<div class=\"radical-row\"><div class=\"label\">禾（穀）</div><div class=\"content\">本义：谷物。生肖：鼠、牛、兔、马、羊、猴、鸡、猪皆喜。例字：秀、秋、科、程、和、季、秉、穆、稻、穗、稼、稳、积、秦</div></div>\n<div class=\"radical-row\"><div class=\"label\">米</div><div class=\"content\">本义：稻米。生肖：草食生肖通用。例字：粒、粹、粲、糖、粤、粳、粱、粮</div></div>\n<div class=\"radical-row\"><div class=\"label\">豆</div><div class=\"content\">本义：豆类。生肖：草食生肖通用。例字：豆、登、丰、岂、竖</div></div>\n<div class=\"radical-
